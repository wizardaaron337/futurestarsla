<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #ffd700; --blue: #00d4ff; --red: #ff4444; --bg: #050810; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: rgba(255,255,255,0.03); border: 2px solid rgba(0,212,255,0.2); border-radius: 24px; padding: 50px; width: 100%; max-width: 480px; text-align: center; }
        .logo { font-family: 'Orbitron'; font-size: 2.5em; font-weight: 900; background: linear-gradient(135deg, var(--gold), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }
        .tagline { color: #8892b0; margin-bottom: 40px; font-size: 1.2em; }
        .crew-select { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
        .crew-btn { padding: 16px; background: rgba(0,212,255,0.08); border: 2px solid rgba(0,212,255,0.2); border-radius: 12px; color: var(--blue); font-family: 'Orbitron'; font-size: 1.1em; cursor: pointer; transition: all 0.3s; user-select: none; }
        .crew-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.1); transform: translateY(-2px); }
        .crew-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.2); transform: translateY(-2px); box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #8892b0; font-size: 1em; margin-bottom: 8px; font-family: 'Orbitron'; }
        .input-group input { width: 100%; padding: 16px; background: rgba(0,0,0,0.3); border: 2px solid rgba(0,212,255,0.2); border-radius: 12px; color: #fff; font-family: 'Rajdhani'; font-size: 1.2em; outline: none; }
        .input-group input:focus { border-color: var(--blue); }
        .btn { width: 100%; padding: 18px; background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(184,41,221,0.2)); border: 2px solid var(--blue); color: var(--blue); border-radius: 12px; font-family: 'Orbitron'; font-size: 1.2em; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.2); }
        .error { color: var(--red); margin-top: 20px; font-size: 1.1em; display: none; }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🏆 FUTURE STARS</div>
        <p class="tagline">Select Your Role</p>
        <div class="crew-select">
            <button class="crew-btn" onclick="selectCrew('jr')">👑 JR</button>
            <button class="crew-btn" onclick="selectCrew('lane')">👑 Lane</button>
            <button class="crew-btn" onclick="selectCrew('pj')">🚐 PJ</button>
            <button class="crew-btn" onclick="selectCrew('caleb')">📞 Caleb</button>
            <button class="crew-btn" onclick="selectCrew('marlon')">📦 Marlon</button>
        </div>
        <button class="btn" onclick="login()">ACCESS SYSTEM</button>
        <div class="error" id="error"></div>
    </div>
    <script>
        const CREW = {
            'jr': { pass: '2026', role: 'owner', name: 'JR' },
            'lane': { pass: '2026', role: 'owner', name: 'Lane' },
            'pj': { pass: '2026', role: 'logistics', name: 'PJ' },
            'caleb': { pass: '2026', role: 'tournament', name: 'Caleb' },
            'marlon': { pass: '2026', role: 'inventory', name: 'Marlon' }
        };
        let selectedCrew = null;

        function selectCrew(crew) {
            selectedCrew = crew;
            document.getElementById('debug-role').textContent = crew.toUpperCase();
            document.querySelectorAll('.crew-btn').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function login() {
            const error = document.getElementById('error');
            
            if (!selectedCrew) { 
                error.textContent = 'Select your role first'; 
                error.classList.add('show'); 
                return; 
            }
            
            error.textContent = 'Login successful! Redirecting...';
            error.style.color = '#00ff88';
            error.classList.add('show');
            
            sessionStorage.setItem('fs_auth', selectedCrew);
            sessionStorage.setItem('fs_role', CREW[selectedCrew].role);
            sessionStorage.setItem('fs_name', CREW[selectedCrew].name);
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }
        document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
