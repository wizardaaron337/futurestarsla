<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #ffd700; --blue: #00d4ff; --green: #00ff88; --red: #ff4444; --orange: #ff8c00; --purple: #b829dd; --bg: #050810; --card: rgba(255,255,255,0.03); }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; font-size: 16px; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; background: rgba(5,8,16,0.95); border-bottom: 1px solid rgba(0,212,255,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron'; font-size: 1.6em; font-weight: 900; background: linear-gradient(135deg, var(--gold), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav a { padding: 8px 16px; border: 1px solid rgba(0,212,255,0.2); color: var(--blue); text-decoration: none; border-radius: 6px; font-size: 0.9em; font-family: 'Orbitron'; transition: all 0.2s; }
        .nav a:hover, .nav a.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.05); }
        .main { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

        .prompt-section { text-align: center; margin-bottom: 30px; }
        .prompt-title { font-family: 'Orbitron'; font-size: 1.8em; color: var(--gold); margin-bottom: 10px; }
        .prompt-subtitle { color: #8892b0; margin-bottom: 25px; font-size: 1.1em; }
        .prompt-box { background: var(--card); border: 2px solid rgba(0,212,255,0.15); border-radius: 20px; padding: 30px; max-width: 800px; margin: 0 auto; }
        .prompt-input { width: 100%; padding: 20px; background: rgba(0,0,0,0.3); border: 2px solid rgba(0,212,255,0.2); border-radius: 14px; color: #fff; font-family: 'Rajdhani'; font-size: 1.2em; outline: none; resize: vertical; min-height: 80px; }
        .prompt-input:focus { border-color: var(--gold); }
        .prompt-input::placeholder { color: #555; }
        .examples { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        .example-chip { padding: 8px 16px; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.15); border-radius: 20px; color: var(--blue); font-size: 0.85em; cursor: pointer; transition: all 0.2s; }
        .example-chip:hover { background: rgba(0,212,255,0.15); border-color: var(--blue); }
        .btn-search { width: 100%; padding: 18px; margin-top: 10px; background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(184,41,221,0.2)); border: 2px solid var(--blue); color: var(--blue); border-radius: 12px; font-family: 'Orbitron'; font-size: 1.1em; cursor: pointer; transition: all 0.3s; }
        .btn-search:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.2); }

        .results-section { display: none; margin-bottom: 40px; }
        .results-section.show { display: block; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .section-title { font-family: 'Orbitron'; font-size: 1.3em; color: var(--gold); }
        .filter-tabs { display: flex; gap: 8px; }
        .filter-tab { padding: 8px 16px; background: var(--card); border: 1px solid rgba(0,212,255,0.15); color: var(--blue); border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.8em; transition: all 0.2s; }
        .filter-tab:hover { border-color: var(--gold); color: var(--gold); }
        .filter-tab.active { background: rgba(0,212,255,0.1); border-color: var(--blue); color: #fff; }

        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .option-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; transition: all 0.3s; position: relative; }
        .option-card:hover { border-color: rgba(0,212,255,0.2); transform: translateY(-3px); }
        .option-card.selected { border-color: var(--green); background: rgba(0,255,136,0.03); box-shadow: 0 0 25px rgba(0,255,136,0.08); }
        .option-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 0.7em; font-family: 'Orbitron'; font-weight: 700; margin-bottom: 12px; }
        .badge-best { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
        .badge-cheap { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
        .badge-rated { background: rgba(0,212,255,0.15); color: var(--blue); border: 1px solid rgba(0,212,255,0.3); }
        .badge-close { background: rgba(184,41,221,0.15); color: var(--purple); border: 1px solid rgba(184,41,221,0.3); }
        .option-name { font-family: 'Orbitron'; font-size: 1em; color: #fff; margin-bottom: 8px; }
        .option-rating { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .stars { color: var(--gold); font-size: 0.9em; }
        .rating-text { color: #8892b0; font-size: 0.85em; }
        .option-price { font-size: 1.8em; font-weight: 700; color: var(--green); margin-bottom: 10px; }
        .option-price span { font-size: 0.5em; color: #8892b0; font-weight: 400; }
        .option-detail { color: #8892b0; font-size: 0.9em; margin-bottom: 6px; line-height: 1.4; }
        .option-amenities { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0; }
        .amenity-tag { padding: 4px 10px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; font-size: 0.75em; color: #8892b0; }

        .option-select-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.3);
            color: var(--blue);
            border-radius: 10px;
            font-family: 'Orbitron';
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-select-btn:hover { background: rgba(0,212,255,0.2); }
        .option-select-btn.selected {
            background: rgba(0,255,136,0.15);
            border-color: var(--green);
            color: var(--green);
        }

        .book-btn {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: rgba(255,140,0,0.15);
            border: 1px solid rgba(255,140,0,0.4);
            color: var(--orange);
            border-radius: 10px;
            font-family: 'Orbitron';
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .book-btn:hover { background: rgba(255,140,0,0.25); transform: translateY(-1px); }

        .summary-box {
            background: linear-gradient(135deg, rgba(0,212,255,0.05), rgba(184,41,221,0.05));
            border: 2px solid rgba(0,212,255,0.15);
            border-radius: 20px;
            padding: 35px;
            margin-top: 30px;
            display: none;
        }
        .summary-box.show { display: block; }
        .summary-title { font-family: 'Orbitron'; font-size: 1.3em; color: var(--gold); margin-bottom: 25px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .summary-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; }
        .summary-item-label { color: #8892b0; font-size: 0.85em; margin-bottom: 8px; }
        .summary-item-value { font-family: 'Orbitron'; font-size: 1.1em; color: #fff; }
        .summary-item-price { font-size: 1.4em; color: var(--green); font-weight: 700; }
        .summary-total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 2px solid var(--gold); font-family: 'Orbitron'; font-size: 1.3em; }
        .summary-total-price { color: var(--green); font-size: 1.5em; }
        .share-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .share-btn { padding: 16px; border-radius: 12px; font-family: 'Orbitron'; font-size: 0.9em; cursor: pointer; border: 2px solid; transition: all 0.2s; text-align: center; }
        .share-btn:hover { transform: translateY(-2px); }
        .share-copy { border-color: var(--blue); color: var(--blue); background: rgba(0,212,255,0.1); }
        .share-whatsapp { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.1); }

        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: 1fr; }
            .share-bar { grid-template-columns: 1fr; }
            .section-header { flex-direction: column; gap: 15px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <script>if(!sessionStorage.getItem("fs_auth")){window.location.href="sign-in.html";}</script>
    <div class="header">
        <div class="logo">🏆 FUTURE STARS</div>
        <nav class="nav" id="main-nav"></nav>
        <script>
            (function() {
                const role = sessionStorage.getItem('fs_role');
                const nav = document.getElementById('main-nav');
                if (!nav || !role) return;
                const links = { owner: ['dashboard','departments','inventory','trips','planner','team'], inventory: ['dashboard','inventory','team'], logistics: ['dashboard','trips','planner','team'], tournament: ['dashboard','trips','team'] };
                const labels = { dashboard:'Dashboard', departments:'Departments', inventory:'Inventory', trips:'Trips', planner:'Planner', team:'Team' };
                const current = window.location.pathname.split('/').pop().replace('.html','') || 'dashboard';
                nav.innerHTML = (links[role] || links.owner).map(p => {
                    const cls = p === current ? 'active' : '';
                    return `<a href="${p}.html" class="${cls}">${labels[p]}</a>`;
                }).join('');
            })();
        </script>
    </div>

    <div class="main">
        <div class="prompt-section">
            <div class="prompt-title">🚐 Trip Planner</div>
            <div class="prompt-subtitle">Tell PJ what you need. He'll find the best options.</div>

            <div class="prompt-box">
                <textarea class="prompt-input" id="prompt" placeholder="e.g. I need a hotel in Lafayette, LA and a car rental at the airport for this weekend"></textarea>
                <div class="examples">
                    <span class="example-chip" onclick="setPrompt('Hotel in Atlanta, GA. Car rental at ATL airport.')">Atlanta + Airport Car</span>
                    <span class="example-chip" onclick="setPrompt('Need hotel and car in Houston, TX for 3 nights')">Houston trip</span>
                    <span class="example-chip" onclick="setPrompt('Cheap hotel in Dallas. Car rental downtown.')">Dallas budget</span>
                    <span class="example-chip" onclick="setPrompt('Hotel near the ballpark in Lexington, KY. SUV rental.')">Lexington baseball</span>
                </div>
                <button class="btn-search" onclick="findOptions()">🔍 FIND OPTIONS</button>
            </div>
        </div>

        <!-- HOTEL RESULTS -->
        <div class="results-section" id="hotel-section">
            <div class="section-header">
                <div class="section-title">🏨 HOTELS</div>
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterHotels('all')">All</button>
                    <button class="filter-tab" onclick="filterHotels('cheapest')">💰 Cheapest</button>
                    <button class="filter-tab" onclick="filterHotels('rated')">⭐ Best Rated</button>
                </div>
            </div>
            <div class="options-grid" id="hotel-grid"></div>
        </div>

        <!-- CAR RESULTS -->
        <div class="results-section" id="car-section">
            <div class="section-header">
                <div class="section-title">🚗 CAR RENTALS</div>
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterCars('all')">All</button>
                    <button class="filter-tab" onclick="filterCars('cheapest')">💰 Cheapest</button>
                    <button class="filter-tab" onclick="filterCars('rated')">⭐ Best Rated</button>
                </div>
            </div>
            <div class="options-grid" id="car-grid"></div>
        </div>

        <!-- SUMMARY -->
        <div class="summary-box" id="summary-box">
            <div class="summary-title">📋 TRIP SUMMARY</div>
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-item-label">🏨 HOTEL</div>
                    <div class="summary-item-value" id="sum-hotel-name">Not selected</div>
                    <div class="summary-item-price" id="sum-hotel-price">-</div>
                </div>
                <div class="summary-item">
                    <div class="summary-item-label">🚗 CAR</div>
                    <div class="summary-item-value" id="sum-car-name">Not selected</div>
                    <div class="summary-item-price" id="sum-car-price">-</div>
                </div>
            </div>
            <div class="summary-total-row">
                <span>TOTAL ESTIMATE</span>
                <span class="summary-total-price" id="sum-total">$0</span>
            </div>
            <div class="share-bar">
                <button class="share-btn share-copy" onclick="copySummary()">📋 COPY SUMMARY</button>
                <button class="share-btn share-whatsapp" onclick="shareWhatsApp()">📱 SHARE TO WHATSAPP</button>
            </div>
        </div>
    </div>

    <script>
        let hotelResults = [];
        let carResults = [];
        let selectedHotel = null;
        let selectedCar = null;
        let currentCity = '';

        function setPrompt(text) {
            document.getElementById('prompt').value = text;
        }

        function parsePrompt(prompt) {
            const text = prompt.toLowerCase();
            let hotelLoc = '';
            let carLoc = '';

            const inMatch = text.match(/(?:hotel|stay)\s+(?:in|near|at)\s+([^,.]+)/i);
            const carMatch = text.match(/(?:car|rental|rent)\s+(?:in|at|from)\s+([^,.]+)/i);
            const generalMatch = text.match(/(?:in|near|at)\s+([^,.]+)/i);

            hotelLoc = inMatch ? inMatch[1].trim() : (generalMatch ? generalMatch[1].trim() : '');
            carLoc = carMatch ? carMatch[1].trim() : hotelLoc;

            hotelLoc = hotelLoc.replace(/\b(the|a|an)\s+/g, '').trim();
            carLoc = carLoc.replace(/\b(the|a|an)\s+/g, '').trim();

            return { hotelLoc, carLoc };
        }

        function getCityPricing(loc) {
            const city = loc.toLowerCase();
            let hotelBase = 110, carBase = 55;

            if (city.includes('new york') || city.includes('nyc') || city.includes('manhattan')) {
                hotelBase = 220; carBase = 85;
            } else if (city.includes('la ') || city.includes('los angeles') || city.includes('chicago')) {
                hotelBase = 190; carBase = 75;
            } else if (city.includes('atlanta') || city.includes('dallas') || city.includes('houston') || city.includes('austin')) {
                hotelBase = 140; carBase = 60;
            } else if (city.includes('lafayette') || city.includes('baton rouge') || city.includes('lake charles')) {
                hotelBase = 105; carBase = 50;
            } else if (city.includes('lexington') || city.includes('louisville') || city.includes('knoxville')) {
                hotelBase = 115; carBase = 52;
            } else if (city.includes('birmingham') || city.includes('mobile') || city.includes('huntsville')) {
                hotelBase = 120; carBase = 55;
            }

            return { hotelBase, carBase };
        }

        function getBookingUrl(brand, city) {
            const encoded = encodeURIComponent(city);
            const urls = {
                'Hampton Inn & Suites': `https://www.hilton.com/en/search/?query=${encoded}`,
                'Holiday Inn Express': `https://www.ihg.com/holidayinnexpress/hotels/us/en/find-hotels/hotel/list?qDest=${encoded}`,
                'Marriott Courtyard': `https://www.marriott.com/search/findHotels.mi?searchType=FindAll&destinationAddress.city=${encoded}`,
                'La Quinta Inn & Suites': `https://www.wyndhamhotels.com/la-quinta/${encoded}`,
                'Enterprise Rent-A-Car': `https://www.enterprise.com/en/car-rental/locations/us.html?search=${encoded}`,
                'Hertz': `https://www.hertz.com/rentacar/reservation/?pickupLocation=${encoded}`,
                'Budget Car Rental': `https://www.budget.com/en/locations/us?search=${encoded}`,
                'Avis Car Rental': `https://www.avis.com/en/locations/us?search=${encoded}`
            };
            return urls[brand] || `https://www.google.com/search?q=${encodeURIComponent(brand + ' ' + city)}`;
        }

        function generateHotels(loc) {
            const { hotelBase } = getCityPricing(loc);
            const city = loc.split(',')[0].trim();
            const state = loc.includes(',') ? loc.split(',')[1].trim().toUpperCase() : '';
            currentCity = city;

            const streets = ['Main St', 'Commerce Dr', 'Park Ave', 'Broadway', 'Highway', 'Interstate Blvd', 'Industrial Pkwy', 'City Center Dr', 'Downtown Plaza', 'Metropolitan Ave', 'Airport Rd', 'Airline Hwy'];

            const hotels = [
                {
                    name: 'Hampton Inn & Suites',
                    badge: 'best',
                    badgeLabel: 'BEST VALUE',
                    price: hotelBase,
                    rating: 4.5,
                    reviews: 1243,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}${state ? ', ' + state : ''}`,
                    amenities: ['Free Breakfast', 'Free WiFi', 'Free Parking', 'Pool', 'Gym'],
                    distance: '1.2 miles to downtown'
                },
                {
                    name: 'Holiday Inn Express',
                    badge: 'cheap',
                    badgeLabel: 'CHEAPEST',
                    price: Math.round(hotelBase * 0.85),
                    rating: 4.2,
                    reviews: 892,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}${state ? ', ' + state : ''}`,
                    amenities: ['Free Breakfast', 'Free WiFi', 'Free Parking', 'Business Center'],
                    distance: '2.8 miles to downtown'
                },
                {
                    name: 'Marriott Courtyard',
                    badge: 'rated',
                    badgeLabel: 'HIGHEST RATED',
                    price: Math.round(hotelBase * 1.25),
                    rating: 4.7,
                    reviews: 2156,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}${state ? ', ' + state : ''}`,
                    amenities: ['Restaurant', 'Bar', 'Gym', 'Free WiFi', 'Room Service'],
                    distance: '0.3 miles to downtown'
                },
                {
                    name: 'La Quinta Inn & Suites',
                    badge: 'close',
                    badgeLabel: 'CLOSEST',
                    price: Math.round(hotelBase * 0.95),
                    rating: 4.0,
                    reviews: 678,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}${state ? ', ' + state : ''}`,
                    amenities: ['Free Breakfast', 'Free WiFi', 'Airport Shuttle', 'Parking'],
                    distance: '0.8 miles to airport'
                }
            ];

            return hotels;
        }

        function generateCars(loc) {
            const { carBase } = getCityPricing(loc);
            const city = loc.split(',')[0].trim();

            const streets = ['Airport Blvd', 'Terminal Dr', 'Aviation Rd', 'Downtown Ave', 'Main St', 'Commerce Blvd', 'Rental Car Center'];

            const cars = [
                {
                    name: 'Enterprise Rent-A-Car',
                    badge: 'best',
                    badgeLabel: 'BEST VALUE',
                    price: carBase,
                    rating: 4.6,
                    reviews: 2341,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}`,
                    amenities: ['Free Pickup', 'SUV/Van Available', 'Unlimited Miles'],
                    vehicle: 'Full-size SUV or Van'
                },
                {
                    name: 'Hertz',
                    badge: 'rated',
                    badgeLabel: 'HIGHEST RATED',
                    price: Math.round(carBase * 1.15),
                    rating: 4.4,
                    reviews: 1876,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}`,
                    amenities: ['Gold Rewards', 'Fast Checkout', 'Premium Vehicles'],
                    vehicle: 'Premium Full-size'
                },
                {
                    name: 'Budget Car Rental',
                    badge: 'cheap',
                    badgeLabel: 'CHEAPEST',
                    price: Math.round(carBase * 0.80),
                    rating: 4.1,
                    reviews: 1456,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}`,
                    amenities: ['Best Rates', 'Economy to SUV', 'Online Check-in'],
                    vehicle: 'Mid-size or SUV'
                },
                {
                    name: 'Avis Car Rental',
                    badge: 'close',
                    badgeLabel: 'CLOSEST',
                    price: Math.round(carBase * 0.95),
                    rating: 4.3,
                    reviews: 1987,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}`,
                    amenities: ['Preferred Service', 'Luxury Options', 'GPS Included'],
                    vehicle: 'Full-size or Premium'
                }
            ];

            return cars;
        }

        function renderStars(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5;
            let stars = '★'.repeat(full);
            if (half) stars += '½';
            return stars + '☆'.repeat(5 - Math.ceil(rating));
        }

        function renderOptionCard(option, type, idx) {
            const isSelected = type === 'hotel' ? selectedHotel === idx : selectedCar === idx;
            const btnText = isSelected ? '✓ SELECTED' : 'SELECT';
            const onClick = type === 'hotel' ? `selectHotel(${idx})` : `selectCar(${idx})`;
            const bookUrl = getBookingUrl(option.name, currentCity);

            return `
                <div class="option-card ${isSelected ? 'selected' : ''}">
                    <div class="option-badge badge-${option.badge}">${option.badgeLabel}</div>
                    <div class="option-name">${option.name}</div>
                    <div class="option-rating">
                        <span class="stars">${renderStars(option.rating)}</span>
                        <span class="rating-text">${option.rating} (${option.reviews.toLocaleString()} reviews)</span>
                    </div>
                    <div class="option-price">$${option.price} <span>/night</span></div>
                    <div class="option-detail">📍 ${option.address}</div>
                    <div class="option-detail">${type === 'hotel' ? '📏 ' + option.distance : '🚗 ' + option.vehicle}</div>
                    <div class="option-amenities">
                        ${option.amenities.slice(0, 4).map(a => `<span class="amenity-tag">${a}</span>`).join('')}
                    </div>
                    <button class="option-select-btn ${isSelected ? 'selected' : ''}" id="${type}-btn-${idx}" onclick="${onClick}; event.stopPropagation();">${btnText}</button>
                    <a class="book-btn" href="${bookUrl}" target="_blank" onclick="event.stopPropagation();">🏨 BOOK NOW</a>
                </div>
            `;
        }

        function findOptions() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) { alert('Tell PJ what you need first'); return; }

            const { hotelLoc, carLoc } = parsePrompt(prompt);
            if (!hotelLoc) { alert('Could not find a location. Try: "Hotel in [city]"'); return; }

            hotelResults = generateHotels(hotelLoc);
            carResults = generateCars(carLoc || hotelLoc);

            renderHotels('all');
            renderCars('all');

            document.getElementById('hotel-section').classList.add('show');
            document.getElementById('car-section').classList.add('show');
            document.getElementById('summary-box').classList.add('show');

            document.getElementById('hotel-section').scrollIntoView({ behavior: 'smooth' });
        }

        function renderHotels(filter) {
            const grid = document.getElementById('hotel-grid');
            let filtered = hotelResults;

            if (filter === 'cheapest') filtered = hotelResults.filter(h => h.badge === 'cheap');
            else if (filter === 'rated') filtered = hotelResults.filter(h => h.badge === 'rated');

            grid.innerHTML = filtered.map((h, i) => renderOptionCard(h, 'hotel', hotelResults.indexOf(h))).join('');
        }

        function renderCars(filter) {
            const grid = document.getElementById('car-grid');
            let filtered = carResults;

            if (filter === 'cheapest') filtered = carResults.filter(c => c.badge === 'cheap');
            else if (filter === 'rated') filtered = carResults.filter(c => c.badge === 'rated');

            grid.innerHTML = filtered.map((c, i) => renderOptionCard(c, 'car', carResults.indexOf(c))).join('');
        }

        function filterHotels(type) {
            document.querySelectorAll('#hotel-section .filter-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderHotels(type);
        }

        function filterCars(type) {
            document.querySelectorAll('#car-section .filter-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderCars(type);
        }

        function selectHotel(idx) {
            selectedHotel = idx;
            renderHotels(document.querySelector('#hotel-section .filter-tab.active').textContent.includes('Cheapest') ? 'cheapest' : document.querySelector('#hotel-section .filter-tab.active').textContent.includes('Rated') ? 'rated' : 'all');
            updateSummary();
        }

        function selectCar(idx) {
            selectedCar = idx;
            renderCars(document.querySelector('#car-section .filter-tab.active').textContent.includes('Cheapest') ? 'cheapest' : document.querySelector('#car-section .filter-tab.active').textContent.includes('Rated') ? 'rated' : 'all');
            updateSummary();
        }

        function updateSummary() {
            if (selectedHotel !== null) {
                const h = hotelResults[selectedHotel];
                document.getElementById('sum-hotel-name').textContent = h.name;
                document.getElementById('sum-hotel-price').textContent = `$${h.price}/night`;
            }
            if (selectedCar !== null) {
                const c = carResults[selectedCar];
                document.getElementById('sum-car-name').textContent = c.name;
                document.getElementById('sum-car-price').textContent = `$${c.price}/day`;
            }

            let total = 0;
            if (selectedHotel !== null) total += hotelResults[selectedHotel].price * 2;
            if (selectedCar !== null) total += carResults[selectedCar].price * 3;
            document.getElementById('sum-total').textContent = `$${total}`;
        }

        function copySummary() {
            const hotel = selectedHotel !== null ? hotelResults[selectedHotel] : null;
            const car = selectedCar !== null ? carResults[selectedCar] : null;

            let text = `🏆 FUTURE STARS TRIP PLAN\n\n`;
            if (hotel) {
                text += `🏨 HOTEL\n${hotel.name}\n📍 ${hotel.address}\n⭐ ${hotel.rating}/5 (${hotel.reviews.toLocaleString()} reviews)\n💰 $${hotel.price}/night\n\n`;
            }
            if (car) {
                text += `🚗 CAR RENTAL\n${car.name}\n📍 ${car.address}\n⭐ ${car.rating}/5 (${car.reviews.toLocaleString()} reviews)\n💰 $${car.price}/day\n\n`;
            }
            text += `💵 ESTIMATED TOTAL: ${document.getElementById('sum-total').textContent}\n\nReady to book!`;

            navigator.clipboard.writeText(text).then(() => {
                alert('Trip plan copied! Ready to share.');
            });
        }

        function shareWhatsApp() {
            const hotel = selectedHotel !== null ? hotelResults[selectedHotel] : null;
            const car = selectedCar !== null ? carResults[selectedCar] : null;

            let text = `🏆 FUTURE STARS TRIP%0A%0A`;
            if (hotel) text += `🏨 ${hotel.name}%0A📍 ${hotel.address}%0A💰 $${hotel.price}/night%0A%0A`;
            if (car) text += `🚗 ${car.name}%0A📍 ${car.address}%0A💰 $${car.price}/day%0A%0A`;
            text += `💵 TOTAL: ${document.getElementById('sum-total').textContent}%0A%0ABook this ASAP!`;

            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
