    <script>
        let hotelResults = [];
        let carResults = [];
        let selectedHotel = null;
        let selectedCar = null;
        let currentCity = '';

        function setPrompt(text) { document.getElementById('prompt').value = text; }

        function parsePrompt(prompt) {
            const text = prompt.toLowerCase();
            let hotelLoc = '';
            let carLoc = '';
            const inMatch = text.match(/(?:hotel|stay)\s+(?:in|near|at)\s+([^,.]+)/i);
            const carMatch = text.match(/(?:car|rental|rent)\s+(?:in|at|from)\s+([^,.]+)/i);
            const generalMatch = text.match(/(?:in|near|at)\s+([^,.]+)/i);
            hotelLoc = inMatch ? inMatch[1].trim() : (generalMatch ? generalMatch[1].trim() : '');
            carLoc = carMatch ? carMatch[1].trim() : hotelLoc;
            hotelLoc = hotelLoc.replace(/\b(the|a|an)\s+/g, '').trim();
            carLoc = carLoc.replace(/\b(the|a|an)\s+/g, '').trim();
            return { hotelLoc, carLoc };
        }

        function getCityPricing(loc) {
            const city = loc.toLowerCase();
            let hotelBase = 110, carBase = 55;
            if (city.includes('new york') || city.includes('nyc') || city.includes('manhattan')) { hotelBase = 220; carBase = 85; }
            else if (city.includes('la ') || city.includes('los angeles') || city.includes('chicago')) { hotelBase = 190; carBase = 75; }
            else if (city.includes('atlanta') || city.includes('dallas') || city.includes('houston') || city.includes('austin')) { hotelBase = 140; carBase = 60; }
            else if (city.includes('lafayette') || city.includes('baton rouge') || city.includes('lake charles')) { hotelBase = 105; carBase = 50; }
            else if (city.includes('lexington') || city.includes('louisville') || city.includes('knoxville')) { hotelBase = 115; carBase = 52; }
            else if (city.includes('birmingham') || city.includes('mobile') || city.includes('huntsville')) { hotelBase = 120; carBase = 55; }
            return { hotelBase, carBase };
        }

        function getLogoUrl(brand) {
            const domainMap = {
                'Hampton Inn & Suites': 'hilton.com',
                'Holiday Inn Express': 'ihg.com',
                'Marriott Courtyard': 'marriott.com',
                'La Quinta Inn & Suites': 'wyndhamhotels.com',
                'Enterprise Rent-A-Car': 'enterprise.com',
                'Hertz': 'hertz.com',
                'Budget Car Rental': 'budget.com',
                'Avis Car Rental': 'avis.com'
            };
            const domain = domainMap[brand];
            return domain ? `https://logo.clearbit.com/${domain}` : null;
        }

        function getBookingUrl(brand, city) {
            const encoded = encodeURIComponent(city);
            const urls = {
                'Hampton Inn & Suites': `https://www.hilton.com/en/search/?query=${encoded}`,
                'Holiday Inn Express': `https://www.ihg.com/holidayinnexpress/hotels/us/en/find-hotels/hotel/list?qDest=${encoded}`,
                'Marriott Courtyard': `https://www.marriott.com/search/findHotels.mi?searchType=FindAll&destinationAddress.city=${encoded}`,
                'La Quinta Inn & Suites': `https://www.wyndhamhotels.com/la-quinta/${encoded}`,
                'Enterprise Rent-A-Car': `https://www.enterprise.com/en/car-rental/locations/us.html?search=${encoded}`,
                'Hertz': `https://www.hertz.com/rentacar/reservation/?pickupLocation=${encoded}`,
                'Budget Car Rental': `https://www.budget.com/en/locations/us?search=${encoded}`,
                'Avis Car Rental': `https://www.avis.com/en/locations/us?search=${encoded}`
            };
            return urls[brand] || `https://www.google.com/search?q=${encodeURIComponent(brand + ' ' + city)}`;
        }

        function generateHotels(loc) {
            const { hotelBase } = getCityPricing(loc);
            const city = loc.split(',')[0].trim();
            const state = loc.includes(',') ? loc.split(',')[1].trim().toUpperCase() : '';
            currentCity = city;
            const streets = ['Main St', 'Commerce Dr', 'Park Ave', 'Broadway', 'Highway', 'Interstate Blvd', 'Industrial Pkwy', 'City Center Dr'];

            return [
                {
                    name: 'Hampton Inn & Suites',
                    badge: 'best',
                    badgeLabel: 'BEST VALUE',
                    price: hotelBase,
                    rating: 4.5,
                    reviews: 1243,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}${state ? ', ' + state : ''}`,
                    amenities: ['Free Breakfast', 'Free WiFi', 'Free Parking', 'Pool', 'Gym'],
                    distance: '1.2 miles to downtown'
                },
                {
                    name: 'Holiday Inn Express',
                    badge: 'cheap',
                    badgeLabel: 'CHEAPEST',
                    price: Math.round(hotelBase * 0.85),
                    rating: 4.2,
                    reviews: 892,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}${state ? ', ' + state : ''}`,
                    amenities: ['Free Breakfast', 'Free WiFi', 'Free Parking', 'Business Center'],
                    distance: '2.8 miles to downtown'
                },
                {
                    name: 'Marriott Courtyard',
                    badge: 'rated',
                    badgeLabel: 'HIGHEST RATED',
                    price: Math.round(hotelBase * 1.25),
                    rating: 4.7,
                    reviews: 2156,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}${state ? ', ' + state : ''}`,
                    amenities: ['Restaurant', 'Bar', 'Gym', 'Free WiFi', 'Room Service'],
                    distance: '0.3 miles to downtown'
                },
                {
                    name: 'La Quinta Inn & Suites',
                    badge: 'close',
                    badgeLabel: 'CLOSEST',
                    price: Math.round(hotelBase * 0.95),
                    rating: 4.0,
                    reviews: 678,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}${state ? ', ' + state : ''}`,
                    amenities: ['Free Breakfast', 'Free WiFi', 'Airport Shuttle', 'Parking'],
                    distance: '0.8 miles to airport'
                }
            ];
        }

        function generateCars(loc) {
            const { carBase } = getCityPricing(loc);
            const city = loc.split(',')[0].trim();
            const streets = ['Airport Blvd', 'Terminal Dr', 'Aviation Rd', 'Downtown Ave', 'Main St', 'Commerce Blvd'];

            return [
                {
                    name: 'Enterprise Rent-A-Car',
                    badge: 'best',
                    badgeLabel: 'BEST VALUE',
                    price: carBase,
                    rating: 4.6,
                    reviews: 2341,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}`,
                    amenities: ['Free Pickup', 'SUV/Van Available', 'Unlimited Miles'],
                    vehicle: 'Full-size SUV or Van'
                },
                {
                    name: 'Hertz',
                    badge: 'rated',
                    badgeLabel: 'HIGHEST RATED',
                    price: Math.round(carBase * 1.15),
                    rating: 4.4,
                    reviews: 1876,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}`,
                    amenities: ['Gold Rewards', 'Fast Checkout', 'Premium Vehicles'],
                    vehicle: 'Premium Full-size'
                },
                {
                    name: 'Budget Car Rental',
                    badge: 'cheap',
                    badgeLabel: 'CHEAPEST',
                    price: Math.round(carBase * 0.80),
                    rating: 4.1,
                    reviews: 1456,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}`,
                    amenities: ['Best Rates', 'Economy to SUV', 'Online Check-in'],
                    vehicle: 'Mid-size or SUV'
                },
                {
                    name: 'Avis Car Rental',
                    badge: 'close',
                    badgeLabel: 'CLOSEST',
                    price: Math.round(carBase * 0.95),
                    rating: 4.3,
                    reviews: 1987,
                    address: `${Math.floor(Math.random()*8000)+1000} ${streets[Math.floor(Math.random()*streets.length)]}, ${city}`,
                    amenities: ['Preferred Service', 'Luxury Options', 'GPS Included'],
                    vehicle: 'Full-size or Premium'
                }
            ];
        }

        function renderStars(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5;
            let stars = '★'.repeat(full);
            if (half) stars += '½';
            return stars + '☆'.repeat(5 - Math.ceil(rating));
        }

        function renderLogo(name) {
            const url = getLogoUrl(name);
            if (url) {
                return `<img src="${url}" alt="${name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\\'option-logo-fallback\\'>🏨</span>';">`;
            }
            return '<span class="option-logo-fallback">🏨</span>';
        }

        function renderOptionCard(option, type, idx) {
            const isSelected = type === 'hotel' ? selectedHotel === idx : selectedCar === idx;
            const btnText = isSelected ? 'SELECTED' : 'SELECT';
            const onClick = type === 'hotel' ? `selectHotel(${idx})` : `selectCar(${idx})`;
            const bookUrl = getBookingUrl(option.name, currentCity);
            const icon = type === 'hotel' ? '🏨' : '🚗';

            return `
                <div class="option-card ${isSelected ? 'selected' : ''}">
                    <div class="option-top">
                        <div class="option-logo">${renderLogo(option.name)}</div>
                        <div class="option-header-text">
                            <div class="option-name">${option.name}</div>
                            <span class="option-badge badge-${option.badge}">${option.badgeLabel}</span>
                        </div>
                    </div>
                    <div class="option-rating">
                        <span class="stars">${renderStars(option.rating)}</span>
                        <span class="rating-text">${option.rating} (${option.reviews.toLocaleString()} reviews)</span>
                    </div>
                    <div class="option-price">$${option.price} <span>/night</span></div>
                    <div class="option-detail">📍 ${option.address}</div>
                    <div class="option-detail">${type === 'hotel' ? '📏 ' + option.distance : '🚗 ' + option.vehicle}</div>
                    <div class="option-amenities">
                        ${option.amenities.slice(0, 4).map(a => `<span class="amenity-tag">${a}</span>`).join('')}
                    </div>
                    <div class="btn-row">
                        <button class="option-select-btn ${isSelected ? 'selected' : ''}" id="${type}-btn-${idx}" onclick="${onClick}; event.stopPropagation();">${btnText}</button>
                        <a class="book-btn" href="${bookUrl}" target="_blank" onclick="event.stopPropagation();">BOOK NOW</a>
                    </div>
                </div>
            `;
        }

        function findOptions() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) { alert('Tell PJ what you need first'); return; }
            const { hotelLoc, carLoc } = parsePrompt(prompt);
            if (!hotelLoc) { alert('Could not find a location. Try: "Hotel in [city]"'); return; }
            hotelResults = generateHotels(hotelLoc);
            carResults = generateCars(carLoc || hotelLoc);
            renderHotels('all');
            renderCars('all');
            document.getElementById('hotel-section').classList.add('show');
            document.getElementById('car-section').classList.add('show');
            document.getElementById('summary-box').classList.add('show');
            document.getElementById('hotel-section').scrollIntoView({ behavior: 'smooth' });
        }

        function renderHotels(filter) {
            const grid = document.getElementById('hotel-grid');
            let filtered = hotelResults;
            if (filter === 'cheapest') filtered = hotelResults.filter(h => h.badge === 'cheap');
            else if (filter === 'rated') filtered = hotelResults.filter(h => h.badge === 'rated');
            grid.innerHTML = filtered.map((h, i) => renderOptionCard(h, 'hotel', hotelResults.indexOf(h))).join('');
        }

        function renderCars(filter) {
            const grid = document.getElementById('car-grid');
            let filtered = carResults;
            if (filter === 'cheapest') filtered = carResults.filter(c => c.badge === 'cheap');
            else if (filter === 'rated') filtered = carResults.filter(c => c.badge === 'rated');
            grid.innerHTML = filtered.map((c, i) => renderOptionCard(c, 'car', carResults.indexOf(c))).join('');
        }

        function filterHotels(type) {
            document.querySelectorAll('#hotel-section .filter-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderHotels(type);
        }

        function filterCars(type) {
            document.querySelectorAll('#car-section .filter-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderCars(type);
        }

        function selectHotel(idx) {
            selectedHotel = idx;
            renderHotels(document.querySelector('#hotel-section .filter-tab.active').textContent.includes('Cheapest') ? 'cheapest' : document.querySelector('#hotel-section .filter-tab.active').textContent.includes('Rated') ? 'rated' : 'all');
            updateSummary();
        }

        function selectCar(idx) {
            selectedCar = idx;
            renderCars(document.querySelector('#car-section .filter-tab.active').textContent.includes('Cheapest') ? 'cheapest' : document.querySelector('#car-section .filter-tab.active').textContent.includes('Rated') ? 'rated' : 'all');
            updateSummary();
        }

        function updateSummary() {
            if (selectedHotel !== null) {
                const h = hotelResults[selectedHotel];
                document.getElementById('sum-hotel-name').textContent = h.name;
                document.getElementById('sum-hotel-price').textContent = `$${h.price}/night`;
            }
            if (selectedCar !== null) {
                const c = carResults[selectedCar];
                document.getElementById('sum-car-name').textContent = c.name;
                document.getElementById('sum-car-price').textContent = `$${c.price}/day`;
            }
            let total = 0;
            if (selectedHotel !== null) total += hotelResults[selectedHotel].price * 2;
            if (selectedCar !== null) total += carResults[selectedCar].price * 3;
            document.getElementById('sum-total').textContent = `$${total}`;
        }

        function copySummary() {
            const hotel = selectedHotel !== null ? hotelResults[selectedHotel] : null;
            const car = selectedCar !== null ? carResults[selectedCar] : null;
            let text = `FUTURE STARS TRIP PLAN\n\n`;
            if (hotel) text += `HOTEL: ${hotel.name}\n${hotel.address}\n$${hotel.price}/night\n\n`;
            if (car) text += `CAR: ${car.name}\n${car.address}\n$${car.price}/day\n\n`;
            text += `TOTAL: ${document.getElementById('sum-total').textContent}`;
            navigator.clipboard.writeText(text).then(() => alert('Copied!'));
        }

        function shareWhatsApp() {
            const hotel = selectedHotel !== null ? hotelResults[selectedHotel] : null;
            const car = selectedCar !== null ? carResults[selectedCar] : null;
            let text = `FUTURE STARS TRIP%0A%0A`;
            if (hotel) text += `🏨 ${hotel.name}%0A📍 ${hotel.address}%0A💰 $${hotel.price}/night%0A%0A`;
            if (car) text += `🚗 ${car.name}%0A📍 ${car.address}%0A💰 $${car.price}/day%0A%0A`;
            text += `TOTAL: ${document.getElementById('sum-total').textContent}`;
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
    </script>
    <script>
        // Particles & Progress Bar
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
        window.addEventListener("scroll", function(){
            const bar = document.getElementById("progress-bar");
            if (!bar) return;
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = scrollHeight > 0 ? (scrollTop/scrollHeight)*100 : 0;
            bar.style.width = pct+"%";
        });
    </script>
</body>
</html>
