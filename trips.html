<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37; --gold-light: #F4D03F; --gold-dark: #B8960C;
            --black: #0A0A0A; --black-light: #111111; --black-card: #161616; --black-hover: #1E1E1E;
            --white: #FFFFFF; --gray: #999999; --gray-dark: #555555; --border: #2A2A2A;
            --green: #4CAF50; --red: #EF5350;
        }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; font-size: 16px; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 30px; background: var(--black-light); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Orbitron'; font-size: 1.4em; font-weight: 700; color: var(--gold); letter-spacing: 3px; text-decoration: none; }
        .logo span { color: var(--white); font-weight: 300; }
        .nav { display: flex; gap: 4px; padding: 12px 30px; background: var(--black-light); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .nav a { padding: 10px 20px; color: var(--gray); text-decoration: none; border-radius: 8px; font-size: 0.9em; font-weight: 500; transition: all 0.3s; letter-spacing: 0.5px; }
        .nav a:hover { color: var(--white); background: var(--black-hover); }
        .nav a.active { color: var(--gold); background: rgba(212,175,55,0.08); }
        .main { max-width: 1400px; margin: 0 auto; padding: 40px 30px; }
        .welcome { font-family: 'Orbitron'; font-size: 1.8em; color: var(--gold); margin-bottom: 8px; letter-spacing: 2px; }
        .subtitle { color: var(--gray); margin-bottom: 40px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat { background: var(--black-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; text-align: center; transition: all 0.3s; }
        .stat:hover { border-color: var(--gold-dark); transform: translateY(-3px); }
        .stat-value { font-family: 'Orbitron'; font-size: 2.2em; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
        .stat-label { color: var(--gray); font-size: 0.85em; letter-spacing: 2px; text-transform: uppercase; }
        .section-title { font-family: 'Orbitron'; font-size: 1.1em; color: var(--gold); margin-bottom: 24px; letter-spacing: 2px; }
        .trips { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        .trip { background: var(--black-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; transition: all 0.3s; }
        .trip:hover { border-color: var(--gold-dark); transform: translateY(-3px); }
        .trip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .trip-name { font-family: 'Orbitron'; font-size: 1em; color: var(--white); letter-spacing: 1px; }
        .trip-status { padding: 6px 14px; border-radius: 8px; font-size: 0.8em; font-family: 'Orbitron'; }
        .trip-status.confirmed { background: rgba(76,175,80,0.1); color: var(--green); border: 1px solid rgba(76,175,80,0.2); }
        .trip-status.pending { background: rgba(212,175,55,0.1); color: var(--gold); border: 1px solid rgba(212,175,55,0.2); }
        .trip-details { color: var(--gray); font-size: 0.95em; line-height: 1.8; }
        .trip-details strong { color: var(--white); font-family: 'Orbitron'; font-size: 0.9em; }
        .trip-revenue { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .trip-stat { text-align: center; }
        .trip-stat-value { font-family: 'Orbitron'; font-size: 1.3em; color: var(--gold); }
        .trip-stat-label { font-size: 0.8em; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 15px; } .nav { padding: 10px 20px; } .main { padding: 30px 20px; } .trips { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <script>if(!sessionStorage.getItem("fs_auth")||sessionStorage.getItem("fs_pin_verified")!=="true"){window.location.href="signin.html";}</script>
    <div class="header">
        <a href="dashboard.html" class="logo">FUTURE <span>STARS</span></a>
    </div>
    <nav class="nav" id="main-nav"></nav>
    <script>
        (function() {
            const role = sessionStorage.getItem('fs_role');
            const nav = document.getElementById('main-nav');
            if (!nav || !role) return;
            const links = { owner: ['dashboard','departments','inventory','trips','planner','team'], inventory: ['dashboard','inventory','team'], logistics: ['dashboard','trips','planner','team'], tournament: ['dashboard','trips','team'] };
            const labels = { dashboard:'Dashboard', departments:'Departments', inventory:'Inventory', trips:'Trips', planner:'Planner', team:'Team' };
            const current = window.location.pathname.split('/').pop().replace('.html','') || 'dashboard';
            nav.innerHTML = (links[role] || links.owner).map(p => {
                const cls = p === current ? 'active' : '';
                return `<a href="${p}.html" class="${cls}">${labels[p]}</a>`;
            }).join('');
        })();
    </script>
    <div class="main">
        <div class="welcome">TOURNAMENT TRIPS</div>
        <div class="subtitle">Track revenue, profit, and crew assignments</div>
        <div class="stats">
            <div class="stat"><div class="stat-value" id="total-trips">--</div><div class="stat-label">Total Trips</div></div>
            <div class="stat"><div class="stat-value" id="total-revenue">--</div><div class="stat-label">Revenue</div></div>
            <div class="stat"><div class="stat-value" id="total-profit">--</div><div class="stat-label">Profit</div></div>
            <div class="stat"><div class="stat-value" id="avg-margin">--</div><div class="stat-label">Avg Margin</div></div>
        </div>
        <div class="section-title">ALL TRIPS</div>
        <div class="trips" id="trips-grid"></div>
    </div>
    <script>
        const NAME = sessionStorage.getItem('fs_name') || 'User';
        document.getElementById('user-name') && (document.getElementById('user-name').textContent = NAME);

        const trips = [];

        let totalRevenue = 0, totalProfit = 0, totalMargin = 0;
        const grid = document.getElementById('trips-grid');
        grid.innerHTML = trips.map(trip => {
            totalRevenue += trip.revenue;
            totalProfit += trip.profit;
            totalMargin += trip.margin;
            return `
                <div class="trip">
                    <div class="trip-header">
                        <div class="trip-name">${trip.name}</div>
                        <div class="trip-status ${trip.status}">${trip.status.toUpperCase()}</div>
                    </div>
                    <div class="trip-details">
                        <div>📍 <strong>Location:</strong> ${trip.location}</div>
                        <div>📅 <strong>Dates:</strong> ${trip.dates}</div>
                        <div>👥 <strong>Crew:</strong> ${trip.crew}</div>
                        <div>📦 <strong>Inventory:</strong> ${trip.inventory}</div>
                    </div>
                    <div class="trip-revenue">
                        <div class="trip-stat"><div class="trip-stat-value">$${trip.revenue.toLocaleString()}</div><div class="trip-stat-label">Revenue</div></div>
                        <div class="trip-stat"><div class="trip-stat-value">$${trip.profit.toLocaleString()}</div><div class="trip-stat-label">Profit</div></div>
                        <div class="trip-stat"><div class="trip-stat-value">${trip.margin}%</div><div class="trip-stat-label">Margin</div></div>
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('total-trips').textContent = trips.length;
        document.getElementById('total-revenue').textContent = '$' + (totalRevenue / 1000).toFixed(1) + 'K';
        document.getElementById('total-profit').textContent = '$' + (totalProfit / 1000).toFixed(1) + 'K';
        document.getElementById('avg-margin').textContent = Math.round(totalMargin / trips.length) + '%';
    </script>
</body>
</html>
