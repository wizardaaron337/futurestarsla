<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #ffd700; --blue: #00d4ff; --green: #00ff88; --red: #ff4444; --bg: #050810; --card: rgba(255,255,255,0.03); }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; font-size: 18px; line-height: 1.6; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 30px; background: rgba(5,8,16,0.95); border-bottom: 2px solid rgba(0,212,255,0.15); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron'; font-size: 2.2em; font-weight: 900; background: linear-gradient(135deg, var(--gold), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name { font-family: 'Orbitron'; color: var(--gold); font-size: 1.1em; }
        .logout-btn { padding: 10px 20px; border: 2px solid var(--red); color: var(--red); background: transparent; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.9em; }
        .nav { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .nav a { padding: 14px 24px; border: 2px solid rgba(0,212,255,0.25); color: var(--blue); text-decoration: none; border-radius: 10px; font-size: 1.1em; font-family: 'Orbitron'; transition: all 0.3s; }
        .nav a:hover, .nav a.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.08); transform: translateY(-2px); }
        .main { max-width: 1400px; margin: 0 auto; padding: 40px 30px; }
        .welcome { font-family: 'Orbitron'; font-size: 2em; color: var(--gold); margin-bottom: 10px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat { background: var(--card); border: 2px solid rgba(0,212,255,0.1); border-radius: 16px; padding: 30px; text-align: center; transition: all 0.3s; }
        .stat:hover { border-color: rgba(0,212,255,0.2); transform: translateY(-4px); }
        .stat-value { font-family: 'Orbitron'; font-size: 2.8em; font-weight: 900; color: var(--gold); margin-bottom: 10px; }
        .stat-label { color: #8892b0; font-size: 1em; letter-spacing: 3px; text-transform: uppercase; }
        .section { margin-bottom: 40px; }
        .section-title { font-family: 'Orbitron'; font-size: 1.5em; color: var(--gold); margin-bottom: 24px; display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); }
        .trips { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; }
        .trip { background: var(--card); border: 2px solid rgba(0,212,255,0.08); border-radius: 16px; padding: 28px; transition: all 0.3s; }
        .trip:hover { border-color: rgba(0,212,255,0.2); transform: translateY(-4px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .trip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .trip-name { font-family: 'Orbitron'; font-size: 1.2em; color: var(--blue); }
        .trip-status { padding: 6px 14px; border-radius: 8px; font-size: 0.9em; font-family: 'Orbitron'; }
        .trip-status.confirmed { background: rgba(0,255,136,0.1); color: var(--green); border: 2px solid rgba(0,255,136,0.2); }
        .trip-status.pending { background: rgba(255,215,0,0.1); color: var(--gold); border: 2px solid rgba(255,215,0,0.2); }
        .trip-details { color: #8892b0; font-size: 1.1em; line-height: 1.8; }
        .trip-details strong { color: #fff; font-family: 'Orbitron'; font-size: 0.95em; }
        .trip-revenue { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .trip-stat { text-align: center; }
        .trip-stat-value { font-family: 'Orbitron'; font-size: 1.4em; color: var(--gold); }
        .trip-stat-label { font-size: 0.85em; color: #8892b0; text-transform: uppercase; letter-spacing: 2px; }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 20px; } .nav a { padding: 16px; font-size: 1em; width: 100%; text-align: center; } .stats { grid-template-columns: 1fr; } .trips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <script>if(!sessionStorage.getItem("fs_auth")){window.location.href="signin.html";}</script>
    <div class="header">
        <div class="logo">🏆 FUTURE STARS</div>
        <div class="user-info">
            <span class="user-name" id="user-name"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <nav class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="departments.html">Departments</a>
            <a href="inventory.html">Inventory</a>
            <a href="trips.html" class="active">Trips</a>
            <a href="trip-planner.html">Planner</a>
            <a href="team.html">Team</a>
            <a href="jersey-gallery.html">Jerseys</a>
        </nav>
    </div>
    <div class="main">
        <div class="welcome">Tournament Trips</div>
        <div class="stats">
            <div class="stat"><div class="stat-value" id="total-trips">--</div><div class="stat-label">Total Trips</div></div>
            <div class="stat"><div class="stat-value" id="total-revenue">--</div><div class="stat-label">Total Revenue</div></div>
            <div class="stat"><div class="stat-value" id="total-profit">--</div><div class="stat-label">Total Profit</div></div>
            <div class="stat"><div class="stat-value" id="avg-margin">--</div><div class="stat-label">Avg Margin</div></div>
        </div>
        <div class="section">
            <div class="section-title">All Trips</div>
            <div class="trips" id="trips-grid"></div>
        </div>
    </div>
    <script>
        const NAME = sessionStorage.getItem('fs_name') || 'User';
        document.getElementById('user-name').textContent = NAME;

        const SHEET_ID = '1XqPyWyUOLB6TFipZgt22esL78t_Typ6lDsB1sNxSIEQ';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        function format$(v) {
            return '$' + v.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
        }

        async function load() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));

                let totalRevenue = 0, totalProfit = 0, totalCost = 0, count = 0;
                const grid = document.getElementById('trips-grid');
                grid.innerHTML = '';

                json.table.rows.forEach(row => {
                    const c = row.c;
                    if (!c || !c[1] || !c[1].v) return;

                    const name = c[1].v;
                    const date = c[0]?.v || 'TBD';
                    const tdFee = c[2]?.v || 0;
                    const hotel = c[3]?.v || 0;
                    const gas = c[4]?.v || 0;
                    const labor = c[5]?.v || 0;
                    const rental = c[6]?.v || 0;
                    const costGoods = c[9]?.v || 0;
                    const costTotal = c[10]?.v || 0;
                    const rev = c[11]?.v || 0;
                    const profit = c[12]?.v || 0;
                    const margin = rev > 0 ? ((profit / rev) * 100).toFixed(1) : 0;

                    if (rev > 0) {
                        totalRevenue += rev;
                        totalProfit += profit;
                        totalCost += costTotal;
                        count++;

                        const status = profit > 500 ? 'confirmed' : 'pending';

                        grid.innerHTML += `
                            <div class="trip">
                                <div class="trip-header">
                                    <span class="trip-name">${name}</span>
                                    <span class="trip-status ${status}">${status.toUpperCase()}</span>
                                </div>
                                <div class="trip-details">
                                    <strong>Date:</strong> ${date}<br>
                                    <strong>Costs:</strong> TD Fee ${format$(tdFee)} | Hotel ${format$(hotel)} | Gas ${format$(gas)} | Labor ${format$(labor)} | Rental ${format$(rental)}<br>
                                    <strong>Cost of Goods:</strong> ${format$(costGoods)}
                                </div>
                                <div class="trip-revenue">
                                    <div class="trip-stat">
                                        <div class="trip-stat-value">${format$(rev)}</div>
                                        <div class="trip-stat-label">Revenue</div>
                                    </div>
                                    <div class="trip-stat">
                                        <div class="trip-stat-value" style="color: ${profit > 0 ? 'var(--green)' : 'var(--red)'}">${format$(profit)}</div>
                                        <div class="trip-stat-label">Profit</div>
                                    </div>
                                    <div class="trip-stat">
                                        <div class="trip-stat-value">${margin}%</div>
                                        <div class="trip-stat-label">Margin</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });

                document.getElementById('total-trips').textContent = count;
                document.getElementById('total-revenue').textContent = format$(totalRevenue);
                document.getElementById('total-profit').textContent = format$(totalProfit);
                const avgMargin = totalRevenue > 0 ? ((totalProfit / totalRevenue) * 100).toFixed(1) : 0;
                document.getElementById('avg-margin').textContent = avgMargin + '%';

            } catch (e) {
                console.error('Error:', e);
                document.getElementById('trips-grid').innerHTML = '<p style="color: var(--red); font-size: 1.2em;">Failed to load trip data. Please check your connection.</p>';
            }
        }

        function logout() { sessionStorage.clear(); window.location.href = 'signin.html'; }

        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
