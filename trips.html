<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --black-hover: #242424;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --green: #4CAF50;
            --red: #EF5350;
            --orange: #FF9800;
            --blue: #64B5F6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            font-size: 15px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold-dark);
            box-shadow: 0 0 20px rgba(201,162,39,0.2);
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
        }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-name {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.85em;
            letter-spacing: 2px;
        }
        .logout-btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid var(--gray-dark);
            color: var(--gray);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover { border-color: var(--gold); color: var(--gold); }
        .nav {
            display: flex;
            gap: 4px;
            padding: 12px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .nav a {
            padding: 10px 20px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .nav a:hover { color: var(--white); background: var(--black-hover); }
        .nav a.active { color: var(--gold); background: rgba(201,162,39,0.08); }
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
        }
        .welcome {
            font-family: 'Cinzel', serif;
            font-size: 2.2em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .subtitle { color: var(--gray); margin-bottom: 35px; font-size: 1em; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 35px;
        }
        .stat {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            transition: all 0.3s;
        }
        .stat:hover {
            border-color: var(--gold-dark);
            transform: translateY(-3px);
        }
        .stat-value {
            font-family: 'Cinzel', serif;
            font-size: 1.6em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .stat-label {
            color: var(--gray);
            font-size: 0.7em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 12px 18px;
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.95em;
            outline: none;
        }
        .search-box:focus { border-color: var(--gold); }
        .search-box::placeholder { color: var(--gray-dark); }
        .filter-select {
            padding: 12px 16px;
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            outline: none;
            cursor: pointer;
        }
        .filter-select:focus { border-color: var(--gold); }

        .trips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }
        .trip-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        .trip-card:hover {
            border-color: var(--gold-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .trip-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            gap: 12px;
        }
        .trip-name {
            font-family: 'Cinzel', serif;
            font-size: 0.95em;
            color: var(--white);
            letter-spacing: 1px;
            line-height: 1.4;
            flex: 1;
        }
        .trip-status {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7em;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .status-locked {
            background: rgba(76,175,80,0.1);
            color: var(--green);
            border: 1px solid rgba(76,175,80,0.2);
        }
        .trip-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }
        .meta-tag {
            padding: 4px 10px;
            background: rgba(201,162,39,0.06);
            border: 1px solid rgba(201,162,39,0.12);
            border-radius: 6px;
            font-size: 0.8em;
            color: var(--gray);
        }
        .meta-tag.sport { color: var(--gold); border-color: rgba(201,162,39,0.2); }
        .trip-details {
            color: var(--gray);
            font-size: 0.88em;
            line-height: 1.7;
        }
        .trip-details strong {
            color: var(--white);
            font-weight: 500;
        }
        .trip-footer {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .crew-tag {
            font-size: 0.85em;
            color: var(--gold-light);
        }
        .crew-tag strong { color: var(--gold); }
        .pex-tag {
            font-size: 0.75em;
            padding: 3px 8px;
            background: rgba(100,181,246,0.1);
            border: 1px solid rgba(100,181,246,0.2);
            color: var(--blue);
            border-radius: 4px;
        }
        .finance-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .finance-item {
            text-align: center;
        }
        .finance-value {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            color: var(--gold);
            font-weight: 700;
        }
        .finance-label {
            font-size: 0.7em;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray);
        }
        .empty-state h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.5em;
            color: var(--gold);
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; padding: 15px 20px; }
            .nav { padding: 10px 20px; }
            .main { padding: 30px 20px; }
            .trips-grid { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .welcome { font-size: 1.6em; }
            .finance-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <script>if(!sessionStorage.getItem("fs_auth")||sessionStorage.getItem("fs_pin_verified")!=="true"){window.location.href="signin.html";}</script>
    <div class="header">
        <a href="dashboard.html" class="logo-link">
            <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
            <span class="logo-text">FUTURE STARS</span>
        </a>
        <div class="user-info">
            <span class="user-name" id="user-name"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    <nav class="nav" id="main-nav"></nav>
    <script>
        (function() {
            const role = sessionStorage.getItem('fs_role');
            const nav = document.getElementById('main-nav');
            if (!nav || !role) return;
            const links = { owner: ['dashboard','tournaments','inventory','trips','planner','team'], inventory: ['dashboard','inventory','team'], logistics: ['dashboard','trips','planner','team'], tournament: ['dashboard','tournaments','team'] };
            const labels = { dashboard:'Dashboard', tournaments:'Tournaments', inventory:'Inventory', trips:'Trips', planner:'Planner', team:'Team' };
            const current = window.location.pathname.split('/').pop().replace('.html','') || 'dashboard';
            nav.innerHTML = (links[role] || links.owner).map(p => {
                const cls = p === current ? 'active' : '';
                return `<a href="${p}.html" class="${cls}">${labels[p]}</a>`;
            }).join('');
        })();
    </script>

    <div class="main">
        <div class="welcome">Trip Schedule</div>
        <div class="subtitle" id="subtitle">Loading trips...</div>

        <div class="stats" id="stats">
            <div class="stat"><div class="stat-value" id="st-total">--</div><div class="stat-label">Total Trips</div></div>
            <div class="stat"><div class="stat-value" id="st-locked">--</div><div class="stat-label">Locked In</div></div>
            <div class="stat"><div class="stat-value" id="st-revenue">--</div><div class="stat-label">Revenue</div></div>
            <div class="stat"><div class="stat-value" id="st-profit">--</div><div class="stat-label">Profit</div></div>
            <div class="stat"><div class="stat-value" id="st-margin">--</div><div class="stat-label">Avg Margin</div></div>
            <div class="stat"><div class="stat-value" id="st-states">--</div><div class="stat-label">States</div></div>
        </div>

        <div class="controls">
            <input type="text" class="search-box" id="search" placeholder="Search trips..." oninput="render()">
            <select class="filter-select" id="filter-month" onchange="render()">
                <option value="">All Months</option>
            </select>
            <select class="filter-select" id="filter-state" onchange="render()">
                <option value="">All States</option>
            </select>
            <select class="filter-select" id="filter-sport" onchange="render()">
                <option value="">All Sports</option>
                <option value="Soccer">Soccer</option>
                <option value="Baseball">Baseball</option>
                <option value="BB">Baseball</option>
            </select>
        </div>

        <div class="trips-grid" id="grid"></div>
    </div>

    <script src="crew-data.js"></script>
    <script src="cost-data.js"></script>
    <script>
        const NAME = sessionStorage.getItem('fs_name') || 'User';
        document.getElementById('user-name').textContent = NAME.toUpperCase();

        // Build a lookup for cost data by tournament name (fuzzy match)
        const costLookup = {};
        if (typeof COST_DATA !== 'undefined') {
            COST_DATA.forEach(c => {
                costLookup[c.tournament.toLowerCase().replace(/[^a-z0-9]/g, '')] = c;
            });
        }

        function findCost(tripName) {
            if (!tripName || typeof COST_DATA === 'undefined') return null;
            const key = tripName.toLowerCase().replace(/[^a-z0-9]/g, '');
            // Exact match first
            if (costLookup[key]) return costLookup[key];
            // Partial match
            for (const [k, v] of Object.entries(costLookup)) {
                if (k.includes(key) || key.includes(k)) return v;
            }
            return null;
        }

        // Populate filters
        const months = [...new Set(CREW_TRIPS.map(t => t.month).filter(Boolean))].sort();
        const states = [...new Set(CREW_TRIPS.map(t => t.state).filter(Boolean))].sort();
        document.getElementById('filter-month').innerHTML = '<option value="">All Months</option>' + months.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('filter-state').innerHTML = '<option value="">All States</option>' + states.map(s => `<option value="${s}">${s}</option>`).join('');

        function formatMoney(n) {
            if (!n || n === 0) return '$0';
            if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'K';
            return '$' + Math.round(n);
        }

        function updateStats() {
            const total = CREW_TRIPS.length;
            const locked = CREW_TRIPS.filter(t => t.status === 'LOCKED IN').length;
            const allStates = [...new Set(CREW_TRIPS.map(t => t.state).filter(Boolean))];
            const allCrew = new Set();
            CREW_TRIPS.forEach(t => {
                if (t.crew) {
                    t.crew.split(',').forEach(c => allCrew.add(c.trim()));
                }
            });

            // Financial stats from cost data
            let totalRev = 0, totalProfit = 0, marginCount = 0, totalMargin = 0;
            if (typeof COST_DATA !== 'undefined') {
                COST_DATA.forEach(c => {
                    totalRev += c.revenue;
                    totalProfit += c.profit;
                    if (c.margin > 0) {
                        totalMargin += c.margin;
                        marginCount++;
                    }
                });
            }
            const avgMargin = marginCount > 0 ? (totalMargin / marginCount).toFixed(1) + '%' : '—';

            document.getElementById('st-total').textContent = total;
            document.getElementById('st-locked').textContent = locked;
            document.getElementById('st-revenue').textContent = formatMoney(totalRev);
            document.getElementById('st-profit').textContent = formatMoney(totalProfit);
            document.getElementById('st-margin').textContent = avgMargin;
            document.getElementById('st-states').textContent = allStates.length;
            document.getElementById('subtitle').textContent = `${total} trips across ${allStates.length} states — ${locked} locked in — ${formatMoney(totalRev)} revenue tracked`;
        }

        function render() {
            const search = document.getElementById('search').value.toLowerCase();
            const month = document.getElementById('filter-month').value;
            const state = document.getElementById('filter-state').value;
            const sport = document.getElementById('filter-sport').value;

            let filtered = CREW_TRIPS.filter(t => {
                if (search && !t.name.toLowerCase().includes(search) && !t.state.toLowerCase().includes(search) && !t.crew.toLowerCase().includes(search)) return false;
                if (month && t.month !== month) return false;
                if (state && t.state !== state) return false;
                if (sport) {
                    const s = t.sport.toLowerCase();
                    if (sport === 'Baseball' && !s.includes('baseball') && !s.includes('bb')) return false;
                    if (sport === 'Soccer' && !s.includes('soccer')) return false;
                }
                return true;
            });

            const grid = document.getElementById('grid');
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;"><h3>No trips found</h3><p>Try adjusting your filters</p></div>`;
                return;
            }

            grid.innerHTML = filtered.map(t => {
                const statusClass = t.status === 'LOCKED IN' ? 'status-locked' : '';
                const dateStr = t.startDate ? `${t.startDate}${t.endDate ? ' — ' + t.endDate : ''}` : '';
                const sportDisplay = t.sport === 'BB' || t.sport.toLowerCase() === 'baseball' ? 'Baseball' : 
                                     t.sport.toLowerCase() === 'soccer' ? 'Soccer' : t.sport;
                
                // Find matching cost data
                const cost = findCost(t.name);
                const financeHtml = cost && cost.revenue > 0 ? `
                    <div class="finance-row">
                        <div class="finance-item">
                            <div class="finance-value">${formatMoney(cost.revenue)}</div>
                            <div class="finance-label">Revenue</div>
                        </div>
                        <div class="finance-item">
                            <div class="finance-value">${formatMoney(cost.profit)}</div>
                            <div class="finance-label">Profit</div>
                        </div>
                        <div class="finance-item">
                            <div class="finance-value">${cost.margin > 0 ? cost.margin.toFixed(1) + '%' : '—'}</div>
                            <div class="finance-label">Margin</div>
                        </div>
                    </div>
                ` : '';
                
                return `
                    <div class="trip-card">
                        <div class="trip-header">
                            <div class="trip-name">${t.name}</div>
                            <div class="trip-status ${statusClass}">${t.status || 'PENDING'}</div>
                        </div>
                        <div class="trip-meta">
                            <span class="meta-tag sport">${sportDisplay}</span>
                            <span class="meta-tag">${t.state || '—'}</span>
                            <span class="meta-tag">${t.month || '—'}</span>
                            ${t.crewNeeded ? `<span class="meta-tag">${t.crewNeeded} crew</span>` : ''}
                        </div>
                        <div class="trip-details">
                            <div>📅 <strong>Dates:</strong> ${dateStr || 'TBD'}</div>
                            ${t.crew ? `<div>👥 <strong>Crew:</strong> ${t.crew}</div>` : ''}
                            ${t.leaveDate || t.leaveTime ? `<div>🚐 <strong>Leave:</strong> ${t.leaveDate || ''} ${t.leaveTime || ''}</div>` : ''}
                            ${t.rentalReturn ? `<div>🔙 <strong>Return:</strong> ${t.rentalReturn}</div>` : ''}
                        </div>
                        ${financeHtml}
                        <div class="trip-footer">
                            <span class="crew-tag">${t.pexCard ? `<strong>PEX:</strong> ${t.pexCard}` : ''}</span>
                            ${t.leaveTimesSent ? `<span class="pex-tag">Times Sent</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'signin.html';
        }

        updateStats();
        render();
    </script>
</body>
</html>
