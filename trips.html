<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #ffd700; --blue: #00d4ff; --green: #00ff88; --red: #ff4444; --bg: #050810; --card: rgba(255,255,255,0.02); }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; font-size: 14px; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: rgba(5,8,16,0.95); border-bottom: 1px solid rgba(0,212,255,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron'; font-size: 1.4em; font-weight: 700; background: linear-gradient(135deg, var(--gold), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav { display: flex; gap: 8px; }
        .nav a { padding: 6px 14px; border: 1px solid rgba(0,212,255,0.2); color: var(--blue); text-decoration: none; border-radius: 6px; font-size: 0.85em; font-family: 'Orbitron'; letter-spacing: 1px; }
        .nav a:hover, .nav a.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.05); }
        .main { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat { background: var(--card); border: 1px solid rgba(0,212,255,0.08); border-radius: 10px; padding: 14px; text-align: center; }
        .stat-value { font-family: 'Orbitron'; font-size: 1.6em; font-weight: 900; color: var(--gold); }
        .stat-label { color: #8892b0; font-size: 0.75em; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
        .section { margin-bottom: 20px; }
        .section-title { font-family: 'Orbitron'; font-size: 0.95em; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; letter-spacing: 2px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }
        .trips { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
        .trip { background: var(--card); border: 1px solid rgba(0,212,255,0.06); border-radius: 10px; padding: 16px; }
        .trip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .trip-name { font-family: 'Orbitron'; font-size: 0.9em; color: var(--blue); }
        .trip-status { padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-family: 'Orbitron'; }
        .trip-status.confirmed { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
        .trip-status.pending { background: rgba(255,215,0,0.1); color: var(--gold); border: 1px solid rgba(255,215,0,0.2); }
        .trip-details { color: #8892b0; font-size: 0.9em; line-height: 1.6; }
        .trip-details strong { color: #fff; }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 10px; } .trips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <script>if(!sessionStorage.getItem("fs_auth")){window.location.href="login.html";}</script>
    <div class="header">
        <div class="logo">🏆 FUTURE STARS</div>
        <nav class="nav">
            <a href="index.html">Dashboard</a>
            <a href="inventory.html">Inventory</a>
            <a href="trips.html" class="active">Trips</a>
            <a href="team.html">Team</a>
            <a href="jersey-gallery.html">Jerseys</a>
        </nav>
    </div>
    <div class="main">
        <div class="stats">
            <div class="stat"><div class="stat-value" id="total-trips">--</div><div class="stat-label">Total</div></div>
            <div class="stat"><div class="stat-value" id="confirmed">--</div><div class="stat-label">Confirmed</div></div>
            <div class="stat"><div class="stat-value" id="pending">--</div><div class="stat-label">Pending</div></div>
            <div class="stat"><div class="stat-value" id="this-month">--</div><div class="stat-label">This Month</div></div>
        </div>
        <div class="section">
            <div class="section-title">Active Trips</div>
            <div class="trips" id="trips-grid"></div>
        </div>
    </div>
    <script>
        const SHEET_ID = '1XqPyWyUOLB6TFipZgt22esL78t_Typ6lDsB1sNxSIEQ';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        async function load() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                let confirmed = 0, pending = 0, total = 0;
                const grid = document.getElementById('trips-grid');
                grid.innerHTML = '';
                json.table.rows.forEach(row => {
                    const c = row.c;
                    if (!c || !c[1] || !c[1].v) return;
                    const name = c[1].v;
                    const date = c[0]?.v || 'TBD';
                    const rev = c[11]?.v || 0;
                    const profit = c[12]?.v || 0;
                    const status = profit > 1000 ? 'confirmed' : 'pending';
                    if (status === 'confirmed') confirmed++; else pending++;
                    total++;
                    grid.innerHTML += `
                        <div class="trip">
                            <div class="trip-header">
                                <span class="trip-name">${name}</span>
                                <span class="trip-status ${status}">${status.toUpperCase()}</span>
                            </div>
                            <div class="trip-details">
                                <strong>Date:</strong> ${date}<br>
                                <strong>Revenue:</strong> $${rev.toLocaleString()}<br>
                                <strong>Profit:</strong> $${profit.toLocaleString()}
                            </div>
                        </div>
                    `;
                });
                document.getElementById('total-trips').textContent = total;
                document.getElementById('confirmed').textContent = confirmed;
                document.getElementById('pending').textContent = pending;
                document.getElementById('this-month').textContent = total;
            } catch (e) { console.error('Error:', e); document.getElementById('trips-grid').innerHTML = '<p style="color: var(--red)">Failed to load trip data</p>'; }
        }
        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
