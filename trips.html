<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips — Future Stars</title>
    <script src="auth-config.js?v=1777085641"></script>
    <script src="nav-dropdown.js?v=1"></script>
    <link rel="stylesheet" href="fs-utils.css?v=1">
    <script src="fs-utils.js?v=1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #C9A227; --gold-dark: #B8941F; --black: #0A0A0A; --black-card: #1A1A1A; --white: #F8F6F0; --gray: #A8A498; --gray-dark: #6B665C; --border: #2A2824; }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; font-size: 14px; }
        .main { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .page-title { font-family: 'Cinzel', serif; font-size: 1.6em; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
        .page-subtitle { color: var(--gray); font-size: 0.9em; margin-bottom: 24px; }
        .empty-state { text-align: center; padding: 80px 20px; color: var(--gray-dark); }
        .empty-state .big { font-size: 4em; margin-bottom: 16px; }
        .empty-state h3 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.2em; margin-bottom: 8px; }
        .empty-state p { font-size: 0.9em; max-width: 400px; margin: 0 auto; line-height: 1.6; }
        .empty-state .nav-hint { margin-top: 20px; font-size: 0.8em; color: var(--gray-dark); }
    </style>
    <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js?v="+Date.now());}</script>
</head>
<body>
<script>if(!sessionStorage.getItem("fs_auth") && !localStorage.getItem("fs_auth")){window.location.href="index.html";}</script>
<div class="main">
    <div class="page-title">🚐 Trips</div>
    <div class="page-subtitle">Tournament trips will show up here once scheduled.</div>
    <div class="empty-state">
        <div class="big">📍</div>
        <h3>No Trips Yet</h3>
        <p>Start by adding a tournament in the <strong>Schedules</strong> tab. Once tournaments are scheduled, trip details will appear here.</p>
        <div class="nav-hint">📅 <strong>Schedules</strong> tab → Add Tournament → fills in here</div>
    </div>
</div>
</body>
</html>
