<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips — Future Stars</title>
    <script src="auth-config.js?v=1777085641"></script>
    <script src="nav-dropdown.js?v=1"></script>
    <link rel="stylesheet" href="fs-utils.css?v=1">
    <script src="fs-utils.js?v=1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #C9A227; --gold-dark: #B8941F; --black: #0A0A0A; --black-card: #1A1A1A; --white: #F8F6F0; --gray: #A8A498; --gray-dark: #6B665C; --border: #2A2824; --green: #4CAF50; --red: #EF5350; --amber: #FFA726; --blue: #64B5F6; }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; font-size: 14px; }
        .main { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        .page-title { font-family: 'Cinzel', serif; font-size: 1.6em; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
        .page-subtitle { color: var(--gray); font-size: 0.9em; margin-bottom: 24px; }

        .trip-card {
            background: var(--black-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px 20px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 16px;
        }
        .trip-icon { font-size: 2.2em; width: 48px; text-align: center; flex-shrink: 0; }
        .trip-info { flex: 1; min-width: 0; }
        .trip-name { font-weight: 700; font-size: 1em; color: var(--white); margin-bottom: 2px; }
        .trip-meta { color: var(--gray); font-size: 0.82em; }
        .trip-meta span { margin-right: 14px; }

        .badge {
            display: inline-block; padding: 4px 14px; border-radius: 20px;
            font-size: 0.72em; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap;
        }
        .badge-need-pack { background: rgba(255,167,38,0.12); color: var(--amber); border: 1px solid rgba(255,167,38,0.2); }
        .badge-packed { background: rgba(76,175,80,0.12); color: var(--green); border: 1px solid rgba(76,175,80,0.2); }
        .badge-out { background: rgba(100,181,246,0.12); color: var(--blue); border: 1px solid rgba(100,181,246,0.2); }
        .badge-returned { background: rgba(168,164,152,0.1); color: var(--gray); border: 1px solid rgba(168,164,152,0.15); }

        .trip-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-sm {
            padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer;
            font-size: 0.78em; font-weight: 600; white-space: nowrap;
        }
        .btn-pack { background: rgba(255,167,38,0.12); color: var(--amber); border: 1px solid rgba(255,167,38,0.2); }
        .btn-view { background: rgba(100,181,246,0.12); color: var(--blue); border: 1px solid rgba(100,181,246,0.2); }
        .btn-gps { background: rgba(76,175,80,0.12); color: var(--green); border: 1px solid rgba(76,175,80,0.2); }

        .example-hint {
            text-align: center; margin-top: 30px; color: var(--gray-dark);
            font-size: 0.8em; padding: 20px; border-top: 1px solid var(--border);
        }
        .example-hint span { color: var(--gold); }

        .trip-count { color: var(--gray-dark); font-size: 0.85em; margin-bottom: 16px; }
        @media (max-width: 600px) {
            .trip-card { flex-wrap: wrap; }
            .trip-actions { width: 100%; margin-top: 8px; }
        }
    </style>
    <script>
        // Seed example data on first visit
        (function(){
            if (localStorage.getItem('fs_examples_seeded') === '1') return;
            try {
                const schedule = JSON.parse(localStorage.getItem('fs_tourney_schedule') || '[]');
                if (schedule.length === 0) {
                    var examples = [
                        { id: 1700000001, name: 'Easter Classic', sport: 'Soccer', start: '2026-04-18', end: '2026-04-20', location: 'Lafayette, LA', teams: 85, times: 'Sat 8:00 AM — Field 3' },
                        { id: 1700000002, name: 'Gulf Coast Showcase', sport: 'Baseball', start: '2026-05-02', end: '2026-05-05', location: 'Biloxi, MS', teams: 48, times: 'Sat 9:00 AM — Field 1' },
                        { id: 1700000003, name: 'Spring Championship', sport: 'Soccer', start: '2026-03-10', end: '2026-03-13', location: 'Dallas, TX', teams: 110, times: 'Sat 8:00 AM — Field 3' },
                        { id: 1700000004, name: 'Memorial Day Classic', sport: 'Baseball', start: '2026-05-25', end: '2026-05-28', location: 'New Orleans, LA', teams: 72, times: 'Mon 7:00 AM — Field 5' }
                    ];
                    localStorage.setItem('fs_tourney_schedule', JSON.stringify(examples));
                }
                localStorage.setItem('fs_examples_seeded', '1');
            } catch(e) {}
        })();
    </script>
    <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js?v="+Date.now());}</script>
</head>
<body>
<script>if(!sessionStorage.getItem("fs_auth") && !localStorage.getItem("fs_auth")){window.location.href="index.html";}</script>
<div class="main">
    <div class="page-title">🚐 Trips</div>
    <div class="page-subtitle">Each tournament automatically becomes a trip in the system.</div>
    <div class="trip-count" id="trip-count"></div>
    <div id="trip-list"></div>
    <div class="example-hint">
        ⭐ These <span>example tournaments</span> are seeded into the system to show how everything connects.
        Add real ones in <span>Schedules</span> — they count in the Pack Manager dropdown, trip list, and everywhere else.
    </div>
</div>
<script>
    // —— Trip Status Store ——
    function getStatuses() {
        try { return JSON.parse(localStorage.getItem('fs_trip_statuses')) || {}; } catch(e) { return {}; }
    }
    function saveStatuses(s) { localStorage.setItem('fs_trip_statuses', JSON.stringify(s)); }
    function setStatus(id, s) {
        var all = getStatuses();
        all[id] = s;
        saveStatuses(all);
        renderTrips();
    }

    function openMap(loc) {
        if (loc) window.open('https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(loc), '_blank');
    }

    function renderTrips() {
        var list = JSON.parse(localStorage.getItem('fs_tourney_schedule') || '[]');
        var statuses = getStatuses();
        var container = document.getElementById('trip-list');
        document.getElementById('trip-count').textContent = list.length + ' tournament' + (list.length !== 1 ? 's' : '') + ' in the system';

        if (list.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--gray-dark);"><div style="font-size:4em;margin-bottom:16px;">📍</div><p>No tournaments yet. Add one in <strong>Schedules</strong>.</p></div>';
            return;
        }

        var html = '';
        list.forEach(function(t) {
            var stage = statuses[t.id] || 'need-pack';
            var icon, badgeClass, badgeText, btn1, btn2;

            if (stage === 'need-pack') {
                icon = '📦';
                badgeClass = 'badge-need-pack';
                badgeText = '⚠️ Needs Packing';
                btn1 = '<button class="btn-sm btn-pack" onclick="location.href=\'pack-manager.html?tournament=' + encodeURIComponent(t.name) + '\'">📦 Pack</button>';
                btn2 = '<button class="btn-sm btn-view" onclick="location.href=\'pj-planner.html?tournament=' + encodeURIComponent(t.name) + '\'">🏨 Book Hotel & Car</button>';
            } else if (stage === 'out') {
                icon = '🚐';
                badgeClass = 'badge-out';
                badgeText = '🔵 Out on Trip';
                btn1 = '<button class="btn-sm btn-gps" onclick="openMap(\'' + t.location + '\')">📍 Track</button>';
                btn2 = '<button class="btn-sm" onclick="setStatus(' + t.id + ',\'returned\')" style="background:rgba(76,175,80,0.1);color:var(--green);border:1px solid rgba(76,175,80,0.2);">✅ Complete</button>';
            } else {
                icon = '✅';
                badgeClass = 'badge-returned';
                badgeText = '✅ Completed';
                btn1 = '<button class="btn-sm" onclick="setStatus(' + t.id + ',\'need-pack\')" style="background:rgba(255,167,38,0.1);color:var(--amber);border:1px solid rgba(255,167,38,0.2);">📦 Reopen</button>';
                btn2 = '';
            }

            var sportIcon = t.sport === 'Soccer' ? '⚽' : t.sport === 'Baseball' ? '⚾' : '🏟️';
            var dateStr = (t.start || '') + (t.end ? ' — ' + t.end : '');
            var teamsStr = t.teams ? '👥 ' + t.teams + ' teams' : '';
            var dim = stage === 'returned' ? ' style="opacity:0.6;"' : '';

            // Check packing progress from fs_trips_pack
            var packExists = false;
            var shipStatus = '❌';
            try {
                var packTrips = JSON.parse(localStorage.getItem('fs_trips_pack') || '[]');
                var packMatch = packTrips.find(function(p){return p.name === t.name;});
                if (packMatch) {
                    packExists = true;
                    shipStatus = packMatch.shipped ? '✅' : '📋';
                }
            } catch(e) {}

            // Check hotel/car from PJ trips
            var hotelStatus = '❌';
            var carStatus = '❌';
            try {
                var pjTrips = JSON.parse(localStorage.getItem('fs_trips') || '[]');
                var pjMatch = pjTrips.find(function(p){return p.name === t.name;});
                if (pjMatch) {
                    if (pjMatch.hotelName) hotelStatus = '✅';
                    if (pjMatch.carName) carStatus = '✅';
                }
            } catch(e) {}

            html += '<div class="trip-card"' + dim + '>' +
                '<div class="trip-icon">' + icon + '</div>' +
                '<div class="trip-info">' +
                    '<div class="trip-name">' + sportIcon + ' ' + t.name + '</div>' +
                    '<div class="trip-meta">' +
                        (dateStr ? '<span>📅 ' + dateStr + '</span>' : '') +
                        (t.location ? '<span>📍 ' + t.location + '</span>' : '') +
                        (teamsStr ? '<span>' + teamsStr + '</span>' : '') +
                    '</div>' +
                    '<div style="display:flex;gap:10px;font-size:0.82em;color:var(--gray);margin-top:4px;flex-wrap:wrap;">' +
                        '<span>🏨 Booked ' + hotelStatus + '</span>' +
                        '<span>🚗 Rental ' + carStatus + '</span>' +
                        '<span>📊 Teams: ' + (t.teams || '—') + '</span>' +
                        '<span>📦 Packing ' + shipStatus + '</span>' +
                    '</div>' +
                '</div>' +
                '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
                '<div class="trip-actions">' +
                    btn1 +
                    btn2 +
'' +
                '</div>' +
            '</div>';
        });
        container.innerHTML = html;
    }

    // Live update: re-render whenever schedule data changes (cross-tab or same-tab)
    window.addEventListener('storage', function(e) {
      if (e.key === 'fs_tourney_schedule' || e.key === 'fs_trip_statuses') renderTrips();
    });
    // Also poll every 3 seconds in case same-tab edits don't fire storage event
    setInterval(function() {
      var now = JSON.stringify(localStorage.getItem('fs_tourney_schedule'));
      if (now !== window._lastScheduleHash) {
        window._lastScheduleHash = now;
        renderTrips();
      }
    }, 3000);
    window._lastScheduleHash = JSON.stringify(localStorage.getItem('fs_tourney_schedule'));

    renderTrips();
</script>
</body>
</html>
