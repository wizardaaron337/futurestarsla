                <option value="Pipeline">Pipeline</option>
            </select>
            <select class="filter-select" id="filter-sport" onchange="render()">
                <option value="">All Sports</option>
                <option value="Baseball">Baseball</option>
                <option value="Soccer">Soccer</option>
            </select>
        </div>

        <div class="tournaments-grid" id="grid">
            <!-- Skeleton loading state -->
            <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-tags"><div class="skeleton-tag"></div><div class="skeleton-tag"></div></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div><div class="skeleton-line long"></div></div>
            <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-tags"><div class="skeleton-tag"></div><div class="skeleton-tag"></div></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div><div class="skeleton-line long"></div></div>
            <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-tags"><div class="skeleton-tag"></div><div class="skeleton-tag"></div></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div><div class="skeleton-line long"></div></div>
            <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-tags"><div class="skeleton-tag"></div><div class="skeleton-tag"></div></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div><div class="skeleton-line long"></div></div>
            <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-tags"><div class="skeleton-tag"></div><div class="skeleton-tag"></div></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div><div class="skeleton-line long"></div></div>
            <div class="skeleton-card"><div class="skeleton-line title"></div><div class="skeleton-tags"><div class="skeleton-tag"></div><div class="skeleton-tag"></div></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div><div class="skeleton-line long"></div></div>
        </div>
    </div>

    <script>
        const NAME = sessionStorage.getItem('fs_name') || 'User';
        document.getElementById('user-name').textContent = NAME.toUpperCase();

        // Populate filters
        const months = [...new Set(TOURNAMENTS.map(t => t.month).filter(Boolean))].sort();
        const states = [...new Set(TOURNAMENTS.map(t => t.state).filter(Boolean))].sort();
        document.getElementById('filter-month').innerHTML = '<option value="">All Months</option>' + months.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('filter-state').innerHTML = '<option value="">All States</option>' + states.map(s => `<option value="${s}">${s}</option>`).join('');

        function updateStats() {
            const total = TOURNAMENTS.length;
            const locked = TOURNAMENTS.filter(t => t.status === 'LOCKED').length;
            const need = TOURNAMENTS.filter(t => t.status === 'NEED FILLED').length;
            const baseball = TOURNAMENTS.filter(t => t.sport === 'Baseball').length;
            const soccer = TOURNAMENTS.filter(t => t.sport === 'Soccer').length;
            document.getElementById('st-total').textContent = total;
            document.getElementById('st-locked').textContent = locked;
            document.getElementById('st-need').textContent = need;
            document.getElementById('st-baseball').textContent = baseball;
            document.getElementById('st-soccer').textContent = soccer;
            document.getElementById('subtitle').textContent = `${total} tournaments across ${states.length} states — ${locked} locked, ${need} need crew`;
        }

        function render() {
            const search = document.getElementById('search').value.toLowerCase();
            const month = document.getElementById('filter-month').value;
            const state = document.getElementById('filter-state').value;
            const status = document.getElementById('filter-status').value;
            const sport = document.getElementById('filter-sport').value;

            let filtered = TOURNAMENTS.filter(t => {
                if (search && !t.name.toLowerCase().includes(search) && !t.state.toLowerCase().includes(search)) return false;
                if (month && t.month !== month) return false;
                if (state && t.state !== state) return false;
                if (status && t.status !== status) return false;
                if (sport && t.sport !== sport) return false;
                return true;
            });

            const grid = document.getElementById('grid');
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;"><h3>No tournaments found</h3><p>Try adjusting your filters</p></div>`;
                return;
            }

            grid.innerHTML = filtered.map(t => {
                const statusClass = t.status === 'LOCKED' ? 'status-locked' : t.status === 'NEED FILLED' ? 'status-need' : 'status-pipeline';
                const statusText = t.status === 'Pipeline' ? 'PIPELINE' : t.status;
                const dateStr = t.startDate ? `${t.startDate} ${t.month}` : t.month;
                const endStr = t.endDate ? ` — ${t.endDate}` : '';
                return `
                    <div class="tournament-card">
                        <div class="tournament-header">
                            <div class="tournament-name">${t.name}</div>
                            <div class="tournament-status ${statusClass}">${statusText}</div>
                        </div>
                        <div class="tournament-meta">
                            <span class="meta-tag sport">${t.sport || '—'}</span>
                            <span class="meta-tag">${t.state}</span>
                            <span class="meta-tag">${t.age || '—'}</span>
                            ${t.sites ? `<span class="meta-tag">${t.sites} site${t.sites !== '1' ? 's' : ''}</span>` : ''}
                        </div>
                        <div class="tournament-details">
                            <div>📅 <strong>Date:</strong> ${dateStr}${endStr}</div>
                            ${t.contact ? `<div>📞 <strong>Contact:</strong> ${t.contact}</div>` : ''}
                            ${t.whoLocked ? `<div>🔒 <strong>Locked by:</strong> ${t.whoLocked}</div>` : ''}
                            ${t.kickback ? `<div>💰 <strong>Kickback:</strong> ${t.kickback}</div>` : ''}
                            ${t.website ? `<div>🌐 <strong>Site:</strong> <a href="${t.website}" target="_blank" style="color:var(--gold);text-decoration:none;">${t.website.replace(/^https?:\/\//,'').slice(0,35)}${t.website.length>35?'...':''}</a></div>` : ''}
                        </div>
                        <div class="tournament-footer">
                            <span class="crew-tag">${t.crew ? `<strong>Crew:</strong> ${t.crew}` : ''}${t.setups ? ` + ${t.setups}` : ''}</span>
                            <span class="size-badge">${t.size || 0} <span>teams</span></span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'signin.html';
        }

        updateStats();
        render();
    </script>
    <script>
        // Particles & Progress Bar
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
        window.addEventListener("scroll", function(){
            const bar = document.getElementById("progress-bar");
            if (!bar) return;
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = scrollHeight > 0 ? (scrollTop/scrollHeight)*100 : 0;
            bar.style.width = pct+"%";
        });
    </script>
