<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#C9A227;--gold-light:#E8C84B;--gold-dark:#B8941F;--gold-10:rgba(201,162,39,0.1);--gold-20:rgba(201,162,39,0.2);
  --black:#0A0A0A;--black-light:#141414;--black-card:#1A1A1A;--black-hover:#242424;
  --white:#F8F6F0;--gray:#A8A498;--gray-dark:#6B665C;--border:#2A2824;
  --green:#4CAF50;--red:#EF5350;--blue:#64B5F6;--orange:#FF9800;--purple:#B829DD;
}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);min-height:100vh;font-size:15px;}
::selection{background:rgba(201,162,39,0.3);color:var(--white);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;background:var(--black-light);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo-link{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--gold-dark);box-shadow:0 0 20px rgba(201,162,39,0.2);}
.logo-text{font-family:'Cinzel',serif;font-size:1.3em;font-weight:700;color:var(--gold);letter-spacing:3px;}
.user-info{display:flex;align-items:center;gap:20px;}
.user-name{font-family:'Cinzel',serif;color:var(--gold);font-size:.85em;letter-spacing:2px;}
.logout-btn{padding:8px 18px;background:transparent;border:1px solid var(--gray-dark);color:var(--gray);border-radius:8px;font-family:'Inter',sans-serif;font-size:.8em;cursor:pointer;transition:all .3s;}
.logout-btn:hover{border-color:var(--gold);color:var(--gold);}

/* Nav */
.nav{display:flex;gap:4px;padding:12px 30px;background:var(--black-light);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.nav a{padding:10px 20px;color:var(--gray);text-decoration:none;border-radius:8px;font-size:.85em;font-weight:500;transition:all .3s;letter-spacing:.5px;}
.nav a:hover{color:var(--white);background:var(--black-hover);}
.nav a.active{color:var(--gold);background:var(--gold-10);}

/* Main */
.main{max-width:1400px;margin:0 auto;padding:40px 30px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:30px;flex-wrap:wrap;gap:16px;}
.welcome{font-family:'Cinzel',serif;font-size:2.2em;font-weight:700;color:var(--gold);letter-spacing:1px;}
.subtitle{color:var(--gray);font-size:1em;}

/* Controls Bar */
.controls-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
.search-box{flex:1;min-width:260px;padding:12px 18px;background:var(--black-card);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Inter',sans-serif;font-size:.95em;outline:none;transition:all .2s;}
.search-box:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,0.1);}
.search-box::placeholder{color:var(--gray-dark);}
.filter-select{padding:12px 16px;background:var(--black-card);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Inter',sans-serif;font-size:.9em;outline:none;cursor:pointer;transition:all .2s;}
.filter-select:focus{border-color:var(--gold);}

/* Buttons */
.btn{padding:12px 24px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.9em;font-weight:600;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--black);box-shadow:0 4px 15px rgba(201,162,39,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(201,162,39,0.4);}
.btn-secondary{background:var(--black-card);border:1px solid var(--border);color:var(--white);}
.btn-secondary:hover{border-color:var(--gold);}
.btn-danger{background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.3);color:var(--red);}
.btn-danger:hover{background:rgba(239,83,80,0.2);}
.btn-success{background:linear-gradient(135deg,var(--green),#388E3C);color:var(--white);box-shadow:0 4px 15px rgba(76,175,80,0.3);}
.btn-success:hover{transform:translateY(-2px);}
.btn-sm{padding:8px 16px;font-size:.8em;}
.btn-icon{padding:8px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--gray);cursor:pointer;transition:all .2s;}
.btn-icon:hover{border-color:var(--gold);color:var(--gold);}

/* View Toggle */
.view-toggle{display:flex;gap:4px;background:var(--black-card);padding:4px;border-radius:10px;border:1px solid var(--border);}
.view-toggle button{padding:8px 14px;border-radius:6px;border:none;background:transparent;color:var(--gray);font-size:.85em;cursor:pointer;transition:all .2s;}
.view-toggle button.active{background:var(--gold-10);color:var(--gold);}
.view-toggle button:hover:not(.active){color:var(--white);}

/* Tournament Trip Cards */
.tournament-strip{display:flex;flex-direction:column;gap:12px;}
.trip-card{background:var(--black-card);border:1px solid var(--border);border-radius:16px;padding:22px;transition:all .3s;position:relative;cursor:pointer;}
.trip-card:hover{border-color:var(--gold-dark);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.4);}
.trip-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px;}
.trip-card-title{font-family:'Cinzel',serif;font-size:1.05em;color:var(--white);letter-spacing:1px;line-height:1.3;flex:1;}
.trip-card-date{font-size:.78em;color:var(--gray-dark);white-space:nowrap;}
.trip-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;font-size:.85em;color:var(--gray);}
.trip-tag{padding:3px 10px;background:var(--black-light);border:1px solid var(--border);border-radius:6px;font-size:.78em;color:var(--gray);}
.trip-tag i{color:var(--gold);margin-right:4px;}
.trip-desc{color:var(--gray);font-size:.85em;line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.trip-booking-status{display:flex;flex-direction:column;gap:4px;padding:8px 0;border-top:1px solid var(--border);font-size:.9em;}
.trip-view-link{display:inline-block;margin-top:4px;font-size:.8em;color:var(--gold);cursor:pointer;text-decoration:none;}
.trip-view-link:hover{text-decoration:underline;}
.trip-big-buttons{display:flex;gap:10px;margin-top:8px;width:100%;}
.btn-hotel{flex:1;padding:14px 20px;border-radius:50px;font-size:1em;font-weight:700;letter-spacing:.5px;cursor:pointer;border:none;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#FFD700,#DAA520);color:var(--black);box-shadow:0 4px 15px rgba(218,165,32,0.3);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-hotel:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(218,165,32,0.4);}
.btn-car{flex:1;padding:14px 20px;border-radius:50px;font-size:1em;font-weight:700;letter-spacing:.5px;cursor:pointer;border:none;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#64B5F6,#2196F3);color:var(--white);box-shadow:0 4px 15px rgba(33,150,243,0.3);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-car:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(33,150,243,0.4);}

/* Type colors */
.type-roadtrip{color:var(--blue);border-color:rgba(100,181,246,.3);background:rgba(100,181,246,.08);}
.type-family{color:var(--green);border-color:rgba(76,175,80,.3);background:rgba(76,175,80,.08);}
.type-business{color:var(--gold);border-color:rgba(201,162,39,.3);background:rgba(201,162,39,.08);}
.type-adventure{color:var(--orange);border-color:rgba(255,152,0,.3);background:rgba(255,152,0,.08);}
.type-tournament{color:var(--purple);border-color:rgba(184,41,221,.3);background:rgba(184,41,221,.08);}
.type-other{color:var(--gray);border-color:rgba(168,164,152,.3);background:rgba(168,164,152,.08);}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.modal-overlay.active{display:flex;}
.modal{background:var(--black-card);border:1px solid var(--border);border-radius:20px;padding:30px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .3s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal h2{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:20px;padding-right:40px;font-size:1.3em;}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--gray);font-size:1.8em;cursor:pointer;transition:color .2s;}
.modal-close:hover{color:var(--white);}

/* Forms */
.form-section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.form-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.form-section h3{font-family:'Cinzel',serif;color:var(--gold);font-size:.9em;margin-bottom:14px;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;color:var(--gray);font-size:.85em;margin-bottom:6px;font-weight:500;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;background:var(--black-light);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'Inter',sans-serif;font-size:.9em;outline:none;transition:all .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.1);}
.form-group input::placeholder{color:var(--gray-dark);}
.form-group textarea{min-height:80px;resize:vertical;}
.form-group input[type="date"]{color-scheme:dark;}

/* Color picker */
.color-picker{display:flex;gap:8px;flex-wrap:wrap;}
.color-option{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;position:relative;}
.color-option:hover{transform:scale(1.15);}
.color-option.active{border-color:var(--white);box-shadow:0 0 0 2px var(--gold);}
.color-option.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:14px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.8);}

/* Share modal content */
.share-url{display:flex;gap:8px;margin:16px 0;}
.share-url input{flex:1;padding:12px;background:var(--black-light);border:1px solid var(--border);border-radius:10px;color:var(--gold);font-family:'Inter',monospace;font-size:.85em;}
.share-options{margin:16px 0;padding:16px;background:var(--black-light);border-radius:12px;}
.share-options label{display:flex;align-items:center;gap:10px;margin-bottom:10px;color:var(--gray);font-size:.9em;cursor:pointer;}
.share-options input[type="checkbox"]{width:18px;height:18px;accent-color:var(--gold);}

/* Detail View (inside modal) */
.detail-view{padding:10px 0;}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px;}
.detail-title{font-family:'Cinzel',serif;font-size:1.5em;color:var(--gold);margin-bottom:6px;}
.detail-subtitle{color:var(--gray);font-size:.9em;}
.detail-section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.detail-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.detail-section h4{font-family:'Cinzel',serif;color:var(--gold);font-size:.85em;margin-bottom:12px;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:.9em;}
.detail-row .label{color:var(--gray);}
.detail-row .value{color:var(--white);font-weight:500;}
.detail-row .price{font-family:'Cinzel',serif;color:var(--gold);font-weight:700;}
.detail-actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;}

/* Empty state */
.empty-state{text-align:center;padding:80px 20px;color:var(--gray);}
.empty-state-icon{font-size:4em;margin-bottom:16px;}
.empty-state h3{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:10px;font-size:1.3em;}

/* Toast */
.toast{position:fixed;bottom:30px;right:30px;padding:16px 24px;background:var(--black-card);border:1px solid var(--gold);border-radius:12px;color:var(--white);font-family:'Inter',sans-serif;z-index:10000;animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;box-shadow:0 10px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;}
@keyframes toastIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes toastOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(100px);opacity:0;}}

/* Breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;color:var(--gray);font-size:.85em;flex-wrap:wrap;}
.breadcrumb a{color:var(--gold);text-decoration:none;transition:opacity .2s;}
.breadcrumb a:hover{opacity:.8;text-decoration:underline;}
.breadcrumb-sep{color:var(--gray-dark);}

/* Tags input */
.tags-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--black-light);border:1px solid var(--border);border-radius:10px;min-height:44px;}
.tags-input:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.1);}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--gold-10);border:1px solid var(--gold-20);border-radius:6px;font-size:.8em;color:var(--gold);}
.tag button{background:none;border:none;color:var(--gold);cursor:pointer;font-size:1.1em;padding:0;margin-left:2px;}
.tag button:hover{color:var(--red);}
.tags-input input{flex:1;min-width:80px;background:transparent;border:none;color:var(--white);font-family:'Inter',sans-serif;font-size:.9em;outline:none;padding:4px;}

/* Budget display */
.budget-bar{height:8px;background:var(--black-light);border-radius:4px;margin-top:6px;overflow:hidden;}
.budget-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}

/* Responsive */
@media(max-width:768px){
  .header{flex-direction:column;gap:15px;padding:15px 20px;}
  .nav{padding:10px 20px;}
  .main{padding:30px 20px;}
  .page-header{flex-direction:column;align-items:flex-start;}
  .welcome{font-size:1.6em;}
  .form-row{grid-template-columns:1fr;}
  .controls-bar{flex-direction:column;align-items:stretch;}
  .search-box{width:100%;}
}
@media(max-width:480px){
  html{font-size:14px;}
  .modal{padding:20px;}
}

/* Crew Trips Card */


/* Plan tab styles for hotel/car search in view modal */
.plan-finder-section{border:1px solid rgba(201,162,39,0.15);background:rgba(201,162,39,0.02);}
.plan-tab{padding:10px 20px;border-radius:8px;border:none;background:transparent;color:var(--gray);font-family:'Inter',sans-serif;font-size:.85em;cursor:pointer;transition:all .2s;font-weight:500;}
.plan-tab.active{background:var(--gold-10);color:var(--gold);}
.plan-tab:hover:not(.active){color:var(--white);}

.plan-search-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.plan-search-field{flex:1;min-width:200px;}
.plan-search-field label{display:block;font-size:.78em;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.plan-search-field input{width:100%;padding:10px 14px;background:var(--black);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'Inter',sans-serif;font-size:.9em;outline:none;transition:all .2s;}
.plan-search-field input:focus{border-color:var(--gold);}
.plan-search-field input::placeholder{color:var(--gray-dark);}
.plan-examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.plan-chip{padding:6px 14px;background:var(--black);border:1px solid var(--border);border-radius:16px;color:var(--gray);font-size:.8em;cursor:pointer;transition:all .2s;}
.plan-chip:hover{border-color:var(--gold);color:var(--gold);}

.plan-options-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:16px;}
@media(max-width:768px){.plan-options-grid{grid-template-columns:1fr;}}

.plan-option-card{background:var(--black);border:1px solid var(--border);border-radius:12px;padding:18px;transition:all .3s;position:relative;}
.plan-option-card:hover{border-color:var(--gold-dark);transform:translateY(-2px);}
.plan-option-card.selected{border-color:var(--gold);box-shadow:0 0 20px rgba(201,162,39,0.08);}
.plan-opt-name{font-family:'Cinzel',serif;color:var(--white);font-size:.85em;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.plan-opt-badge{padding:2px 8px;border-radius:12px;font-size:.6em;font-weight:700;letter-spacing:1px;}
.plan-opt-badge.best{background:rgba(201,162,39,0.15);color:var(--gold);border:1px solid rgba(201,162,39,0.3);}
.plan-opt-badge.cheap{background:rgba(76,175,80,0.15);color:var(--green);border:1px solid rgba(76,175,80,0.3);}
.plan-opt-badge.rated{background:rgba(255,255,255,0.08);color:var(--white);border:1px solid rgba(255,255,255,0.2);}
.plan-opt-badge.close{background:rgba(201,162,39,0.08);color:var(--gold-light);border:1px solid rgba(201,162,39,0.2);}
.plan-opt-rating{font-size:.8em;color:var(--gray);margin-bottom:6px;}
.plan-opt-stars{color:var(--gold);}
.plan-opt-price{font-family:'Cinzel',serif;font-size:1.3em;color:var(--gold);font-weight:700;margin-bottom:6px;}
.plan-opt-price span{font-size:.5em;color:var(--gray);font-weight:400;}
.plan-opt-address{font-size:.78em;color:var(--gray-dark);margin-bottom:4px;}
.plan-opt-amenities{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0;}
.plan-opt-amenity{padding:2px 8px;background:var(--black-light);border:1px solid var(--border);border-radius:4px;font-size:.7em;color:var(--gray);}
.plan-opt-actions{display:flex;gap:8px;margin-top:10px;}
.plan-opt-btn{padding:8px 16px;border-radius:6px;font-size:.78em;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--black-light);color:var(--gray);font-family:'Inter',sans-serif;}
.plan-opt-btn:hover{border-color:var(--gold);color:var(--gold);}
.plan-opt-btn.selected{background:var(--gold-10);border-color:var(--gold);color:var(--gold);}
.plan-opt-btn.book{background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:var(--black);}
.plan-opt-btn.book:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,162,39,0.3);}

.plan-summary{background:var(--black-light);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px;}
.plan-summary h4{font-family:'Cinzel',serif;color:var(--gold);font-size:.85em;margin-bottom:12px;letter-spacing:1px;}
.plan-summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:.85em;}
.plan-summary-row .label{color:var(--gray);}
.plan-summary-row .value{color:var(--white);font-weight:500;}
.plan-summary-total{border-top:1px solid var(--border);padding-top:10px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;}
.plan-summary-total .label{font-family:'Cinzel',serif;color:var(--gold);font-size:.9em;}
.plan-summary-total .value{font-family:'Cinzel',serif;color:var(--gold);font-size:1.2em;font-weight:700;}

/* Booking link button in trip detail */
.booking-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.booking-link{padding:8px 16px;border-radius:8px;font-size:.85em;text-decoration:none;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.booking-link.hotel{background:rgba(100,181,246,0.1);border:1px solid rgba(100,181,246,0.2);color:var(--blue);}
.booking-link.hotel:hover{background:rgba(100,181,246,0.2);}

<div class="main" id="app">

<script>
const NAME=sessionStorage.getItem('fs_name')||'User';

/* ═════════════════════════════════════════
   DATA STORE
   ═════════════════════════════════════════ */
const DB={trips:'fs_trips'};

function getTrips(){return JSON.parse(localStorage.getItem(DB.trips)||'[]');}
function saveTrips(t){localStorage.setItem(DB.trips,JSON.stringify(t));}

/* ═════════════════════════════════════════
   SEED DATA — sync tournaments to trips
   ═════════════════════════════════════════ */
function seedData(){
  var tournaments = JSON.parse(localStorage.getItem('fs_tourney_schedule') || '[]');
  var trips = getTrips();
  // Seed example tournaments if schedule is empty
  if (tournaments.length === 0) {
    var examples = [
      { id: 1700000001, name: 'Easter Classic', sport: 'Soccer', start: '2026-04-18', end: '2026-04-20', location: 'Lafayette, LA', teams: 85, times: 'Sat 8:00 AM — Field 3' },
      { id: 1700000002, name: 'Gulf Coast Showcase', sport: 'Baseball', start: '2026-05-02', end: '2026-05-05', location: 'Biloxi, MS', teams: 48, times: 'Sat 9:00 AM — Field 1' },
      { id: 1700000003, name: 'Spring Championship', sport: 'Soccer', start: '2026-03-10', end: '2026-03-13', location: 'Dallas, TX', teams: 110, times: 'Sat 8:00 AM — Field 3' },
      { id: 1700000004, name: 'Memorial Day Classic', sport: 'Baseball', start: '2026-05-25', end: '2026-05-28', location: 'New Orleans, LA', teams: 72, times: 'Mon 7:00 AM — Field 5' }
    ];
    localStorage.setItem('fs_tourney_schedule', JSON.stringify(examples));
    tournaments = examples;
  }
  tournaments.forEach(function(t) {
    var existing = trips.find(function(tr) { return tr.tourneyId === t.id; });
    var tripData = {
      id: 'trip-' + t.id,
      folderId: 'tournaments',
      name: t.name,
      destination: t.location || '',
      startDate: t.start || '',
      endDate: t.end || '',
      desc: t.sport + (t.teams ? ' — ' + t.teams + ' teams' : ''),
      travelers: 3,
      budget: 500,
      type: 'tournament',
      tags: [t.sport ? t.sport.toLowerCase() : '', 'tournament'].filter(Boolean),
      notes: t.times || '',
      tourneyId: t.id,
      sport: t.sport,
      teams: t.teams,
      created: Date.now(),
      updated: Date.now()
    };
    if (!existing) {
      trips.push(tripData);
    } else {
      existing.destination = tripData.destination;
      existing.startDate = tripData.startDate;
      existing.endDate = tripData.endDate;
      existing.desc = tripData.desc;
      existing.sport = tripData.sport;
      existing.teams = tripData.teams;
      existing.notes = tripData.notes;
      existing.updated = Date.now();
    }
  });
  saveTrips(trips);
}

/* ═════════════════════════════════════════
   RENDER: MAIN VIEW
   ═════════════════════════════════════════ */
function renderMainView() {
  var trips = getTrips().filter(function(t) { return t.folderId === 'tournaments'; });
  var app = document.getElementById('app');
  
  var html = '<div class="page-header">' +
    '<div><div class="welcome">Trip Maker</div>' +
    '<div class="subtitle">' + trips.length + ' tournament' + (trips.length !== 1 ? 's' : '') + ' — book hotels & cars for each</div></div>' +
    '</div>';
  
  if (trips.length === 0) {
    html += '<div class="empty-state"><div class="empty-state-icon">🏟️</div><h3>No tournaments yet</h3><p>Add tournaments in the <strong>Schedules</strong> tab first.</p></div>';
    app.innerHTML = html;
    return;
  }
  
  html += '<div class="tournament-strip">';
  trips.forEach(function(trip) {
    var sportIcon = trip.sport === 'Soccer' ? '⚽' : trip.sport === 'Baseball' ? '⚾' : '🏟️';
    var dates = (trip.startDate || '') + (trip.endDate ? ' — ' + trip.endDate : '');
    var hotelStatus = trip.hotelName ? '<span style="color:var(--green);font-size:0.8em;">✅ ' + trip.hotelName + ' $' + (trip.hotelPrice || 0) + '/night</span>' : '<span style="color:var(--red);font-size:0.8em;">❌ Not Booked</span>';
    var carStatus = trip.carName ? '<span style="color:var(--green);font-size:0.8em;">✅ ' + trip.carName + ' $' + (trip.carPrice || 0) + '/day</span>' : '<span style="color:var(--red);font-size:0.8em;">❌ Not Booked</span>';
    
    html += '<div class="trip-card" onclick="viewTrip(\'' + trip.id + '\')">' +
      '<div class="trip-card-header">' +
        '<div class="trip-card-title">' + sportIcon + ' ' + trip.name + '</div>' +
        '<span class="trip-card-date">' + dates + '</span>' +
      '</div>' +
      '<div class="trip-meta">' +
        (trip.destination ? '<span>📍 ' + trip.destination + '</span>' : '') +
        '<span>👥 ' + (trip.teams || '—') + ' teams</span>' +
      '</div>' +
      '<div class="trip-booking-status">' +
        '<div style="display:flex;gap:16px;align-items:center;">' +
          '<span>🏨</span>' + hotelStatus +
        '</div>' +
        '<div style="display:flex;gap:16px;align-items:center;">' +
          '<span>🚗</span>' + carStatus +
        '</div>' +
      '</div>' +
      '<div class="trip-view-link" onclick="event.stopPropagation();viewTrip(\'' + trip.id + '\')">📅 View & Book &gt;&gt;</div>' +
      '<div class="trip-big-buttons" onclick="event.stopPropagation()">' +
        '<button class="btn btn-hotel" onclick="window._bookTab=\'hotel\';viewTrip(\'' + trip.id + '\')">🏨 BOOK HOTEL</button>' +
        '<button class="btn btn-car" onclick="window._bookTab=\'car\';viewTrip(\'' + trip.id + '\')">🚗 BOOK CAR</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  app.innerHTML = html;
}

/* ═════════════════════════════════════════

// Trip Modal
let editingTripId=null;
let tripTags=[];

function openTripModal(tripId){
  editingTripId=tripId||null;
  tripTags=[];
  _checklistItems=[];
  const modal=document.getElementById('trip-modal');
  let trip={};
  if(tripId){
    trip=getTrips().find(t=>t.id===tripId)||{};
    tripTags=trip.tags||[];
    _checklistItems = (trip.checklist||[]).map(c=>({text:c.text,done:c.done}));
  }

  modal.innerHTML=`
    <div class="modal">
      <button class="modal-close" onclick="closeTripModal()">&times;</button>
      <h2>${tripId?'Edit Trip':'Create New Trip'}</h2>
      <div class="form-section">
        <h3>📍 Trip Details</h3>
        <div class="form-group">
          <label>Trip Name *</label>
          <input type="text" id="t-name" placeholder="e.g., Lafayette Tournament" value="${trip.name||''}">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Destination *</label>
            <input type="text" id="t-dest" placeholder="e.g., Lafayette, LA" value="${trip.destination||''}">
          </div>
          <div class="form-group">
            <label>Trip Type</label>
            <select id="t-type">
              <option value="tournament" ${trip.type==='tournament'?'selected':''}>Tournament</option>
              <option value="roadtrip" ${trip.type==='roadtrip'?'selected':''}>Road Trip</option>
              <option value="family" ${trip.type==='family'?'selected':''}>Family Vacation</option>
              <option value="business" ${trip.type==='business'?'selected':''}>Business</option>
              <option value="adventure" ${trip.type==='adventure'?'selected':''}>Adventure</option>
              <option value="other" ${trip.type==='other'||!trip.type?'selected':''}>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date *</label>
            <input type="date" id="t-start" value="${trip.startDate||''}">
          </div>
          <div class="form-group">
            <label>End Date *</label>
            <input type="date" id="t-end" value="${trip.endDate||''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Travelers</label>
            <input type="number" id="t-travelers" min="1" placeholder="3" value="${trip.travelers||''}">
          </div>
          <div class="form-group">
            <label>Budget Estimate ($)</label>
            <input type="number" id="t-budget" min="0" placeholder="500" value="${trip.budget||''}">
          </div>
        </div>
        <div class="form-section">
          <h3>💰 Costs</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Hotel Rate ($/night)</label>
              <input type="number" id="t-hotel-rate" min="0" placeholder="150" value="${trip.hotelRate||''}">
            </div>
            <div class="form-group">
              <label>Hotel Nights</label>
              <input type="number" id="t-hotel-nights" min="0" placeholder="3" value="${trip.hotelNights||''}">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Rental Car Rate ($/day)</label>
              <input type="number" id="t-car-rate" min="0" placeholder="65" value="${trip.carRate||''}">
            </div>
            <div class="form-group">
              <label>Rental Days</label>
              <input type="number" id="t-car-days" min="0" placeholder="3" value="${trip.carDays||''}">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Tags</label>
          <div class="tags-input" id="tags-container" onclick="document.getElementById('tag-input').focus()">
            ${tripTags.map(tag=>`<span class="tag">${tag}<button onclick="removeTag('${tag}')">&times;</button></span>`).join('')}
            <input type="text" id="tag-input" placeholder="Add tag + Enter" onkeydown="handleTagInput(event)">
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="t-desc" placeholder="Trip details, itinerary notes...">${trip.desc||''}</textarea>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="t-notes" placeholder="Private notes, confirmations, reminders...">${trip.notes||''}</textarea>
        </div>
        <div class="form-group">
          <label>✅ Pre-Trip Checklist</label>
          <div class="checklist-input" id="checklist-container">
            ${(trip.checklist||[]).map((item,i) => `<div class="checklist-item"><input type="checkbox" ${item.done?'checked':''} onchange="toggleChecklistItem(${i},'${trip.id||'NEW'}')"><span class="${item.done?'done':''}" ondblclick="editChecklistItem(${i},this,event)">${item.text}</span><button onclick="removeChecklistItem(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;margin-left:auto;font-size:1.1em;">&times;</button></div>`).join('')}
            <div style="display:flex;gap:8px;margin-top:8px;">
              <input type="text" id="t-checklist-input" placeholder="Add item..." onkeydown="if(event.key==='Enter')addChecklistItem()">
              <button class="btn btn-primary btn-sm" onclick="addChecklistItem()">+</button>
            </div>
          </div>
        </div>
      </div>
      <div style="display:none;" id="checklist-data">${JSON.stringify(trip.checklist||[]).replace(/"/g,'&quot;')}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="saveTrip()">${tripId?'Update Trip':'Create Trip'}</button>
        <button class="btn btn-secondary" onclick="closeTripModal()">Cancel</button>
        ${tripId?'<button class="btn btn-danger" style="margin-left:auto;" onclick="deleteCurrentTrip()">Delete Trip</button>':''}
      </div>
    </div>
  `;
  modal.classList.add('active');
}

function closeTripModal(){document.getElementById('trip-modal').classList.remove('active');editingTripId=null;tripTags=[];}

function handleTagInput(e){
  const input=document.getElementById('tag-input');
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const tag=input.value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
    if(tag&&!tripTags.includes(tag)){
      tripTags.push(tag);
      updateTagDisplay();
    }
    input.value='';
  }else if(e.key==='Backspace'&&input.value===''&&tripTags.length>0){
    tripTags.pop();
    updateTagDisplay();
  }
}

function removeTag(tag){
  tripTags=tripTags.filter(t=>t!==tag);
  updateTagDisplay();
}

function updateTagDisplay(){
  const container=document.getElementById('tags-container');
  const input=document.getElementById('tag-input');
  container.innerHTML=tripTags.map(tag=>`<span class="tag">${tag}<button onclick="removeTag('${tag}')">&times;</button></span>`).join('')+`<input type="text" id="tag-input" placeholder="Add tag + Enter" onkeydown="handleTagInput(event)">`;
  document.getElementById('tag-input').focus();
}

function saveTrip(){
  const name=document.getElementById('t-name').value.trim();
  const dest=document.getElementById('t-dest').value.trim();
  const start=document.getElementById('t-start').value;
  const end=document.getElementById('t-end').value;
  if(!name||!dest||!start||!end){showToast('Please fill in all required fields');return;}

  const trip={
    id:editingTripId||'trip-'+Date.now(),
    folderId:'tournaments',
    name,destination:dest,
    startDate:start,endDate:end,
    type:document.getElementById('t-type').value,
    travelers:parseInt(document.getElementById('t-travelers').value)||1,
    budget:parseFloat(document.getElementById('t-budget').value)||0,
    hotelRate:parseFloat(document.getElementById('t-hotel-rate').value)||0,
    hotelNights:parseInt(document.getElementById('t-hotel-nights').value)||0,
    carRate:parseFloat(document.getElementById('t-car-rate').value)||0,
    carDays:parseInt(document.getElementById('t-car-days').value)||0,
    tags:[...tripTags],
    desc:document.getElementById('t-desc').value,
    notes:document.getElementById('t-notes').value,
    checklist:[..._checklistItems],
    created:editingTripId?(getTrips().find(t=>t.id===editingTripId)?.created||Date.now()):Date.now(),
    updated:Date.now()
  };

  const trips=getTrips();
  if(editingTripId){
    const idx=trips.findIndex(t=>t.id===editingTripId);
    if(idx>=0)trips[idx]=trip;
  }else{
    trips.push(trip);
  }
  saveTrips(trips);
  closeTripModal();
  showToast(editingTripId?'Trip updated!':'Trip created!');
  renderMainView();
}

// Checklist functions (used by inline onclick in trip modal)
let _checklistItems = [];
let _checklistTripId = null;

function addChecklistItem(){
  const inp = document.getElementById('t-checklist-input');
  if(!inp||!inp.value.trim())return;
  const item = {text:inp.value.trim(),done:false};
  _checklistItems.push(item);
  inp.value='';
  renderChecklist();
  _checklistTripId = document.getElementById('checklist-data')?.getAttribute('data-trip-id') || '';
}

function removeChecklistItem(idx){
  _checklistItems.splice(idx,1);
  renderChecklist();
}

function toggleChecklistItem(idx){
  if(_checklistItems[idx]){
    _checklistItems[idx].done = !_checklistItems[idx].done;
    renderChecklist();
  }
}

function editChecklistItem(idx,el,e){
  e.stopPropagation();
  const current = _checklistItems[idx]?.text||'';
  const input = document.createElement('input');
  input.type='text';
  input.value=current;
  input.style.cssText='flex:1;padding:4px 8px;background:var(--black-card);border:1px solid var(--gold);border-radius:4px;color:var(--white);font-size:.85em;';
  el.replaceWith(input);
  input.focus();
  input.select();
  const save = (v)=>{
    if(v&&_checklistItems[idx]){
      _checklistItems[idx].text=v;
      renderChecklist();
    }else if(_checklistItems[idx]){
      renderChecklist();
    }
  };
  input.onblur=()=>save(input.value);
  input.onkeydown=(ke)=>{if(ke.key==='Enter'){input.blur();}else if(ke.key==='Escape'){renderChecklist();}};
}

function renderChecklist(){
  const container = document.getElementById('checklist-container');
  if(!container)return;
  const editId = _checklistTripId || document.getElementById('checklist-data')?.getAttribute('data-trip-id') || '';
  container.innerHTML = _checklistItems.map((item,i)=>`<div class="checklist-item"><input type="checkbox" ${item.done?'checked':''} onchange="toggleChecklistItem(${i})"><span class="${item.done?'done':''}" ondblclick="editChecklistItem(${i},this,event)">${item.text}</span><button onclick="removeChecklistItem(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;margin-left:auto;font-size:1.1em;">&times;</button></div>`).join('')+`<div style="display:flex;gap:8px;margin-top:8px;"><input type="text" id="t-checklist-input" placeholder="Add item..." onkeydown="if(event.key==='Enter')addChecklistItem()"><button class="btn btn-primary btn-sm" onclick="addChecklistItem()">+</button></div>`;
}

function deleteTrip(id){
  if(!confirm('Delete this trip?'))return;
  const trips=getTrips().filter(t=>t.id!==id);
  saveTrips(trips);
  showToast('Trip deleted');
  renderMainView();
}

function deleteCurrentTrip(){
  if(editingTripId)deleteTrip(editingTripId);
  closeTripModal();
}

// View Trip Detail
let viewTripId = null;

// Plan tab state
let planHotelResults = [];
let planCarResults = [];
let planSelectedHotel = null;
let planSelectedCar = null;
let planCurrentCity = '';

function getCityPricing(loc) {
  const city = loc.toLowerCase();
  let hotelBase = 110, carBase = 55;
  if (city.includes('new york') || city.includes('nyc') || city.includes('manhattan')) { hotelBase = 220; carBase = 85; }
  else if (city.includes('la ') || city.includes('los angeles') || city.includes('chicago')) { hotelBase = 190; carBase = 75; }
  else if (city.includes('atlanta') || city.includes('dallas') || city.includes('houston') || city.includes('austin')) { hotelBase = 140; carBase = 60; }
  else if (city.includes('lafayette') || city.includes('baton rouge') || city.includes('lake charles')) { hotelBase = 105; carBase = 50; }
  else if (city.includes('lexington') || city.includes('louisville') || city.includes('knoxville')) { hotelBase = 115; carBase = 52; }
  else if (city.includes('birmingham') || city.includes('mobile') || city.includes('huntsville')) { hotelBase = 120; carBase = 55; }
  return { hotelBase, carBase };
}

function generateHotels(loc) {
  const { hotelBase } = getCityPricing(loc);
  const city = loc.split(',')[0].trim();
  const state = loc.includes(',') ? loc.split(',')[1].trim().toUpperCase() : '';
  const streets = ['Main St', 'Commerce Dr', 'Park Ave', 'Broadway', 'Highway', 'Interstate Blvd', 'Industrial Pkwy', 'City Center Dr'];
  const r = (n) => Math.floor(Math.random()*n);
  return [
    { name: 'Hampton Inn & Suites', badge: 'best', badgeLabel: 'BEST VALUE', price: hotelBase, rating: 4.5, reviews: 1243, address: `${r(8000)+1000} ${streets[r(streets.length)]}, ${city}${state ? ', ' + state : ''}`, amenities: ['Free Breakfast', 'Free WiFi', 'Free Parking', 'Pool', 'Gym'], distance: '1.2 miles to downtown' },
    { name: 'Holiday Inn Express', badge: 'cheap', badgeLabel: 'CHEAPEST', price: Math.round(hotelBase * 0.85), rating: 4.2, reviews: 892, address: `${r(8000)+1000} ${streets[r(streets.length)]}, ${city}${state ? ', ' + state : ''}`, amenities: ['Free Breakfast', 'Free WiFi', 'Free Parking', 'Business Center'], distance: '2.8 miles to downtown' },
    { name: 'Marriott Courtyard', badge: 'rated', badgeLabel: 'HIGHEST RATED', price: Math.round(hotelBase * 1.25), rating: 4.7, reviews: 2156, address: `${r(8000)+1000} ${streets[r(streets.length)]}, ${city}${state ? ', ' + state : ''}`, amenities: ['Restaurant', 'Bar', 'Gym', 'Free WiFi', 'Room Service'], distance: '0.3 miles to downtown' },
    { name: 'La Quinta Inn & Suites', badge: 'close', badgeLabel: 'CLOSEST', price: Math.round(hotelBase * 0.95), rating: 4.0, reviews: 678, address: `${r(8000)+1000} ${streets[r(streets.length)]}, ${city}${state ? ', ' + state : ''}`, amenities: ['Free Breakfast', 'Free WiFi', 'Airport Shuttle', 'Parking'], distance: '0.8 miles to airport' }
  ];
}

function generateCars(loc) {
  const { carBase } = getCityPricing(loc);
  const city = loc.split(',')[0].trim();
  const streets = ['Airport Blvd', 'Terminal Dr', 'Aviation Rd', 'Downtown Ave', 'Main St', 'Commerce Blvd'];
  const r = (n) => Math.floor(Math.random()*n);
  return [

function planRenderStars(rating) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  let stars = '★'.repeat(full);
  if (half) stars += '½';
  return stars + '☆'.repeat(5 - Math.ceil(rating));
}

function planUpdateSummary() {
  const hotel = planSelectedHotel !== null ? planHotelResults[planSelectedHotel] : null;

  document.getElementById('plan-sum-hotel-name').textContent = hotel ? hotel.name : 'Not selected';

  document.getElementById('plan-sum-car-name').textContent = car ? car.name : 'Not selected';

  if (!viewTripId) return;
  const trips = getTrips();
  const trip = trips.find(t => t.id === viewTripId);
  if (!trip) return;
  const hotel = planSelectedHotel !== null ? planHotelResults[planSelectedHotel] : null;
  const car = planSelectedCar !== null ? planCarResults[planSelectedCar] : null;
  trip.hotelName = hotel ? hotel.name : '';
  trip.hotelPrice = hotel ? hotel.price : 0;
  trip.hotelAddress = hotel ? hotel.address : '';
  trip.hotelRating = hotel ? hotel.rating : 0;
  trip.carName = car ? car.name : '';
  trip.carPrice = car ? car.price : 0;
  trip.carAddress = car ? car.address : '';
  trip.carRating = car ? car.rating : 0;

  saveTrips(trips);

function formatDate(d){
  if(!d)return'—';
  const date=new Date(d+'T00:00:00');
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function formatDateShort(d){
  if(!d)return'—';
  const date=new Date(d+'T00:00:00');
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function countDays(start,end){
  if(!start||!end)return 0;
  const s=new Date(start+'T00:00:00');
  const e=new Date(end+'T00:00:00');
  const diff=Math.ceil((e-s)/(1000*60*60*24));
  return diff>0?diff+1:0;
}

  const toast=document.createElement('div');

  }
}, 3000);

// Handle ?tournament= param — find the trip and open it
var urlParams = new URLSearchParams(window.location.search);
var tourParam = urlParams.get('tournament');
if (tourParam) {
  var found = getTrips().find(function(t) { return t.name === tourParam; });
  if (found) {
    setTimeout(function() { viewTrip(found.id); }, 300);
  }
}

// Particles & Progress Bar
(function(){
  const container=document.getElementById("particles");
  if(!container)return;
  for(let i=0;i<25;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDelay=Math.random()*15+"s";
    p.style.animationDuration=(10+Math.random()*10)+"s";
    p.style.width=(2+Math.random()*3)+"px";
    p.style.height=p.style.width;
    container.appendChild(p);
  }
})();
window.addEventListener("scroll",()=>{
  const bar=document.getElementById("progress-bar");
  if(!bar)return;
  const scrollTop=document.documentElement.scrollTop||document.body.scrollTop;
  const scrollHeight=document.documentElement.scrollHeight-document.documentElement.clientHeight;
  bar.style.width=scrollHeight>0?(scrollTop/scrollHeight)*100+"%":"0%";
});
</script>
</body>
</html>
