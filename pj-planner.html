<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#C9A227;--gold-light:#E8C84B;--gold-dark:#B8941F;--gold-10:rgba(201,162,39,0.1);--gold-20:rgba(201,162,39,0.2);
  --black:#0A0A0A;--black-light:#141414;--black-card:#1A1A1A;--black-hover:#242424;
  --white:#F8F6F0;--gray:#A8A498;--gray-dark:#6B665C;--border:#2A2824;
  --green:#4CAF50;--red:#EF5350;--blue:#64B5F6;--orange:#FF9800;--purple:#B829DD;
}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);min-height:100vh;font-size:15px;}
::selection{background:rgba(201,162,39,0.3);color:var(--white);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;background:var(--black-light);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo-link{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--gold-dark);box-shadow:0 0 20px rgba(201,162,39,0.2);}
.logo-text{font-family:'Cinzel',serif;font-size:1.3em;font-weight:700;color:var(--gold);letter-spacing:3px;}
.user-info{display:flex;align-items:center;gap:20px;}
.user-name{font-family:'Cinzel',serif;color:var(--gold);font-size:.85em;letter-spacing:2px;}
.logout-btn{padding:8px 18px;background:transparent;border:1px solid var(--gray-dark);color:var(--gray);border-radius:8px;font-family:'Inter',sans-serif;font-size:.8em;cursor:pointer;transition:all .3s;}
.logout-btn:hover{border-color:var(--gold);color:var(--gold);}

/* Nav */
.nav{display:flex;gap:4px;padding:12px 30px;background:var(--black-light);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.nav a{padding:10px 20px;color:var(--gray);text-decoration:none;border-radius:8px;font-size:.85em;font-weight:500;transition:all .3s;letter-spacing:.5px;}
.nav a:hover{color:var(--white);background:var(--black-hover);}
.nav a.active{color:var(--gold);background:var(--gold-10);}

/* Main */
.main{max-width:1400px;margin:0 auto;padding:40px 30px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:30px;flex-wrap:wrap;gap:16px;}
.welcome{font-family:'Cinzel',serif;font-size:2.2em;font-weight:700;color:var(--gold);letter-spacing:1px;}
.subtitle{color:var(--gray);font-size:1em;}

/* Controls Bar */
.controls-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
.search-box{flex:1;min-width:260px;padding:12px 18px;background:var(--black-card);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Inter',sans-serif;font-size:.95em;outline:none;transition:all .2s;}
.search-box:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,0.1);}
.search-box::placeholder{color:var(--gray-dark);}
.filter-select{padding:12px 16px;background:var(--black-card);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Inter',sans-serif;font-size:.9em;outline:none;cursor:pointer;transition:all .2s;}
.filter-select:focus{border-color:var(--gold);}

/* Buttons */
.btn{padding:12px 24px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.9em;font-weight:600;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--black);box-shadow:0 4px 15px rgba(201,162,39,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(201,162,39,0.4);}
.btn-secondary{background:var(--black-card);border:1px solid var(--border);color:var(--white);}
.btn-secondary:hover{border-color:var(--gold);}
.btn-danger{background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.3);color:var(--red);}
.btn-danger:hover{background:rgba(239,83,80,0.2);}
.btn-success{background:linear-gradient(135deg,var(--green),#388E3C);color:var(--white);box-shadow:0 4px 15px rgba(76,175,80,0.3);}
.btn-success:hover{transform:translateY(-2px);}
.btn-sm{padding:8px 16px;font-size:.8em;}
.btn-icon{padding:8px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--gray);cursor:pointer;transition:all .2s;}
.btn-icon:hover{border-color:var(--gold);color:var(--gold);}

/* View Toggle */
.view-toggle{display:flex;gap:4px;background:var(--black-card);padding:4px;border-radius:10px;border:1px solid var(--border);}
.view-toggle button{padding:8px 14px;border-radius:6px;border:none;background:transparent;color:var(--gray);font-size:.85em;cursor:pointer;transition:all .2s;}
.view-toggle button.active{background:var(--gold-10);color:var(--gold);}
.view-toggle button:hover:not(.active){color:var(--white);}

/* Folder Cards */
.folders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:40px;}
.folder-card{background:var(--black-card);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.folder-card:hover{border-color:var(--gold-dark);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.5);}
.folder-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;opacity:.8;transition:opacity .3s;}
.folder-card:hover::before{opacity:1;}
.folder-card.drag-over{border-color:var(--gold);background:var(--gold-10);transform:scale(1.02);}
.folder-color-bar{position:absolute;top:0;left:0;right:0;height:4px;}
.folder-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.folder-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4em;background:var(--black-light);border:1px solid var(--border);}
.folder-title{font-family:'Cinzel',serif;font-size:.95em;color:var(--white);letter-spacing:1px;margin-bottom:2px;}
.folder-meta{font-size:.78em;color:var(--gray);}
.folder-stats{display:flex;gap:16px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.folder-stat{text-align:center;}
.folder-stat-value{font-family:'Cinzel',serif;font-size:1.3em;color:var(--gold);font-weight:700;}
.folder-stat-label{font-size:.7em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;}
.folder-actions{display:flex;gap:6px;margin-top:12px;opacity:0;transition:opacity .2s;}
.folder-card:hover .folder-actions{opacity:1;}

/* Share Badge */
.share-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:.7em;font-weight:600;}
.share-public{background:rgba(76,175,80,0.1);color:var(--green);border:1px solid rgba(76,175,80,0.2);}
.share-private{background:rgba(168,164,152,0.1);color:var(--gray);border:1px solid rgba(168,164,152,0.2);}

/* Trip Cards (inside folder view) */
.trips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.trip-card{background:var(--black-card);border:1px solid var(--border);border-radius:16px;padding:22px;transition:all .3s;position:relative;cursor:grab;}
.trip-card:hover{border-color:var(--gold-dark);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.4);}
.trip-card.dragging{opacity:.5;cursor:grabbing;}
.trip-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px;}
.trip-card-title{font-family:'Cinzel',serif;font-size:.95em;color:var(--white);letter-spacing:1px;line-height:1.3;flex:1;}
.trip-card-type{padding:4px 10px;border-radius:6px;font-size:.7em;font-weight:600;letter-spacing:.5px;border:1px solid;white-space:nowrap;}
.trip-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.trip-tag{padding:3px 10px;background:var(--black-light);border:1px solid var(--border);border-radius:6px;font-size:.78em;color:var(--gray);}
.trip-tag i{color:var(--gold);margin-right:4px;}
.trip-desc{color:var(--gray);font-size:.85em;line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.trip-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border);}
.trip-budget{font-family:'Cinzel',serif;color:var(--gold);font-size:1.1em;font-weight:700;}
.trip-travelers{font-size:.8em;color:var(--gray);}
.trip-actions{display:flex;gap:6px;}

/* Type colors */
.type-roadtrip{color:var(--blue);border-color:rgba(100,181,246,.3);background:rgba(100,181,246,.08);}
.type-family{color:var(--green);border-color:rgba(76,175,80,.3);background:rgba(76,175,80,.08);}
.type-business{color:var(--gold);border-color:rgba(201,162,39,.3);background:rgba(201,162,39,.08);}
.type-adventure{color:var(--orange);border-color:rgba(255,152,0,.3);background:rgba(255,152,0,.08);}
.type-tournament{color:var(--purple);border-color:rgba(184,41,221,.3);background:rgba(184,41,221,.08);}
.type-other{color:var(--gray);border-color:rgba(168,164,152,.3);background:rgba(168,164,152,.08);}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.modal-overlay.active{display:flex;}
.modal{background:var(--black-card);border:1px solid var(--border);border-radius:20px;padding:30px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .3s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal h2{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:20px;padding-right:40px;font-size:1.3em;}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--gray);font-size:1.8em;cursor:pointer;transition:color .2s;}
.modal-close:hover{color:var(--white);}

/* Forms */
.form-section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.form-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.form-section h3{font-family:'Cinzel',serif;color:var(--gold);font-size:.9em;margin-bottom:14px;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;color:var(--gray);font-size:.85em;margin-bottom:6px;font-weight:500;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;background:var(--black-light);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'Inter',sans-serif;font-size:.9em;outline:none;transition:all .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.1);}
.form-group input::placeholder{color:var(--gray-dark);}
.form-group textarea{min-height:80px;resize:vertical;}
.form-group input[type="date"]{color-scheme:dark;}

/* Color picker */
.color-picker{display:flex;gap:8px;flex-wrap:wrap;}
.color-option{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;position:relative;}
.color-option:hover{transform:scale(1.15);}
.color-option.active{border-color:var(--white);box-shadow:0 0 0 2px var(--gold);}
.color-option.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:14px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.8);}

/* Share modal content */
.share-url{display:flex;gap:8px;margin:16px 0;}
.share-url input{flex:1;padding:12px;background:var(--black-light);border:1px solid var(--border);border-radius:10px;color:var(--gold);font-family:'Inter',monospace;font-size:.85em;}
.share-options{margin:16px 0;padding:16px;background:var(--black-light);border-radius:12px;}
.share-options label{display:flex;align-items:center;gap:10px;margin-bottom:10px;color:var(--gray);font-size:.9em;cursor:pointer;}
.share-options input[type="checkbox"]{width:18px;height:18px;accent-color:var(--gold);}

/* Detail View (inside modal) */
.detail-view{padding:10px 0;}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px;}
.detail-title{font-family:'Cinzel',serif;font-size:1.5em;color:var(--gold);margin-bottom:6px;}
.detail-subtitle{color:var(--gray);font-size:.9em;}
.detail-section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.detail-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.detail-section h4{font-family:'Cinzel',serif;color:var(--gold);font-size:.85em;margin-bottom:12px;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:.9em;}
.detail-row .label{color:var(--gray);}
.detail-row .value{color:var(--white);font-weight:500;}
.detail-row .price{font-family:'Cinzel',serif;color:var(--gold);font-weight:700;}
.detail-actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;}

/* Empty state */
.empty-state{text-align:center;padding:80px 20px;color:var(--gray);}
.empty-state-icon{font-size:4em;margin-bottom:16px;}
.empty-state h3{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:10px;font-size:1.3em;}

/* Toast */
.toast{position:fixed;bottom:30px;right:30px;padding:16px 24px;background:var(--black-card);border:1px solid var(--gold);border-radius:12px;color:var(--white);font-family:'Inter',sans-serif;z-index:10000;animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;box-shadow:0 10px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;}
@keyframes toastIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes toastOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(100px);opacity:0;}}

/* Breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;color:var(--gray);font-size:.85em;flex-wrap:wrap;}
.breadcrumb a{color:var(--gold);text-decoration:none;transition:opacity .2s;}
.breadcrumb a:hover{opacity:.8;text-decoration:underline;}
.breadcrumb-sep{color:var(--gray-dark);}

/* Tags input */
.tags-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--black-light);border:1px solid var(--border);border-radius:10px;min-height:44px;}
.tags-input:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.1);}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--gold-10);border:1px solid var(--gold-20);border-radius:6px;font-size:.8em;color:var(--gold);}
.tag button{background:none;border:none;color:var(--gold);cursor:pointer;font-size:1.1em;padding:0;margin-left:2px;}
.tag button:hover{color:var(--red);}
.tags-input input{flex:1;min-width:80px;background:transparent;border:none;color:var(--white);font-family:'Inter',sans-serif;font-size:.9em;outline:none;padding:4px;}

/* Budget display */
.budget-bar{height:8px;background:var(--black-light);border-radius:4px;margin-top:6px;overflow:hidden;}
.budget-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}

/* Responsive */
@media(max-width:768px){
  .header{flex-direction:column;gap:15px;padding:15px 20px;}
  .nav{padding:10px 20px;}
  .main{padding:30px 20px;}
  .page-header{flex-direction:column;align-items:flex-start;}
  .welcome{font-size:1.6em;}
  .folders-grid,.trips-grid{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .controls-bar{flex-direction:column;align-items:stretch;}
  .search-box{width:100%;}
  .folder-actions{opacity:1;}
}
@media(max-width:480px){
  html{font-size:14px;}
  .modal{padding:20px;}
}

<script>
const NAME=sessionStorage.getItem('fs_name')||'User';
document.getElementById('user-name').textContent=NAME.toUpperCase();

// Nav
(function(){
  const role=sessionStorage.getItem('fs_role');
  const nav=document.getElementById('main-nav');
  if(!nav||!role)return;
  const links={owner:['dashboard','tournaments','inventory','trips','planner','team','tracker'],inventory:['dashboard','inventory','team','tracker'],logistics:['dashboard','trips','planner','team','tracker'],tournament:['dashboard','tournaments','team']};
  const labels={dashboard:'Dashboard',tournaments:'Tournaments',inventory:'Inventory',trips:'Trips',planner:'Planner',team:'Team',tracker:'Tracker'};
  const current='planner';
  nav.innerHTML=(links[role]||links.owner).map(p=>{
    const cls=p===current?'active':'';
    return`<a href="${p==='planner'?'pj-planner':p==='tracker'?'trip-tracker':p}.html" class="${cls}">${labels[p]}</a>`;
  }).join('');
})();

/* ═════════════════════════════════════════
   DATA STORE
   ═════════════════════════════════════════ */
const DB={folders:'fs_folders',trips:'fs_trips'};

function getFolders(){return JSON.parse(localStorage.getItem(DB.folders)||'[]');}
function getTrips(){return JSON.parse(localStorage.getItem(DB.trips)||'[]');}
function saveFolders(f){localStorage.setItem(DB.folders,JSON.stringify(f));}
function saveTrips(t){localStorage.setItem(DB.trips,JSON.stringify(t));}

const FOLDER_COLORS={
  gold:'#C9A227',blue:'#64B5F6',green:'#4CAF50',red:'#EF5350',
  purple:'#B829DD',orange:'#FF9800',teal:'#009688',pink:'#E91E63'
};

// Seed data if empty
function seedData(){
  let folders=getFolders();
  let trips=getTrips();
  if(folders.length===0){
    folders=[
      {id:'folder-1',name:'Spring 2026',desc:'Spring tournament season',color:'gold',icon:'🌸',public:false,password:'',created:Date.now(),updated:Date.now()},
      {id:'folder-2',name:'Summer Road Trips',desc:'Long haul summer tours',color:'blue',icon:'☀️',public:true,password:'',created:Date.now(),updated:Date.now()},
      {id:'folder-3',name:'Fall Baseball',desc:'Baseball tournaments',color:'green',icon:'⚾',public:false,password:'',created:Date.now(),updated:Date.now()}
    ];
    saveFolders(folders);
  }
  if(trips.length===0){

      <div>
        <div class="welcome">Trip Maker</div>

      <input type="text" class="search-box" placeholder="Search folders..." value="${searchQuery}" oninput="searchQuery=this.value;renderFolderList();">
      <button class="btn btn-primary" onclick="openFolderModal()">+ New Folder</button>
    </div>
  `;

  let displayFolders=folders;
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    displayFolders=folders.filter(f=>f.name.toLowerCase().includes(q)||(f.desc||'').toLowerCase().includes(q));
  }

  if(displayFolders.length===0){
    html+=`
      <div class="empty-state">
        <div class="empty-state-icon">📁</div>

    const folderTrips=trips.filter(t=>t.folderId===folder.id);
    const color=FOLDER_COLORS[folder.color]||FOLDER_COLORS.gold;

      ?`<span class="share-badge share-public">🌐 Public</span>`
      :`<span class="share-badge share-private">🔒 Private</span>`;

      <div class="folder-card" 
           onclick="openFolder('${folder.id}')"

           ondrop="handleDrop(event,'${folder.id}')"

        <div class="folder-header">

            <div class="folder-stat-value">${formatDate(folder.updated)}</div>

          <button class="btn-icon" onclick="openFolderModal('${folder.id}')" title="Edit">✏️</button>
          <button class="btn-icon" onclick="deleteFolder('${folder.id}')" title="Delete">🗑️</button>

    const q=searchQuery.toLowerCase();
    folderTrips=folderTrips.filter(t=>t.name.toLowerCase().includes(q)||t.destination.toLowerCase().includes(q)||(t.tags||[]).some(tag=>tag.toLowerCase().includes(q)));

  const app=document.getElementById('app');

  let html=`
    <div class="breadcrumb">
      <a href="#" onclick="currentFolderId=null;renderFolderList();return false;">Trip Maker</a>

    <div class="page-header">

        <option value="all" ${filterType==='all'?'selected':''}>All Types</option>
        <option value="roadtrip" ${filterType==='roadtrip'?'selected':''}>Road Trip</option>
        <option value="family" ${filterType==='family'?'selected':''}>Family</option>
        <option value="business" ${filterType==='business'?'selected':''}>Business</option>
        <option value="adventure" ${filterType==='adventure'?'selected':''}>Adventure</option>
        <option value="tournament" ${filterType==='tournament'?'selected':''}>Tournament</option>
      </select>
      <div class="view-toggle">
        <button class="${viewMode==='grid'?'active':''}" onclick="viewMode='grid';renderFolderView('${folderId}');">⊞ Grid</button>
        <button class="${viewMode==='list'?'active':''}" onclick="viewMode='list';renderFolderView('${folderId}');">☰ List</button>

      <button class="btn btn-secondary btn-sm" onclick="openFolderModal('${folder.id}')">✏️ Edit Folder</button>
      <button class="btn btn-danger btn-sm" onclick="deleteFolder('${folder.id}')">🗑️ Delete</button>
    </div>
  `;

  if(folderTrips.length===0){
    html+=`
      <div class="empty-state">
        <div class="empty-state-icon">✈️</div>
        <h3>${searchQuery||filterType!=='all'?'No matching trips':'No trips in this folder yet'}</h3>
        <p>${searchQuery||filterType!=='all'?'Adjust your search or filters':'Click "Create New Trip" to add your first trip'}</p>
      </div>
    `;
    app.innerHTML=html;
    return;
  }

  if(viewMode==='grid'){
    html+=`<div class="trips-grid">`;

        <span class="trip-tag">📍 ${trip.destination}</span>

    </div>
  `;
  modal.classList.add('active');
}

function closeTripModal(){document.getElementById('trip-modal').classList.remove('active');editingTripId=null;tripTags=[];}

function handleTagInput(e){
  const input=document.getElementById('tag-input');
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const tag=input.value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
    if(tag&&!tripTags.includes(tag)){
      tripTags.push(tag);
      updateTagDisplay();
    }
    input.value='';
  }else if(e.key==='Backspace'&&input.value===''&&tripTags.length>0){
    tripTags.pop();
    updateTagDisplay();
  }
}

function removeTag(tag){
  tripTags=tripTags.filter(t=>t!==tag);
  updateTagDisplay();
}

function updateTagDisplay(){
  const container=document.getElementById('tags-container');
  const input=document.getElementById('tag-input');
  container.innerHTML=tripTags.map(tag=>`<span class="tag">${tag}<button onclick="removeTag('${tag}')">&times;</button></span>`).join('')+`<input type="text" id="tag-input" placeholder="Add tag + Enter" onkeydown="handleTagInput(event)">`;
  document.getElementById('tag-input').focus();
}

function saveTrip(){
  const name=document.getElementById('t-name').value.trim();
  const dest=document.getElementById('t-dest').value.trim();
  const start=document.getElementById('t-start').value;
  const end=document.getElementById('t-end').value;
  if(!name||!dest||!start||!end){showToast('Please fill in all required fields');return;}

  const trip={
    id:editingTripId||'trip-'+Date.now(),
    folderId:currentFolderId||'folder-1',
    name,destination:dest,
    startDate:start,endDate:end,
    type:document.getElementById('t-type').value,
    travelers:parseInt(document.getElementById('t-travelers').value)||1,
    budget:parseFloat(document.getElementById('t-budget').value)||0,
    tags:[...tripTags],
    desc:document.getElementById('t-desc').value,
    notes:document.getElementById('t-notes').value,
    created:editingTripId?(getTrips().find(t=>t.id===editingTripId)?.created||Date.now()):Date.now(),
    updated:Date.now()
  };

  const trips=getTrips();
  if(editingTripId){
    const idx=trips.findIndex(t=>t.id===editingTripId);
    if(idx>=0)trips[idx]=trip;
  }else{
    trips.push(trip);
  }
  saveTrips(trips);
  updateFolderTimestamp(trip.folderId);
  closeTripModal();
  showToast(editingTripId?'Trip updated!':'Trip created!');
  if(currentFolderId)renderFolderView(currentFolderId);else renderFolderList();
}

function deleteTrip(id){
  if(!confirm('Delete this trip?'))return;
  const trips=getTrips().filter(t=>t.id!==id);
  saveTrips(trips);
  showToast('Trip deleted');
  if(currentFolderId)renderFolderView(currentFolderId);else renderFolderList();
}

function deleteCurrentTrip(){
  if(editingTripId)deleteTrip(editingTripId);
  closeTripModal();
}

let selectedFolderColor='gold';
function selectFolderColor(el){
  document.querySelectorAll('.color-option').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  selectedFolderColor=el.dataset.color;
}

function saveFolder(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('Folder name is required');return;}

  const folder={
    id:editingFolderId||'folder-'+Date.now(),
    name,
    icon:document.getElementById('f-icon').value||'📁',
    color:selectedFolderColor,
    desc:document.getElementById('f-desc').value,
    public:document.getElementById('f-public').checked,
    password:'',
    created:editingFolderId?(getFolders().find(f=>f.id===editingFolderId)?.created||Date.now()):Date.now(),
    updated:Date.now()
  };

  const folders=getFolders();
  if(editingFolderId){
    const idx=folders.findIndex(f=>f.id===editingFolderId);
    if(idx>=0){folder.public=folders[idx].public;folder.password=folders[idx].password||'';folders[idx]=folder;}
  }else{
    folders.push(folder);
  }
  saveFolders(folders);
  closeFolderModal();
  showToast(editingFolderId?'Folder updated!':'Folder created!');
  renderFolderList();
}

function deleteFolder(id){
  if(!confirm('Delete this folder? All trips inside will also be deleted.'))return;
  const trips=getTrips().filter(t=>t.folderId!==id);
  saveTrips(trips);
  const folders=getFolders().filter(f=>f.id!==id);
  saveFolders(folders);
  showToast('Folder deleted');
  if(currentFolderId===id){currentFolderId=null;renderFolderList();}else renderFolderList();
}

function deleteCurrentFolder(){
  if(editingFolderId)deleteFolder(editingFolderId);
  closeFolderModal();
}

        </label>
        <label>
          <input type="checkbox" id="share-password-toggle" ${folder.password?'checked':''} onchange="togglePassword('${folderId}',this.checked)">
          <span>Password protect</span>
        </label>
        <div id="password-field" style="display:${folder.password?'block':'none'};margin-top:10px;">
          <input type="text" id="share-password" placeholder="Enter password" value="${folder.password||''}" style="width:100%;padding:10px;background:var(--black-light);border:1px solid var(--border);border-radius:8px;color:var(--white);">
          <button class="btn btn-primary btn-sm" style="margin-top:8px;" onclick="setPassword('${folderId}')">Set Password</button>
        </div>
      </div>
      <button class="btn btn-secondary" onclick="closeShareModal()">Done</button>
    </div>
  `;
  modal.classList.add('active');
}

function closeShareModal(){document.getElementById('share-modal').classList.remove('active');}

function copyShareUrl(){
  const input=document.getElementById('share-url-input');
  input.select();
  document.execCommand('copy');
  showToast('Link copied to clipboard!');
}

function togglePublic(folderId,isPublic){
  const folders=getFolders();
  const f=folders.find(x=>x.id===folderId);
  if(f){f.public=isPublic;f.updated=Date.now();saveFolders(folders);showToast(isPublic?'Folder is now public':'Folder is now private');}
}

function togglePassword(folderId,hasPassword){
  document.getElementById('password-field').style.display=hasPassword?'block':'none';
  if(!hasPassword){
    const folders=getFolders();
    const f=folders.find(x=>x.id===folderId);
    if(f){f.password='';f.updated=Date.now();saveFolders(folders);showToast('Password removed');}
  }
}

function setPassword(folderId){
  const pwd=document.getElementById('share-password').value.trim();
  const folders=getFolders();
  const f=folders.find(x=>x.id===folderId);
  if(f){f.password=pwd;f.updated=Date.now();saveFolders(folders);showToast('Password set');}
}

// View Trip Detail
function viewTrip(tripId){
  const trip=getTrips().find(t=>t.id===tripId);
  if(!trip)return;
  const folder=getFolders().find(f=>f.id===trip.folderId);
  const days=countDays(trip.startDate,trip.endDate);
  const modal=document.getElementById('view-modal');

  const typeColors={roadtrip:'var(--blue)',family:'var(--green)',business:'var(--gold)',adventure:'var(--orange)',tournament:'var(--purple)',other:'var(--gray)'};

  let html=`
    <div class="modal">
      <button class="modal-close" onclick="closeViewModal()">&times;</button>
      <div class="detail-view">
        <div class="detail-header">
          <div>
            <div class="detail-title">${trip.name}</div>
            <div class="detail-subtitle">${folder?folder.name:'No folder'} • ${trip.destination}</div>
          </div>
          <div style="text-align:right;">
            <div style="color:${typeColors[trip.type]||'var(--gray)'};font-size:.85em;text-transform:uppercase;letter-spacing:2px;">${trip.type||'Other'}</div>
            <div style="font-family:Cinzel,serif;color:var(--gold);font-size:1.8em;font-weight:700;">$${trip.budget||0}</div>
          </div>
        </div>
  `;

  html+=`
    <div class="detail-section">
      <h4>📍 Trip Info</h4>
      <div class="detail-row"><span class="label">Destination</span><span class="value">${trip.destination}</span></div>
      <div class="detail-row"><span class="label">Dates</span><span class="value">${formatDate(trip.startDate)} - ${formatDate(trip.endDate)} (${days} days)</span></div>
      <div class="detail-row"><span class="label">Travelers</span><span class="value">${trip.travelers||1} people</span></div>
    </div>
  `;

  if(trip.tags&&trip.tags.length){
    html+=`
      <div class="detail-section">
        <h4>🏷️ Tags</h4>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${trip.tags.map(t=>`<span class="trip-tag">#${t}</span>`).join('')}
        </div>
      </div>
    `;
  }

  if(trip.desc){
    html+=`
      <div class="detail-section">
        <h4>📝 Description</h4>
        <p style="color:var(--gray);line-height:1.7;font-size:.9em;">${trip.desc}</p>
      </div>
    `;
  }

  if(trip.notes){
    html+=`
      <div class="detail-section">
        <h4>🔒 Private Notes</h4>
        <p style="color:var(--gray);line-height:1.7;font-size:.9em;white-space:pre-wrap;">${trip.notes}</p>
      </div>
    `;
  }

  html+=`
        <div class="detail-actions">
          <button class="btn btn-primary" onclick="closeViewModal();openTripModal('${trip.id}');">✏️ Edit Trip</button>
          <button class="btn btn-success" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(trip.destination)}','_blank')">🗺️ Open Map</button>
          <button class="btn btn-danger" style="margin-left:auto;" onclick="closeViewModal();deleteTrip('${trip.id}');">🗑️ Delete</button>
        </div>
      </div>
    </div>
  `;

  modal.innerHTML=html;
  modal.classList.add('active');
}

function closeViewModal(){document.getElementById('view-modal').classList.remove('active');}

/* ═════════════════════════════════════════
   DRAG & DROP
   ═════════════════════════════════════════ */
let draggedTripId=null;

function handleDragStart(e,tripId){draggedTripId=tripId;e.dataTransfer.effectAllowed='move';e.target.classList.add('dragging');}
function handleDragEnd(e){e.target.classList.remove('dragging');draggedTripId=null;}
function handleDrop(e,folderId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!draggedTripId)return;
  const trips=getTrips();
  const trip=trips.find(t=>t.id===draggedTripId);
  if(trip&&trip.folderId!==folderId){
    trip.folderId=folderId;
    trip.updated=Date.now();
    saveTrips(trips);
    updateFolderTimestamp(folderId);
    updateFolderTimestamp(trip.folderId);
    showToast('Trip moved to folder');
    renderFolderList();
  }
}

/* ═════════════════════════════════════════
   UTILITIES
   ═════════════════════════════════════════ */
function formatDate(d){
  if(!d)return'—';
  const date=new Date(d+'T00:00:00');
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function formatDateShort(d){
  if(!d)return'—';
  const date=new Date(d+'T00:00:00');
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function countDays(start,end){
  if(!start||!end)return 0;
  const s=new Date(start+'T00:00:00');
  const e=new Date(end+'T00:00:00');
  const diff=Math.ceil((e-s)/(1000*60*60*24));
  return diff>0?diff+1:0;
}
function updateFolderTimestamp(folderId){
  const folders=getFolders();
  const f=folders.find(x=>x.id===folderId);
  if(f){f.updated=Date.now();saveFolders(folders);}
}
function showToast(msg){
  const existing=document.querySelector('.toast');
  if(existing)existing.remove();
  const toast=document.createElement('div');
  toast.className='toast';
  toast.innerHTML=`✅ ${msg}`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),3000);
}
function logout(){sessionStorage.clear();window.location.href='signin.html';}

(function(){
  const container=document.getElementById("particles");
  if(!container)return;
  for(let i=0;i<25;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDelay=Math.random()*15+"s";
    p.style.animationDuration=(10+Math.random()*10)+"s";
    p.style.width=(2+Math.random()*3)+"px";
    p.style.height=p.style.width;
    container.appendChild(p);
  }
})();
window.addEventListener("scroll",()=>{
  const bar=document.getElementById("progress-bar");
  if(!bar)return;
  const scrollTop=document.documentElement.scrollTop||document.body.scrollTop;
  const scrollHeight=document.documentElement.scrollHeight-document.documentElement.clientHeight;
  bar.style.width=scrollHeight>0?(scrollTop/scrollHeight)*100+"%":"0%";
});
</script>
