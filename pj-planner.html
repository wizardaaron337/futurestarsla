<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJ Trip Planner — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css?v=2">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --black-hover: #242424;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --green: #4CAF50;
            --red: #EF5350;
            --blue: #64B5F6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            font-size: 15px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold-dark);
            box-shadow: 0 0 20px rgba(201,162,39,0.2);
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
        }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-name {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.85em;
            letter-spacing: 2px;
        }
        .logout-btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid var(--gray-dark);
            color: var(--gray);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover { border-color: var(--gold); color: var(--gold); }
        .nav {
            display: flex;
            gap: 4px;
            padding: 12px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .nav a {
            padding: 10px 20px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .nav a:hover { color: var(--white); background: var(--black-hover); }
        .nav a.active { color: var(--gold); background: rgba(201,162,39,0.08); }

        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
        }
        .welcome {
            font-family: 'Cinzel', serif;
            font-size: 2.2em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .subtitle { color: var(--gray); margin-bottom: 35px; font-size: 1em; }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(201,162,39,0.3);
        }
        .btn-secondary {
            background: var(--black-card);
            border: 1px solid var(--border);
            color: var(--white);
        }
        .btn-secondary:hover { border-color: var(--gold); }
        .btn-danger {
            background: rgba(239,83,80,0.1);
            border: 1px solid rgba(239,83,80,0.3);
            color: var(--red);
        }
        .btn-danger:hover { background: rgba(239,83,80,0.2); }
        .btn-success {
            background: linear-gradient(135deg, var(--green), #388E3C);
            color: var(--white);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(76,175,80,0.3);
        }

        /* Plan Cards Grid */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }
        .plan-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .plan-card:hover {
            border-color: var(--gold-dark);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .plan-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .plan-card:hover::before { opacity: 1; }
        .plan-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            gap: 12px;
        }
        .plan-card-title {
            font-family: 'Cinzel', serif;
            font-size: 1em;
            color: var(--gold);
            letter-spacing: 1px;
            line-height: 1.3;
        }
        .plan-card-status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7em;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .status-planned {
            background: rgba(100,181,246,0.1);
            color: var(--blue);
            border: 1px solid rgba(100,181,246,0.2);
        }
        .status-booked {
            background: rgba(76,175,80,0.1);
            color: var(--green);
            border: 1px solid rgba(76,175,80,0.2);
        }
        .plan-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }
        .meta-tag {
            padding: 4px 10px;
            background: rgba(201,162,39,0.06);
            border: 1px solid rgba(201,162,39,0.12);
            border-radius: 6px;
            font-size: 0.8em;
            color: var(--gray);
        }
        .plan-cost-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.88em;
            border-bottom: 1px solid var(--border);
        }
        .plan-cost-row:last-child { border-bottom: none; }
        .cost-label { color: var(--gray); }
        .cost-value {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-weight: 700;
        }
        .plan-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            margin-top: 12px;
            border-top: 2px solid var(--gold);
        }
        .total-label {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.85em;
            letter-spacing: 2px;
        }
        .total-value {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.3em;
            font-weight: 700;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 20px;
            padding-right: 40px;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: var(--gray);
            font-size: 1.8em;
            cursor: pointer;
        }
        .modal-close:hover { color: var(--white); }

        /* Form Styles */
        .form-section {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .form-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .form-section h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.95em;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            color: var(--gray);
            font-size: 0.85em;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--black-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,162,39,0.1);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* Detail View */
        .detail-view {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .detail-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            color: var(--gold);
            margin-bottom: 6px;
        }
        .detail-subtitle {
            color: var(--gray);
            font-size: 0.9em;
        }
        .detail-section {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .detail-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .detail-section h4 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.9em;
            margin-bottom: 12px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 0.9em;
        }
        .detail-row .label { color: var(--gray); }
        .detail-row .value { color: var(--white); font-weight: 500; }
        .detail-row .price {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-weight: 700;
        }
        .detail-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        /* Status badge selector */
        .status-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .status-option {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--black-light);
            color: var(--gray);
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .status-option:hover { border-color: var(--gold); color: var(--white); }
        .status-option.active {
            border-color: var(--gold);
            background: rgba(201,162,39,0.1);
            color: var(--gold);
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; padding: 15px 20px; }
            .nav { padding: 10px 20px; }
            .main { padding: 30px 20px; }
            .plans-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .detail-header { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progress-bar"></div>
    <div class="particles" id="particles"></div>
    <script>if(!sessionStorage.getItem("fs_auth")||sessionStorage.getItem("fs_pin_verified")!=="true"){window.location.href="signin.html";}</script>
    <div class="header">
        <a href="dashboard.html" class="logo-link">
            <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
            <span class="logo-text">FUTURE STARS</span>
        </a>
        <div class="user-info">
            <span class="user-name" id="user-name"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    <nav class="nav" id="main-nav"></nav>

    <div class="main">
        <div class="welcome">Trip Planner</div>
        <div class="subtitle" id="subtitle">Create and manage trip plans</div>

        <div class="controls">
            <button class="btn btn-primary" onclick="openCreateModal()">+ New Trip Plan</button>
            <button class="btn btn-secondary" onclick="showActive()">Active Plans</button>
            <button class="btn btn-secondary" onclick="showAll()">All Plans</button>
        </div>

        <div id="plans-container"></div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
        <div class="modal">
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
            <h2 id="modal-title">New Trip Plan</h2>
            <input type="hidden" id="edit-id">

            <div class="form-section">
                <h3>📍 Trip Info</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Trip Name</label>
                        <input type="text" id="trip-name" placeholder="e.g., Lafayette Tournament">
                    </div>
                    <div class="form-group">
                        <label>Location (City, State)</label>
                        <input type="text" id="trip-location" placeholder="e.g., Lafayette, LA">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Dates</label>
                        <input type="text" id="trip-dates" placeholder="e.g., May 15-16, 2026">
                    </div>
                    <div class="form-group">
                        <label>Crew Members</label>
                        <input type="text" id="trip-crew" placeholder="e.g., PJ, Caleb">
                    </div>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <div class="status-selector">
                        <div class="status-option active" data-status="planned" onclick="selectStatus(this)">Planned</div>
                        <div class="status-option" data-status="booked" onclick="selectStatus(this)">Booked</div>
                        <div class="status-option" data-status="ready" onclick="selectStatus(this)">Ready</div>
                        <div class="status-option" data-status="completed" onclick="selectStatus(this)">Completed</div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>🏨 Hotel</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Hotel Name</label>
                        <input type="text" id="hotel-name" placeholder="e.g., Hampton Inn & Suites">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="hotel-address" placeholder="e.g., 6085 Industrial Pkwy">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nights</label>
                        <input type="number" id="hotel-nights" placeholder="2" min="0">
                    </div>
                    <div class="form-group">
                        <label>Rate/Night ($)</label>
                        <input type="number" id="hotel-rate" placeholder="105" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirmation #</label>
                    <input type="text" id="hotel-confirmation" placeholder="Optional">
                </div>
            </div>

            <div class="form-section">
                <h3>🚗 Car Rental</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" id="car-company" placeholder="e.g., Hertz">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="car-address" placeholder="e.g., 1122 Aviation Rd">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Days</label>
                        <input type="number" id="car-days" placeholder="2" min="0">
                    </div>
                    <div class="form-group">
                        <label>Rate/Day ($)</label>
                        <input type="number" id="car-rate" placeholder="57" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirmation #</label>
                    <input type="text" id="car-confirmation" placeholder="Optional">
                </div>
            </div>

            <div class="form-section">
                <h3>📝 Notes</h3>
                <div class="form-group">
                    <textarea id="trip-notes" placeholder="Add any notes about this trip..."></textarea>
                </div>
            </div>

            <div style="display:flex; gap:10px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="savePlan()">Save Plan</button>
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-danger" id="delete-btn" style="display:none; margin-left:auto;" onclick="deleteCurrentPlan()">Delete</button>
            </div>
        </div>
    </div>

    <!-- View Detail Modal -->
    <div class="modal-overlay" id="view-modal" onclick="if(event.target===this)closeViewModal()">
        <div class="modal" id="view-modal-content">
            <!-- Filled dynamically -->
        </div>
    </div>

    <script>
        const NAME = sessionStorage.getItem('fs_name') || 'User';
        document.getElementById('user-name').textContent = NAME.toUpperCase();

        // Nav
        (function() {
            const role = sessionStorage.getItem('fs_role');
            const nav = document.getElementById('main-nav');
            if (!nav || !role) return;
            const links = { owner: ['dashboard','tournaments','inventory','trips','planner','team','tracker'], inventory: ['dashboard','inventory','team','tracker'], logistics: ['dashboard','trips','planner','team','tracker'], tournament: ['dashboard','tournaments','team'] };
            const labels = { dashboard:'Dashboard', tournaments:'Tournaments', inventory:'Inventory', trips:'Trips', planner:'Planner', team:'Team', tracker:'Tracker' };
            const current = 'planner';
            nav.innerHTML = (links[role] || links.owner).map(p => {
                const cls = p === current ? 'active' : '';
                return `<a href="${p === 'planner' ? 'pj-planner' : p === 'tracker' ? 'trip-tracker' : p}.html" class="${cls}">${labels[p]}</a>`;
            }).join('');
        })();

        const STORAGE_KEY = 'fs_pj_plans';
        let currentFilter = 'active';
        let editingId = null;

        function getPlans() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }
        function savePlans(plans) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(plans));
            render();
        }

        function render() {
            const plans = getPlans();
            const container = document.getElementById('plans-container');
            const now = new Date();
            
            let filtered = plans;
            if (currentFilter === 'active') {
                filtered = plans.filter(p => p.status !== 'completed');
            }

            // Sort by created date (newest first)
            filtered.sort((a,b) => b.created - a.created);

            document.getElementById('subtitle').textContent = 
                `${filtered.length} trip plan${filtered.length !== 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:80px 20px; color:var(--gray);">
                        <div style="font-size:3em; margin-bottom:16px;">📋</div>
                        <h3 style="font-family:Cinzel,serif; color:var(--gold); margin-bottom:10px;">No trip plans yet</h3>
                        <p>Click "New Trip Plan" to create your first plan</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '<div class="plans-grid">' + filtered.map(plan => {
                const hotelTotal = (plan.hotel?.nights || 0) * (plan.hotel?.rate || 0);
                const carTotal = (plan.car?.days || 0) * (plan.car?.rate || 0);
                const total = hotelTotal + carTotal;
                
                const statusClass = plan.status === 'booked' ? 'status-booked' : 'status-planned';
                const statusLabel = plan.status ? plan.status.toUpperCase() : 'PLANNED';

                return `
                    <div class="plan-card" onclick="viewPlan(${plan.id})">
                        <div class="plan-card-header">
                            <div class="plan-card-title">${plan.name || 'Untitled'}</div>
                            <div class="plan-card-status ${statusClass}">${statusLabel}</div>
                        </div>
                        <div class="plan-card-meta">
                            <span class="meta-tag">${plan.location || '—'}</span>
                            <span class="meta-tag">${plan.dates || '—'}</span>
                            ${plan.crew ? `<span class="meta-tag">${plan.crew}</span>` : ''}
                        </div>
                        <div class="plan-cost-row">
                            <span class="cost-label">🏨 Hotel</span>
                            <span class="cost-value">$${hotelTotal}</span>
                        </div>
                        <div class="plan-cost-row">
                            <span class="cost-label">🚗 Car</span>
                            <span class="cost-value">$${carTotal}</span>
                        </div>
                        <div class="plan-total">
                            <span class="total-label">TOTAL</span>
                            <span class="total-value">$${total}</span>
                        </div>
                    </div>
                `;
            }).join('') + '</div>';
        }

        function openCreateModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = 'New Trip Plan';
            document.getElementById('edit-id').value = '';
            document.getElementById('delete-btn').style.display = 'none';
            
            // Clear all inputs
            document.querySelectorAll('#edit-modal input:not([type="hidden"]), #edit-modal textarea').forEach(i => i.value = '');
            document.querySelectorAll('.status-option').forEach(s => s.classList.remove('active'));
            document.querySelector('.status-option[data-status="planned"]').classList.add('active');
            
            document.getElementById('edit-modal').classList.add('active');
        }

        function openEditModal(id) {
            const plans = getPlans();
            const plan = plans.find(p => p.id === id);
            if (!plan) return;
            
            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Trip Plan';
            document.getElementById('edit-id').value = id;
            document.getElementById('delete-btn').style.display = 'block';
            
            document.getElementById('trip-name').value = plan.name || '';
            document.getElementById('trip-location').value = plan.location || '';
            document.getElementById('trip-dates').value = plan.dates || '';
            document.getElementById('trip-crew').value = plan.crew || '';
            document.getElementById('trip-notes').value = plan.notes || '';
            
            document.getElementById('hotel-name').value = plan.hotel?.name || '';
            document.getElementById('hotel-address').value = plan.hotel?.address || '';
            document.getElementById('hotel-nights').value = plan.hotel?.nights || '';
            document.getElementById('hotel-rate').value = plan.hotel?.rate || '';
            document.getElementById('hotel-confirmation').value = plan.hotel?.confirmation || '';
            
            document.getElementById('car-company').value = plan.car?.company || '';
            document.getElementById('car-address').value = plan.car?.address || '';
            document.getElementById('car-days').value = plan.car?.days || '';
            document.getElementById('car-rate').value = plan.car?.rate || '';
            document.getElementById('car-confirmation').value = plan.car?.confirmation || '';
            
            document.querySelectorAll('.status-option').forEach(s => s.classList.remove('active'));
            const statusOpt = document.querySelector(`.status-option[data-status="${plan.status}"]`);
            if (statusOpt) statusOpt.classList.add('active');
            
            document.getElementById('edit-modal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
            editingId = null;
        }

        function selectStatus(el) {
            document.querySelectorAll('.status-option').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        function getSelectedStatus() {
            const active = document.querySelector('.status-option.active');
            return active ? active.dataset.status : 'planned';
        }

        function savePlan() {
            const plan = {
                id: editingId || Date.now(),
                name: document.getElementById('trip-name').value || 'Untitled Trip',
                location: document.getElementById('trip-location').value || '',
                dates: document.getElementById('trip-dates').value || '',
                crew: document.getElementById('trip-crew').value || '',
                status: getSelectedStatus(),
                notes: document.getElementById('trip-notes').value || '',
                hotel: {
                    name: document.getElementById('hotel-name').value || '',
                    address: document.getElementById('hotel-address').value || '',
                    nights: parseInt(document.getElementById('hotel-nights').value) || 0,
                    rate: parseFloat(document.getElementById('hotel-rate').value) || 0,
                    confirmation: document.getElementById('hotel-confirmation').value || ''
                },
                car: {
                    company: document.getElementById('car-company').value || '',
                    address: document.getElementById('car-address').value || '',
                    days: parseInt(document.getElementById('car-days').value) || 0,
                    rate: parseFloat(document.getElementById('car-rate').value) || 0,
                    confirmation: document.getElementById('car-confirmation').value || ''
                },
                created: editingId ? (getPlans().find(p => p.id === editingId)?.created || Date.now()) : Date.now()
            };

            const plans = getPlans();
            if (editingId) {
                const idx = plans.findIndex(p => p.id === editingId);
                if (idx >= 0) plans[idx] = plan;
            } else {
                plans.push(plan);
            }
            savePlans(plans);
            closeEditModal();
        }

        function deleteCurrentPlan() {
            if (!editingId) return;
            if (!confirm('Delete this trip plan?')) return;
            const plans = getPlans().filter(p => p.id !== editingId);
            savePlans(plans);
            closeEditModal();
            closeViewModal();
        }

        function viewPlan(id) {
            const plans = getPlans();
            const plan = plans.find(p => p.id === id);
            if (!plan) return;

            const hotelTotal = (plan.hotel?.nights || 0) * (plan.hotel?.rate || 0);
            const carTotal = (plan.car?.days || 0) * (plan.car?.rate || 0);
            const total = hotelTotal + carTotal;

            const statusColors = {
                planned: 'var(--blue)',
                booked: 'var(--green)',
                ready: 'var(--gold)',
                completed: 'var(--gray)'
            };

            let html = `
                <button class="modal-close" onclick="closeViewModal()">&times;</button>
                <div class="detail-view">
                    <div class="detail-header">
                        <div>
                            <div class="detail-title">${plan.name || 'Untitled'}</div>
                            <div class="detail-subtitle">${plan.location || '—'} • ${plan.dates || '—'}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-family:Cinzel,serif; color:${statusColors[plan.status] || 'var(--gray)'}; font-size:0.85em; letter-spacing:2px; text-transform:uppercase;">${plan.status || 'planned'}</div>
                            <div style="font-family:Cinzel,serif; color:var(--gold); font-size:1.6em; font-weight:700; margin-top:4px;">$${total}</div>
                        </div>
                    </div>
            `;

            html += `
                <div class="detail-section">
                    <h4>📍 Trip Info</h4>
                    <div class="detail-row"><span class="label">Location</span><span class="value">${plan.location || '—'}</span></div>
                    <div class="detail-row"><span class="label">Dates</span><span class="value">${plan.dates || '—'}</span></div>
                    <div class="detail-row"><span class="label">Crew</span><span class="value">${plan.crew || '—'}</span></div>
                </div>
            `;

            if (plan.hotel?.name) {
                html += `
                    <div class="detail-section">
                        <h4>🏨 Hotel</h4>
                        <div class="detail-row"><span class="label">Name</span><span class="value">${plan.hotel.name}</span></div>
                        <div class="detail-row"><span class="label">Address</span><span class="value">${plan.hotel.address || '—'}</span></div>
                        <div class="detail-row"><span class="label">Stay</span><span class="value">${plan.hotel.nights} nights @ $${plan.hotel.rate}/night</span></div>
                        ${plan.hotel.confirmation ? `<div class="detail-row"><span class="label">Confirmation</span><span class="value">${plan.hotel.confirmation}</span></div>` : ''}
                        <div class="detail-row" style="margin-top:8px; padding-top:8px; border-top:1px solid var(--border);"><span class="label">Hotel Total</span><span class="price">$${hotelTotal}</span></div>
                    </div>
                `;
            }

            if (plan.car?.company) {
                html += `
                    <div class="detail-section">
                        <h4>🚗 Car Rental</h4>
                        <div class="detail-row"><span class="label">Company</span><span class="value">${plan.car.company}</span></div>
                        <div class="detail-row"><span class="label">Address</span><span class="value">${plan.car.address || '—'}</span></div>
                        <div class="detail-row"><span class="label">Rental</span><span class="value">${plan.car.days} days @ $${plan.car.rate}/day</span></div>
                        ${plan.car.confirmation ? `<div class="detail-row"><span class="label">Confirmation</span><span class="value">${plan.car.confirmation}</span></div>` : ''}
                        <div class="detail-row" style="margin-top:8px; padding-top:8px; border-top:1px solid var(--border);"><span class="label">Car Total</span><span class="price">$${carTotal}</span></div>
                    </div>
                `;
            }

            if (plan.notes) {
                html += `
                    <div class="detail-section">
                        <h4>📝 Notes</h4>
                        <p style="color:var(--gray); line-height:1.7; font-size:0.9em; white-space:pre-wrap;">${plan.notes}</p>
                    </div>
                `;
            }

            html += `
                    <div class="detail-actions">
                        <button class="btn btn-primary" onclick="closeViewModal(); openEditModal(${plan.id});">✏️ Edit Plan</button>
                        <button class="btn btn-success" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(plan.location || '')}', '_blank')">🗺️ Open Map</button>
                        <button class="btn btn-danger" style="margin-left:auto;" onclick="deletePlan(${plan.id})">🗑️ Delete</button>
                    </div>
                </div>
            `;

            document.getElementById('view-modal-content').innerHTML = html;
            document.getElementById('view-modal').classList.add('active');
        }

        function closeViewModal() {
            document.getElementById('view-modal').classList.remove('active');
        }

        function deletePlan(id) {
            if (!confirm('Delete this trip plan?')) return;
            const plans = getPlans().filter(p => p.id !== id);
            savePlans(plans);
            closeViewModal();
        }

        function showActive() {
            currentFilter = 'active';
            render();
        }

        function showAll() {
            currentFilter = 'all';
            render();
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'signin.html';
        }

        // Keyboard support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeEditModal();
                closeViewModal();
            }
        });

        // Init
        render();
    </script>
    <script>
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
        window.addEventListener("scroll", function(){
            const bar = document.getElementById("progress-bar");
            if (!bar) return;
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = scrollHeight > 0 ? (scrollTop/scrollHeight)*100 : 0;
            bar.style.width = pct+"%";
        });
    </script>
</body>
</html>
