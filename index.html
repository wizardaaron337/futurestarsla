    <style>

<body>
    <div id="app-root"></div>

    <script>
        const AUTH_USER = sessionStorage.getItem('fs_auth');
        const AUTH_NAME = sessionStorage.getItem('fs_name');
        const AUTH_ROLE = sessionStorage.getItem('fs_role');
        const AUTH_VERIFIED = sessionStorage.getItem('fs_pin_verified') === 'true';
        const isLoggedIn = AUTH_USER && AUTH_VERIFIED;

        if (!isLoggedIn) {
            // Show landing page
            document.getElementById('app-root').innerHTML = `
                <div class="landing">
                    <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
                    <h1>FUTURE STARS</h1>
                    <div class="subtitle">Sports Co</div>
                    <p>Championship sports merchandise. Tournament operations. Inventory management.</p>
                    <a href="signin" class="btn-signin">Sign In</a>
                </div>
            `;
        } else {
            // Show home page with trip data
            document.getElementById('app-root').innerHTML = `
                <div class="header-bar">
                    <div class="logo-wrap">
                        <img src="images/fs.jpeg" alt="Future Stars">
                        <span>FUTURE STARS</span>
                    </div>
                    <div class="user-badge">
                        <strong>${AUTH_NAME || AUTH_USER}</strong>
                        <a class="sign-out" onclick="signOut()" href="#">Sign Out</a>
                    </div>
                </div>
                <div class="main-content" id="home-content">
                    <div class="loading-pulse">Loading trips...</div>
                </div>
                <div class="footer">Future Stars Sports Co &copy; 2026</div>
            `;
        }

        function parseOrdinal(s) {
            if (!s) return 0;
            return parseInt(s.replace(/[^0-9]/g, '')) || 0;
        }

        function formatDate(startOrdinal, endOrdinal, month) {
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const m = months.findIndex(m => m.toLowerCase().startsWith((month || '').toLowerCase().substring(0,3)));
            const year = 2026;
            if (m >= 0 && startOrdinal) {
                const start = new Date(year, m, startOrdinal);
                const end = endOrdinal ? new Date(year, m, endOrdinal) : null;
                if (end && end > start) {
                    return start.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' - ' + end.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
                }
                return start.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
            }
            return (month || '') + ' ' + (startOrdinal || '') + (endOrdinal ? '-' + endOrdinal : '');
        }

        function POC(trip) {
            // Return the first crew member name as the POC contact
            const crew = (trip.crew || '').split(',').map(n => n.trim()).filter(Boolean);
            return crew[0] || 'N/A';
        }

        function renderHome() {
            const content = document.getElementById('home-content');
            if (!content || typeof CREW_TRIPS === 'undefined') {
                if (content) content.innerHTML = '<div class="empty-state"><div class="big">😕</div><p>Could not load trip data</p></div>';
                return;
            }

            const now = new Date();
            const currentMonth = now.toLocaleDateString('en-US', {month:'long'});
            
            const all = CREW_TRIPS;
            
            // Get upcoming trips: status LOCKED IN, future month
            const upcoming = all.filter(t => {
                return t.status === 'LOCKED IN' || t.status === '';
            }).slice(0, 5); // top 5

            // Trips needing packing - those with status LOCKED IN but no leave date set
            const needPack = all.filter(t => {
                return t.status === 'LOCKED IN' && (!t.leaveDate || t.leaveDate.trim() === '');
            }).slice(0, 5);

            // Trips currently out (have leave date but no rental return)
            const currentlyOut = all.filter(t => {
                return t.leaveDate && t.leaveDate.trim() !== '' && (!t.rentalReturn || t.rentalReturn.trim() === '');
            }).slice(0, 5);

            content.innerHTML = '';

            // Section: Quick Links (role-based)
            const roleLinks = {
                owner: ['tournaments','inventory-v2','trips','trip-tracker','trip-planner','team','jersey-gallery','tournament-scraper','sortly-upload','contact','privacy'],
                logistics: ['tournaments','trips','trip-planner','team','tournament-scraper','contact','privacy'],
                tournament: ['tournaments','trips','trip-planner','team','inventory-v2','jersey-gallery','tournament-scraper','contact','privacy'],
                inventory: ['inventory-v2','jersey-gallery','sortly-upload','team','contact','privacy']
            };
            const linkLabels = {
                tournaments:'🏆 Tournaments', 'inventory-v2':'📦 Inventory', trips:'🚐 Trips',
                'trip-tracker':'📋 Trip Tracker', 'trip-planner':'📝 Trip Planner',
                team:'👥 Team', 'jersey-gallery':'👕 Jersey Gallery',
                'tournament-scraper':'⏰ Schedules',
                'sortly-upload':'📤 Sortly Upload', contact:'📧 Contact', privacy:'🔒 Privacy'
            };
            const allowed = roleLinks[AUTH_ROLE] || roleLinks.inventory;

            const quickLinks = allowed.map(p => `<a href="${p}.html" class="quick-link">${linkLabels[p] || p}</a>`).join('');

            // Helper to build a trip list section
            function tripSection(title, icon, trips, badgeFn) {
                if (trips.length === 0) {
                    return `
                        <h3 class="section-title">${icon} ${title} <span class="count">(0)</span></h3>
                        <div class="empty-state">All clear! Nothing here.</div>
                    `;
                }
                const cards = trips.map(t => {
                    const badge = badgeFn ? badgeFn(t) : '';
                    const p = POC(t);
                    return `
                        <div class="trip-card">
                            <div class="icon ${icon.includes('upcoming')?'upcoming':icon.includes('pack')?'pack':'out'}">${icon.includes('upcoming')?'📅':icon.includes('pack')?'📦':'🚐'}</div>
                            <div class="info">
                                <h4>${t.name || 'Unknown'}</h4>
                                <div class="meta">
                                    ${t.sport ? t.sport + ' · ' : ''}${formatDate(parseOrdinal(t.startDate), parseOrdinal(t.endDate), t.month)}
                                    ${t.state ? ' · ' + t.state : ''}
                                    <br>POC: <strong>${p}</strong>
                                    ${t.crew ? ' · Crew: ' + t.crew : ''}
                                </div>
                            </div>
                            ${badge}
                        </div>
                    `;
                }).join('');

                return `
                    <h3 class="section-title">${icon} ${title} <span class="count">(${trips.length})</span></h3>
                    ${cards}
                `;
            }

            content.innerHTML = `
                ${tripSection('Upcoming Trips', '📅 upcoming', upcoming, t => {
                    if (t.status === 'LOCKED IN') return '<span class="badge locked">Locked In</span>';
                    return '<span class="badge pending">Pending</span>';
                })}
                <div style="height:20px"></div>
                ${tripSection('Need to Pack', '📦 pack', needPack, () => '<span class="badge need">Needs Packing</span>')}
                <div style="height:20px"></div>
                ${tripSection('Currently Out', '🚐 out', currentlyOut, () => '<span class="badge pending">In Field</span>')}
                <div style="height:20px"></div>
                <h3 class="section-title">🔗 Quick Links</h3>
                <div class="quick-links">${quickLinks}</div>
            `;
        }

        function signOut() {
            sessionStorage.clear();
            window.location.href = 'index.html' + (location.hostname.includes('pages.dev') ? '?r=' + Date.now() : '');
        }

        // Run home render when data is loaded
        if (isLoggedIn) {
            if (typeof CREW_TRIPS !== 'undefined') {
                renderHome();
            } else {
                // Wait for data
                const check = setInterval(() => {
                    if (typeof CREW_TRIPS !== 'undefined') {
                        clearInterval(check);
                        renderHome();
                    }
                }, 100);
                setTimeout(() => clearInterval(check), 5000);
            }
        }
    </script>
