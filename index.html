<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Stars — Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #ffd700; --blue: #00d4ff; --green: #00ff88; --red: #ff4444; --bg: #050810; --card: rgba(255,255,255,0.03); }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; font-size: 18px; line-height: 1.6; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 30px; background: rgba(5,8,16,0.95); border-bottom: 2px solid rgba(0,212,255,0.15); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron'; font-size: 2.2em; font-weight: 900; background: linear-gradient(135deg, var(--gold), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name { font-family: 'Orbitron'; color: var(--gold); font-size: 1.1em; }
        .logout-btn { padding: 10px 20px; border: 2px solid var(--red); color: var(--red); background: transparent; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.9em; }
        .nav { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .nav a { padding: 14px 24px; border: 2px solid rgba(0,212,255,0.25); color: var(--blue); text-decoration: none; border-radius: 10px; font-size: 1.1em; font-family: 'Orbitron'; transition: all 0.3s; }
        .nav a:hover, .nav a.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.08); transform: translateY(-2px); }
        .main { max-width: 1400px; margin: 0 auto; padding: 40px 30px; }
        .welcome { font-family: 'Orbitron'; font-size: 2em; color: var(--gold); margin-bottom: 10px; }
        .role-badge { display: inline-block; padding: 8px 16px; background: rgba(0,212,255,0.1); border: 2px solid var(--blue); color: var(--blue); border-radius: 8px; font-family: 'Orbitron'; font-size: 0.9em; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat { background: var(--card); border: 2px solid rgba(0,212,255,0.1); border-radius: 16px; padding: 30px; text-align: center; transition: all 0.3s; }
        .stat:hover { border-color: rgba(0,212,255,0.2); transform: translateY(-4px); }
        .stat-value { font-family: 'Orbitron'; font-size: 2.8em; font-weight: 900; color: var(--gold); margin-bottom: 10px; }
        .stat-label { color: #8892b0; font-size: 1em; letter-spacing: 3px; text-transform: uppercase; }
        .section { margin-bottom: 40px; }
        .section-title { font-family: 'Orbitron'; font-size: 1.5em; color: var(--gold); margin-bottom: 24px; display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px; }
        .card { background: var(--card); border: 2px solid rgba(0,212,255,0.08); border-radius: 16px; padding: 32px; display: flex; align-items: flex-start; gap: 20px; transition: all 0.3s; text-decoration: none; color: #fff; }
        .card:hover { border-color: rgba(0,212,255,0.2); transform: translateY(-4px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .card-icon { font-size: 3em; }
        .card-body h3 { font-family: 'Orbitron'; font-size: 1.3em; color: var(--gold); margin-bottom: 10px; }
        .card-body p { color: #8892b0; font-size: 1.1em; line-height: 1.6; }
        .btn { padding: 16px 32px; background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(184,41,221,0.15)); border: 2px solid var(--blue); color: var(--blue); border-radius: 12px; font-family: 'Orbitron'; font-size: 1.1em; cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,212,255,0.2); }
        .actions { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 40px; }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 20px; } .nav a { padding: 16px; font-size: 1em; width: 100%; text-align: center; } .stats { grid-template-columns: 1fr; } .cards { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <script>
        if(!sessionStorage.getItem("fs_auth")){window.location.href="login.html";}
        const ROLE = sessionStorage.getItem('fs_role');
        const NAME = sessionStorage.getItem('fs_name');
    </script>
    <div class="header">
        <div class="logo">🏆 FUTURE STARS</div>
        <div class="user-info">
            <span class="user-name" id="user-name"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="main">
        <div class="welcome" id="welcome">Welcome Back</div>
        <div class="role-badge" id="role-badge"></div>
        <div class="actions" id="actions"></div>
        <div class="stats" id="stats"></div>
        <div class="section" id="main-content"></div>
    </div>
    <script>
        document.getElementById('user-name').textContent = NAME;
        document.getElementById('welcome').textContent = 'Welcome, ' + NAME;
        document.getElementById('role-badge').textContent = ROLE.toUpperCase();

        const NAV = {
            owner: ['Dashboard', 'Departments', 'Finance', 'Inventory', 'Trips', 'Trip Planner', 'Team', 'Jerseys'],
            logistics: ['Dashboard', 'Departments', 'Trips', 'Trip Planner', 'Hotels', 'Vehicles', 'Team'],
            tournament: ['Dashboard', 'Departments', 'Tournaments', 'Trip Planner', 'Crew Assign', 'Trips', 'Team'],
            inventory: ['Dashboard', 'Departments', 'Inventory', 'Trip Planner', 'Sortly Upload', 'Jerseys', 'Low Stock']
        };

        const LINKS = {
            'Dashboard': 'index.html', 'Departments': 'departments.html', 'Finance': '#finance', 'Inventory': 'inventory.html',
            'Trips': 'trips.html', 'Trip Planner': 'trip-planner.html', 'Team': 'team.html', 'Jerseys': 'jersey-gallery.html',
            'Hotels': '#hotels', 'Vehicles': '#vehicles', 'Tournaments': 'trips.html',
            'Crew Assign': '#crew', 'Sortly Upload': 'sortly-upload.html', 'Low Stock': '#lowstock'
        };

        // Build nav
        const navDiv = document.createElement('div');
        navDiv.className = 'nav';
        NAV[ROLE].forEach(item => {
            const a = document.createElement('a');
            a.href = LINKS[item] || '#';
            a.textContent = item;
            if (item === 'Dashboard') a.className = 'active';
            navDiv.appendChild(a);
        });
        document.querySelector('.header').appendChild(navDiv);

        // Role-specific content
        if (ROLE === 'owner') {
            document.getElementById('actions').innerHTML = `
                <a href="inventory.html" class="btn">📦 View Inventory</a>
                <a href="trips.html" class="btn">🚐 Active Trips</a>
                <button class="btn" onclick="refresh()">🔄 Refresh Data</button>
            `;
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-value" id="s-rev">--</div><div class="stat-label">Revenue</div></div>
                <div class="stat"><div class="stat-value" id="s-profit">--</div><div class="stat-label">Profit</div></div>
                <div class="stat"><div class="stat-value" id="s-margin">--</div><div class="stat-label">Margin</div></div>
                <div class="stat"><div class="stat-value" id="s-trips">--</div><div class="stat-label">Trips</div></div>
            `;
            document.getElementById('main-content').innerHTML = `
                <div class="section-title">Quick Access</div>
                <div class="cards">
                    <a href="departments.html" class="card"><span class="card-icon">🏢</span><div class="card-body"><h3>Departments</h3><p>Access all company departments and role-specific tools.</p></div></a>
                    <a href="inventory.html" class="card"><span class="card-icon">📦</span><div class="card-body"><h3>Inventory</h3><p>Full stock overview. 3,763 units across baseball and soccer.</p></div></a>
                    <a href="trips.html" class="card"><span class="card-icon">🚐</span><div class="card-body"><h3>All Trips</h3><p>Tournament missions, revenue tracking, crew assignments.</p></div></a>
                    <a href="team.html" class="card"><span class="card-icon">👥</span><div class="card-body"><h3>Crew Management</h3><p>Manage PJ, Caleb, Marlon. View roles and assignments.</p></div></a>
                    <a href="jersey-gallery.html" class="card"><span class="card-icon">👕</span><div class="card-body"><h3>Jersey Approval</h3><p>Approve or reject jersey images for the site.</p></div></a>
                </div>
            `;
        } else if (ROLE === 'logistics') {
            document.getElementById('actions').innerHTML = `
                <a href="trips.html" class="btn">🚐 View Trips</a>
                <button class="btn" onclick="alert('Hotel booking feature coming soon')">🏨 Book Hotel</button>
                <button class="btn" onclick="alert('Vehicle rental feature coming soon')">🚗 Rent Vehicle</button>
            `;
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-value">6</div><div class="stat-label">Active Trips</div></div>
                <div class="stat"><div class="stat-value">4</div><div class="stat-label">Hotels Needed</div></div>
                <div class="stat"><div class="stat-value">3</div><div class="stat-label">Vehicles</div></div>
            `;
            document.getElementById('main-content').innerHTML = `
                <div class="section-title">Your Tasks</div>
                <div class="cards">
                    <div class="card"><span class="card-icon">🏨</span><div class="card-body"><h3>Book Hotels</h3><p>Upcoming tournaments need hotel reservations. 4 pending.</p></div></div>
                    <div class="card"><span class="card-icon">🚗</span><div class="card-body"><h3>Vehicle Rentals</h3><p>Book vans/SUVs for tournament travel. 3 vehicles needed.</p></div></div>
                    <div class="card"><span class="card-icon">📋</span><div class="card-body"><h3>Trip Checklist</h3><p>Review packing lists and crew assignments for each trip.</p></div></div>
                </div>
            `;
        } else if (ROLE === 'tournament') {
            document.getElementById('actions').innerHTML = `
                <a href="trips.html" class="btn">📋 View Tournaments</a>
                <button class="btn" onclick="alert('Tournament research feature coming soon')">🔍 Research</button>
            `;
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-value">12</div><div class="stat-label">To Lock</div></div>
                <div class="stat"><div class="stat-value">6</div><div class="stat-label">Locked</div></div>
                <div class="stat"><div class="stat-value">3</div><div class="stat-label">This Week</div></div>
            `;
            document.getElementById('main-content').innerHTML = `
                <div class="section-title">Tournament Pipeline</div>
                <div class="cards">
                    <div class="card"><span class="card-icon">📞</span><div class="card-body"><h3>Call Tournaments</h3><p>12 tournaments need to be contacted and locked down.</p></div></div>
                    <div class="card"><span class="card-icon">✅</span><div class="card-body"><h3>Confirm Details</h3><p>Verify dates, venues, and age groups with tournament directors.</p></div></div>
                    <div class="card"><span class="card-icon">👥</span><div class="card-body"><h3>Crew Assign</h3><p>Assign crew members to locked tournaments.</p></div></div>
                </div>
            `;
        } else if (ROLE === 'inventory') {
            document.getElementById('actions').innerHTML = `
                <a href="inventory.html" class="btn">📦 View Stock</a>
                <a href="sortly-upload.html" class="btn">📥 Sortly Import</a>
                <a href="jersey-gallery.html" class="btn">👕 Jersey Gallery</a>
            `;
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-value">3,763</div><div class="stat-label">Total Units</div></div>
                <div class="stat"><div class="stat-value">215</div><div class="stat-label">SKUs</div></div>
                <div class="stat"><div class="stat-value" style="color: var(--red)">5</div><div class="stat-label">Low Stock</div></div>
            `;
            document.getElementById('main-content').innerHTML = `
                <div class="section-title">Inventory Tasks</div>
                <div class="cards">
                    <a href="sortly-upload.html" class="card"><span class="card-icon">📥</span><div class="card-body"><h3>Import Sortly</h3><p>Upload latest Sortly CSV to sync inventory data.</p></div></a>
                    <a href="jersey-gallery.html" class="card"><span class="card-icon">👕</span><div class="card-body"><h3>Review Jerseys</h3><p>Approve or reject jersey images. 4 pending review.</p></div></a>
                    <div class="card"><span class="card-icon">📊</span><div class="card-body"><h3>Stock Report</h3><p>View low stock alerts and reorder recommendations.</p></div></div>
                </div>
            `;
        }

        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
        function refresh() { location.reload(); }
    </script>
</body>
</html>
