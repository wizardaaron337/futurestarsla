<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2;url=signin.html">
    <title>Future Stars Sports Co</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css?v=2">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --black: #0A0A0A;
            --black-card: #1A1A1A;
            --white: #F8F6F0;
            --gray: #A8A498;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
        }
        .loader-container {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            box-shadow: 0 0 40px rgba(201,162,39,0.3);
            margin-bottom: 20px;
            animation: pulse-logo 2s ease-in-out infinite;
        }
        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(201,162,39,0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(201,162,39,0.5); }
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2em;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        p {
            color: var(--gray);
            font-size: 1em;
            margin-bottom: 24px;
        }
        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(201,162,39,0.1);
            border-radius: 3px;
            margin: 0 auto;
            overflow: hidden;
        }
        .loading-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            border-radius: 3px;
            animation: loading 2s ease-in-out infinite;
        }
        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 70%; margin-left: 30%; }
            100% { width: 0%; margin-left: 100%; }
        }
        a {
            color: var(--gold);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.5em; }
            .logo-img { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="loader-container">
        <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
        <h1>FUTURE STARS</h1>
        <p>Loading Command Center...</p>
        <div class="loading-bar">
            <div class="loading-bar-inner"></div>
        </div>
        <p style="margin-top:16px;font-size:0.85em;"><a href="signin.html">Click here</a> if not redirected</p>
    </div>
    <script>
        // Particles
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
    </script>
<script src="footer-component.js?v=2"></script>
</body>
</html>
