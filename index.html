<!DOCTYPE html>
<html lang="en">
<head>
<!-- build: 1777089406-0bc51204 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Stars Sports Co</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="auth-config.js?v=1777089331"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            text-align: center;
            padding: 40px 20px;
            background: 
                radial-gradient(circle at 30% 50%, rgba(201,162,39,0.05) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(201,162,39,0.03) 0%, transparent 50%);
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            box-shadow: 0 0 40px rgba(201,162,39,0.3);
            margin-bottom: 20px;
        }
        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 2em;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 4px;
        }
        .hero .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            color: var(--gray);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .hero-tagline {
            color: var(--gray);
            font-size: 1em;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .hero .welcome-name {
            color: var(--gold-light);
            font-size: 0.9em;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .hero .sign-out-link {
            color: var(--gray-dark);
            font-size: 0.8em;
            text-decoration: none;
            cursor: pointer;
        }
        .hero .sign-out-link:hover {
            color: var(--red, #EF5350);
        }

        /* Quick Actions (not logged in) */
        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-primary {
            padding: 16px 32px;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            border: none;
            border-bottom: 4px solid var(--gold-dark);
            border-radius: 12px;
            color: var(--black);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(201,162,39,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201,162,39,0.4);
        }
        .btn-secondary {
            padding: 16px 32px;
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 12px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-secondary:hover {
            background: rgba(201,162,39,0.1);
            transform: translateY(-2px);
        }

        /* Tool Grid (logged in) */
        .tool-grid-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }
        .tool-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-decoration: none;
            color: var(--white);
            transition: all 0.3s;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }
        .tool-card:hover {
            border-color: var(--gold-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(201,162,39,0.08);
        }
        .tool-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(201,162,39,0.1), transparent);
            border: 1px solid rgba(201,162,39,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            flex-shrink: 0;
        }
        .tool-body h3 {
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .tool-body p {
            color: var(--gray);
            font-size: 0.8em;
            line-height: 1.4;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 1em;
            color: var(--gray);
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--gray-dark);
            font-size: 0.8em;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            .hero { min-height: 30vh; padding: 30px 16px; }
            .hero h1 { font-size: 1.5em; }
            .hero .subtitle { font-size: 0.7em; letter-spacing: 3px; }
            .actions { flex-direction: column; width: 100%; padding: 0 20px; }
            .btn-primary, .btn-secondary { width: 100%; text-align: center; }
            .tool-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="app-root"></div>

    <script>
        const AUTH_USER = sessionStorage.getItem('fs_auth');
        const AUTH_NAME = sessionStorage.getItem('fs_name');
        const AUTH_ROLE = sessionStorage.getItem('fs_role');
        const AUTH_VERIFIED = sessionStorage.getItem('fs_pin_verified') === 'true';
        const isLoggedIn = AUTH_USER && AUTH_VERIFIED;

        const ALL_TOOLS = [
            { page: 'tournaments', label: 'Tournaments', icon: '🏆', desc: 'Tournament schedule and crew operations' },
            { page: 'inventory-v2', label: 'Inventory', icon: '📦', desc: 'Stock levels, pack trips, shipments' },
            { page: 'trips', label: 'Trips', icon: '🚐', desc: 'Trip schedule with finances and crew assignments' },
            { page: 'trip-tracker', label: 'Trip Tracker', icon: '📋', desc: 'Pack jerseys, check in returns, track items' },
            { page: 'trip-planner', label: 'Trip Planner', icon: '📝', desc: 'Find hotels and rental cars for trips' },
            { page: 'team', label: 'Team', icon: '👥', desc: 'Crew directory and contact info' },
            { page: 'jersey-gallery', label: 'Jersey Gallery', icon: '👕', desc: 'Browse jersey designs and inventory' },
            { page: 'sortly-upload', label: 'Sortly Upload', icon: '📤', desc: 'Upload inventory exports to Sortly' },
            { page: 'privacy', label: 'Privacy', icon: '🔒', desc: 'Privacy policy and data practices' },
            { page: 'contact', label: 'Contact', icon: '📧', desc: 'Get in touch with the team' }
        ];

        const ROLE_TOOLS = {
            owner: ['tournaments', 'inventory-v2', 'trips', 'trip-tracker', 'trip-planner', 'team', 'jersey-gallery', 'sortly-upload', 'privacy', 'contact'],
            logistics: ['tournaments', 'trips', 'trip-planner', 'team', 'privacy', 'contact', 'inventory-v2'],
            tournament: ['tournaments', 'trips', 'trip-planner', 'team', 'inventory-v2', 'jersey-gallery', 'privacy', 'contact'],
            inventory: ['inventory-v2', 'jersey-gallery', 'sortly-upload', 'team', 'privacy', 'contact']
        };

        function getToolsForRole(role) {
            const allowed = ROLE_TOOLS[role] || ROLE_TOOLS.inventory;
            return ALL_TOOLS.filter(t => allowed.includes(t.page));
        }

        function renderLoggedIn() {
            const tools = getToolsForRole(AUTH_ROLE);
            const toolCards = tools.map(t => `
                <a href="${t.page}.html" class="tool-card">
                    <div class="tool-icon">${t.icon}</div>
                    <div class="tool-body">
                        <h3>${t.label}</h3>
                        <p>${t.desc}</p>
                    </div>
                </a>
            `).join('');

            return `
                <div class="hero" style="min-height:20vh;padding-bottom:20px">
                    <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
                    <h1>FUTURE STARS</h1>
                    <div class="subtitle">Sports Co</div>
                    <div class="welcome-name">Welcome, ${AUTH_NAME || AUTH_USER}</div>
                    <a class="sign-out-link" onclick="signOut()">Sign Out</a>
                </div>
                <div class="tool-grid-section">
                    <div class="tool-grid">${toolCards}</div>
                </div>
                <div class="footer">Future Stars Sports Co &copy; 2026</div>
            `;
        }

        function renderNotLoggedIn() {
            return `
                <div class="hero">
                    <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
                    <h1>FUTURE STARS</h1>
                    <div class="subtitle">Sports Co</div>
                    <p class="hero-tagline">Championship sports merchandise. Tournament operations. Inventory management.</p>
                    <div class="actions">
                        <a href="index.html" class="btn-primary">Sign In</a>
                    </div>
                </div>
                <div class="footer">Future Stars Sports Co &copy; 2026</div>
            `;
        }

        window.signOut = function() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        };

        document.getElementById('app-root').innerHTML = isLoggedIn ? renderLoggedIn() : renderNotLoggedIn();
    </script>
</body>
</html>
