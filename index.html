<!DOCTYPE html>
<html lang="en">
<head>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Stars Sports Co</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="auth-config.js?v=1777089331"></script>
    <script src="nav-dropdown.js?v=1"></script>
    <link rel="stylesheet" href="fs-utils.css?v=1">
    <script src="inventory-data.js?v=1"></script>
    <script src="fs-utils.js?v=1"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-card: #1A1A1A;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --red: #EF5350;
            --green: #4CAF50;
            --amber: #FFA726;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
        }

        /* Landing Page (not logged in) */
        .landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            background: radial-gradient(circle at 30% 50%, rgba(201,162,39,0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(201,162,39,0.03) 0%, transparent 50%);
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            box-shadow: 0 0 40px rgba(201,162,39,0.3);
            margin-bottom: 20px;
        }
        .landing h1 {
            font-family: 'Cinzel', serif;
            font-size: 2em;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 4px;
        }
        .landing .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            color: var(--gray);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .landing p {
            color: var(--gray);
            font-size: 1em;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn-signin {
            padding: 16px 32px;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            border: none;
            border-bottom: 4px solid var(--gold-dark);
            border-radius: 12px;
            color: var(--black);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(201,162,39,0.3);
            transition: all 0.15s;
        }
        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201,162,39,0.4);
        }

        /* Home Page (logged in) */
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--black-card);
            border-bottom: 1px solid var(--border);
        }
        .header-bar .logo-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .header-bar .logo-wrap img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--gold);
        }
        .header-bar .logo-wrap span {
            font-family: 'Cinzel', serif;
            font-size: 1em;
            color: var(--gold);
            letter-spacing: 2px;
        }
        .header-bar .user-badge {
            font-size: 0.85em;
            color: var(--gray);
        }
        .header-bar .user-badge strong {
            color: var(--white);
        }

        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* Trip sections */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 1em;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .section-title .count {
            color: var(--gray);
            font-size: 0.8em;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        .home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}.home-card{background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;transition:border .2s;}.home-card:hover{border-color:var(--gold);}.home-icon{font-size:1.6em;margin-bottom:4px;}.home-num{font-family:'Cinzel',serif;font-size:1.8em;color:var(--white);font-weight:700;}.home-label{font-size:.75em;color:var(--gray);margin-top:2px;}.home-section-title{font-family:'Cinzel',serif;color:var(--gold);font-size:.95em;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}.home-list{display:flex;flex-direction:column;gap:6px;}.home-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--black-card);border:1px solid var(--border);border-radius:10px;}.home-sport{font-size:1.1em;width:24px;text-align:center;}.home-name{font-family:'Cinzel',serif;font-size:.85em;color:var(--gold);font-weight:600;white-space:nowrap;}.home-meta{font-size:.75em;color:var(--gray);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.home-badges{font-size:.75em;white-space:nowrap;}
        .trip-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .trip-card .icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            flex-shrink: 0;
        }
        .trip-card .icon.upcoming { background: rgba(76,175,80,0.1); }
        .trip-card .icon.pack { background: rgba(255,167,38,0.1); }
        .trip-card .icon.out { background: rgba(239,83,80,0.1); }

        .trip-card .info { flex: 1; min-width: 0; }
        .trip-card .info h4 {
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            color: var(--gold);
            margin-bottom: 2px;
        }
        .trip-card .info .meta {
            font-size: 0.8em;
            color: var(--gray);
            line-height: 1.5;
        }
        .trip-card .info .meta strong { color: var(--white); }
        .trip-card .badge {
            font-size: 0.7em;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .trip-card .badge.locked { background: rgba(76,175,80,0.15); color: var(--green); }
        .trip-card .badge.pending { background: rgba(255,167,38,0.15); color: var(--amber); }
        .trip-card .badge.need { background: rgba(239,83,80,0.15); color: var(--red); }

        /* Home stat cards */
        .home-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 8px;
        }
        .stat-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
        }
        .stat-num {
            font-family: 'Cinzel', serif;
            font-size: 2em;
            font-weight: 700;
            color: var(--gold);
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.7em;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        @media (max-width: 480px) {
            .home-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .trip-card .badge.need { background: rgba(239,83,80,0.15); color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--gray-dark);
            font-size: 0.9em;
        }
        .empty-state .big { font-size: 2em; margin-bottom: 8px; }

        /* Quick Links */
        .quick-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
        }
        .quick-link {
            padding: 10px 16px;
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .quick-link:hover {
            border-color: var(--gold-dark);
            color: var(--gold);
        }

        .sign-out {
            color: var(--gray-dark);
            font-size: 0.8em;
            text-decoration: none;
            margin-left: 12px;
        }
        .sign-out:hover { color: var(--red); }

        .footer {
            text-align: center;
            padding: 24px;
            color: var(--gray-dark);
            font-size: 0.8em;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        .loading-pulse {
            text-align: center;
            padding: 40px;
            color: var(--gray-dark);
        }

        @media (max-width: 600px) {
            .header-bar { padding: 12px 16px; }
            .main-content { padding: 16px; }
            .trip-card { flex-wrap: wrap; }
        }
    </style>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js?v="+Date.now());}</script>
</head>
<body>
    <div id="app-root"></div>

    <script>
        function getAuth(key) {
            return sessionStorage.getItem(key) || localStorage.getItem(key);
        }
        const AUTH_USER = getAuth('fs_auth');
        const AUTH_NAME = getAuth('fs_name');
        const AUTH_ROLE = getAuth('fs_role');
        const isLoggedIn = !!AUTH_USER;

        if (!isLoggedIn) {
            // Show landing page
            document.getElementById('app-root').innerHTML = `
                <div class="landing">
                    <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
                    <h1>FUTURE STARS</h1>
                    <div class="subtitle">Sports Co</div>
                    <p>Championship sports merchandise. Tournament operations. Inventory management.</p>
                    <a href="signin" class="btn-signin">Sign In</a>
                </div>
            `;
        } else {
            // Show home page with trip data
            document.getElementById('app-root').innerHTML = `
                <div class="main-content" id="home-content">
                </div>
                <div class="footer">Future Stars Sports Co &copy; 2026</div>
            `;
            setTimeout(renderHome, 50);
            setInterval(renderHome, 4000);
            window.addEventListener('storage', function(e) {
              if (e.key === 'fs_tourney_schedule' || e.key === 'fs_trips') renderHome();
            });
        }

        function renderHome() {
            var content = document.getElementById('home-content');
            if (!content) return;
            var tournaments = JSON.parse(localStorage.getItem('fs_tourney_schedule') || '[]');
            var totalTeams = tournaments.reduce(function(sum, t) { return sum + (parseInt(t.teams) || 0); }, 0);
            var soccer = tournaments.filter(function(t) { return t.sport === 'Soccer'; });
            var baseball = tournaments.filter(function(t) { return t.sport === 'Baseball'; });
            var pjTrips = JSON.parse(localStorage.getItem('fs_trips') || '[]');
            var bookedHotels = pjTrips.filter(function(p) { return p.hotelName; }).length;
            var bookedCars = pjTrips.filter(function(p) { return p.carName; }).length;
            html = '<div class="home-grid">' +
              '<div class="home-card"><div class="home-icon">🏟️</div><div class="home-num">' + tournaments.length + '</div><div class="home-label">Upcoming Tournaments</div></div>' +
              '<div class="home-card"><div class="home-icon">👥</div><div class="home-num">' + totalTeams + '</div><div class="home-label">Total Teams Expected</div></div>' +
              '<div class="home-card"><div class="home-icon">⚽</div><div class="home-num">' + soccer.length + '</div><div class="home-label">Soccer Events</div></div>' +
              '<div class="home-card"><div class="home-icon">⚾</div><div class="home-num">' + baseball.length + '</div><div class="home-label">Baseball Events</div></div>' +
              '<div class="home-card"><div class="home-icon">🏨</div><div class="home-num">' + bookedHotels + '</div><div class="home-label">Hotels Booked</div></div>' +
              '<div class="home-card"><div class="home-icon">🚗</div><div class="home-num">' + bookedCars + '</div><div class="home-label">Cars Booked</div></div>' +
            '</div>';
            // Add tournament list below stats
            if (tournaments.length > 0) {
              html += '<div class="home-section-title">📅 ' + (new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' })) + ' Tournament Schedule</div><div class="home-list">';
              tournaments.sort(function(a,b) { return (a.start||'').localeCompare(b.start||''); });
              tournaments.forEach(function(t) {
                var sportIcon = t.sport === 'Soccer' ? '⚽' : t.sport === 'Baseball' ? '⚾' : '🏟️';
                var dates = (t.start || '') + (t.end ? ' — ' + t.end : '');
                var pjMatch = pjTrips.find(function(p) { return p.name === t.name || p.tourneyId === t.id; });
                var hStatus = pjMatch && pjMatch.hotelName ? '✅' : '❌';
                var cStatus = pjMatch && pjMatch.carName ? '✅' : '❌';
                html += '<div class="home-row">' +
                  '<span class="home-sport">' + sportIcon + '</span>' +
                  '<span class="home-name">' + t.name + '</span>' +
                  '<span class="home-meta">' + dates + ' · ' + (t.location||'') + ' · 👥 ' + (t.teams||'—') + '</span>' +
                  '<span class="home-badges">🏨' + hStatus + ' 🚗' + cStatus + '</span>' +
                '</div>';
              });
              html += '</div>';
            }
            content.innerHTML = html;
            // Also replace the old renderHome that relied on CREW_TRIPS
            window.renderHome = renderHome;
        }

        function parseOrdinal(s) {
            if (!s) return 0;
            return parseInt(s.replace(/[^0-9]/g, '')) || 0;
        }

        function formatDate(startOrdinal, endOrdinal, month) {
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const m = months.findIndex(m => m.toLowerCase().startsWith((month || '').toLowerCase().substring(0,3)));
            const year = 2026;
            if (m >= 0 && startOrdinal) {
                const start = new Date(year, m, startOrdinal);
                const end = endOrdinal ? new Date(year, m, endOrdinal) : null;
                const startStr = start.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
                if (end && end > start) {
                    const endStr = end.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
                    // Show year on both if different months, otherwise just on end
                    if (start.getMonth() !== end.getMonth()) {
                        return startStr + ' - ' + endStr;
                    }
                    return start.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' - ' + endStr;
                }
                return startStr;
            }
            return (month || '') + ' ' + (startOrdinal || '') + (endOrdinal ? '-' + endOrdinal : '');
        }

        function POC(trip) {
            // Return the first crew member name as the POC contact
            const crew = (trip.crew || '').split(',').map(n => n.trim()).filter(Boolean);
            return crew[0] || 'N/A';
        }

        function loadTripStatuses() {
            // Load packing/out status from trip tracker (localStorage)
            try {
                const raw = localStorage.getItem('fs_trip_status');
                return raw ? JSON.parse(raw) : { status: {}, packing: {}, returns: {} };
            } catch(e) {
                return { status: {}, packing: {}, returns: {} };
            }
        }

        function renderHome_old() {
            const content = document.getElementById('home-content');
            if (!content || typeof CREW_TRIPS === 'undefined') {
                if (content) content.innerHTML = '<div class="empty-state"><div class="big">😕</div><p>Could not load trip data</p></div>';
                return;
            }

            const now = new Date();
            const currentMonth = now.toLocaleDateString('en-US', {month:'long'});
            
            // Load trip statuses from trip tracker (set from inventory UI)
            const tripData = loadTripStatuses();
            const trackerStatus = tripData.status || {};
            const trackerPacking = tripData.packing || {};
            const trackerReturns = tripData.returns || {};

            const all = CREW_TRIPS;

            // Categorize trips by real status from CSV data + trip tracker
            // Trip tracker overrides: 'packed', 'out', 'completed'
            function getRealStatus(t) {
                const id = t.name + '-' + t.startDate + '-' + t.month;
                const ts = trackerStatus[id];
                if (ts) return ts;
                
                // Fall back to CSV status + field logic
                if (t.status === 'LOCKED IN') {
                    if (t.leaveDate && t.leaveDate.trim() !== '') {
                        if (t.rentalReturn && t.rentalReturn.trim() !== '') return 'completed';
                        return 'out';
                    }
                    return 'locked';
                }
                return 'unassigned';
            }
            
            // Get upcoming trips: LOCKED IN status
            const upcoming = all.filter(t => {
                const s = getRealStatus(t);
                return s === 'locked' || s === 'out';
            }).slice(0, 5);

            // Trips needing packing - LOCKED IN with no leave date AND not marked as packed
            const needPack = all.filter(t => {
                const s = getRealStatus(t);
                const id = t.name + '-' + t.startDate + '-' + t.month;
                const packed = trackerPacking[id] && Object.keys(trackerPacking[id]).length > 0;
                return s === 'locked' && !packed;
            }).slice(0, 5);

            // Trips currently out (have leave date, no return - or marked as 'out' in tracker)
            const currentlyOut = all.filter(t => {
                const s = getRealStatus(t);
                return s === 'out';
            }).slice(0, 5);

            // Completed/recently returned
            const completed = all.filter(t => {
                const s = getRealStatus(t);
                return s === 'completed';
            }).slice(0, 3);

            content.innerHTML = '';

            // Section: Quick Links (role-based)
            const roleLinks = {
                owner: ['tournaments','inventory-v2','trips','trip-tracker','trip-planner','team','jersey-gallery','tournament-scraper','sortly-upload','contact','privacy'],
                logistics: ['tournaments','trips','trip-planner','team','tournament-scraper','contact','privacy'],
                tournament: ['tournaments','trips','trip-planner','team','inventory-v2','jersey-gallery','tournament-scraper','contact','privacy'],
                inventory: ['inventory-v2','jersey-gallery','sortly-upload','team','contact','privacy']
            };
            const linkLabels = {
                tournaments:'🏆 Tournaments', 'inventory-v2':'📦 Inventory', trips:'🚐 Trips',
                'trip-tracker':'📋 Trip Tracker', 'trip-planner':'📝 Trip Planner',
                team:'👥 Team', 'jersey-gallery':'👕 Jersey Gallery',
                'tournament-scraper':'⏰ Schedules',
                'sortly-upload':'📤 Sortly Upload', contact:'📧 Contact', privacy:'🔒 Privacy'
            };
            const allowed = roleLinks[AUTH_ROLE] || roleLinks.inventory;

            const quickLinks = allowed.map(p => `<a href="${p}.html" class="quick-link">${linkLabels[p] || p}</a>`).join('');

            // Helper to build a trip list section
            function tripSection(title, icon, trips, badgeFn) {
                if (trips.length === 0) {
                    return `
                        <h3 class="section-title">${icon} ${title} <span class="count">(0)</span></h3>
                        <div class="empty-state">All clear! Nothing here.</div>
                    `;
                }
                const cards = trips.map((t, idx) => {
                    const badge = badgeFn ? badgeFn(t) : '';
                    const p = POC(t);
                    const did = 'td-' + Date.now() + '-' + idx;
                    const sportIcon = t.sport === 'Baseball' ? '⚾' : t.sport === 'Soccer' ? '⚽' : '🏀';
                    const dates = formatDate(parseOrdinal(t.startDate), parseOrdinal(t.endDate), t.month);
                    return `
                        <div class="trip-card">
                            <div class="icon ${icon.includes('upcoming')?'upcoming':icon.includes('pack')?'pack':'out'}" style="cursor:pointer;" onclick="toggleTripDetails('${did}')">${icon.includes('upcoming')?'📅':icon.includes('pack')?'📦':'🚐'}</div>
                            <div class="info">
                                <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
                                    <h4 style="flex:1;margin:0;">${sportIcon} ${t.name || 'Unknown'}</h4>
                                    ${badge}
                                    <button class="expand-btn" onclick="toggleTripDetails('${did}')" style="background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--gray);cursor:pointer;padding:4px 10px;font-size:0.75em;">▼ Details</button>
                                </div>
                                <div id="${did}" class="trip-details" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
                                    <div class="meta" style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;">
                                        <span style="color:var(--gray-dark);">Dates</span><span>${dates || 'TBD'}</span>
                                        ${t.state ? '<span style="color:var(--gray-dark);">Location</span><span>' + t.state + '</span>' : ''}
                                        <span style="color:var(--gray-dark);">POC</span><span><strong>${p}</strong></span>
                                        ${t.crew ? '<span style="color:var(--gray-dark);">Crew</span><span>' + t.crew + '</span>' : ''}
                                        ${t.leaveDate ? '<span style="color:var(--gray-dark);">Leave</span><span>' + t.leaveDate + (t.leaveTime ? ' @ ' + t.leaveTime : '') + '</span>' : ''}
                                        ${t.rentalReturn ? '<span style="color:var(--gray-dark);">Rental Return</span><span>' + t.rentalReturn + '</span>' : ''}
                                        ${t.pexCard ? '<span style="color:var(--gray-dark);">💳 PEX Card</span><span style="font-weight:600;color:var(--amber);">' + t.pexCard + '</span>' : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <h3 class="section-title">${icon} ${title} <span class="count">(${trips.length})</span></h3>
                    ${cards}
                `;
            }

            // Fresh start — all stats at 0
            const allCounts = 0;
            const upCount = 0;
            const packCount = 0;
            const outCount = 0;
            const doneCount = 0;
            const bb = 0;
            const sc = 0;
            const totalStyles = 0;

            content.innerHTML = `
