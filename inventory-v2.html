    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-light: #141414;

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);

        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;

            position: sticky;

        }
        .logo-link {
            display: flex;
            align-items: center;
            gap: 10px;

        .logo-img {

        .logo-text {

        .user-info { display: flex; align-items: center; gap: 16px; }

            letter-spacing: 1px;

        .main {

            margin: 0 auto;
            padding: 20px;

        /* Tab Switcher */
        .tabs {

            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        .tab {
            padding: 10px 20px;
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--gray);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab:hover { border-color: var(--gold); color: var(--gold); }
        .tab.active {
            background: rgba(201,162,39,0.15);
            border-color: var(--gold);
            color: var(--gold);
        }
        /* Compact Inventory - Card Layout */
        .inv-section {
            margin-bottom: 32px;
        }
        .inv-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .inv-title {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            color: var(--gold);
            letter-spacing: 1px;
        }
        .inv-count {
            font-size: 0.9em;
            color: var(--gray);
            font-weight: 600;
        }
        .jersey-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }
        .jersey-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            transition: all 0.2s;
            position: relative;
        }
        .jersey-card:hover {
            border-color: var(--gold-dark);
            transform: translateY(-2px);
        }
        .jersey-card .card-img {
            width: 100%;
            height: 140px;
            object-fit: contain;
            object-position: center;
            border-radius: 8px;
            margin-bottom: 10px;
            background: var(--black);
            display: block;
        }
        .jersey-card .card-img-placeholder {
            width: 100%;
            height: 140px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--black-light), #222);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-dark);
            font-size: 2.5em;
        }
        .jersey-card .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .jersey-card .jersey-name {
            font-weight: 600;
            font-size: 0.85em;
            color: var(--white);
            line-height: 1.3;
        }
        .jersey-card .jersey-total {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.9em;
            font-weight: 700;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .jersey-card .card-sizes {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }
        .size-dot {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--black);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 500;
            color: var(--gray);
        }
        .size-dot .qty {
            color: var(--white);
            font-weight: 600;
        }
        .size-dot.low {
            border-color: rgba(239,83,80,0.4);
            color: var(--red);
        }
        .size-dot.low .qty { color: var(--red); }
        .size-dot.out {
            background: rgba(239,83,80,0.08);
            border-color: rgba(239,83,80,0.2);
            color: rgba(239,83,80,0.4);
        }
        .size-dot.out .qty { color: rgba(239,83,80,0.4); }
        .jersey-card .card-low-badge {
            display: none;
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--red);
            color: white;
            font-size: 0.65em;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .jersey-card .card-low-badge.show { display: block; }
        @media (max-width: 768px) {
            .main { padding: 12px; }
            .jersey-grid { grid-template-columns: 1fr; }
        }

<body>
    <div class="main">
        <div id="inv-summary-strip" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;"></div>
        <div class="export-bar" style="margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-secondary" onclick="exportInventory('csv')">📊 Export CSV</button>
            <button class="btn btn-secondary" onclick="exportInventory('json')">📋 Export JSON</button>
            <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
        </div>
        <div id="low-stock-alerts" style="margin-bottom: 16px;"></div>
        <div class="inv-section">
            <div class="inv-header">
                <span class="inv-title">⚾ Baseball</span>
                <span class="inv-count" id="bb-count"><div class="fs-spinner-sm"></div></span>
            </div>
            <div class="jersey-grid" id="bb-table"></div>
        </div>
        <div class="inv-section">
            <div class="inv-header">
                <span class="inv-title">⚽ Soccer</span>
                <span class="inv-count" id="sc-count"><div class="fs-spinner-sm"></div></span>
            </div>
            <div class="jersey-grid" id="sc-table"></div>
        </div>
    </div>
    <script>
        // Auth check
        if(!sessionStorage.getItem("fs_auth") && !localStorage.getItem("fs_auth") ){
            window.location.href = "signin.html";
        }
        // Inventory Data
        // Render Inventory
        function renderInventory() {
            let bbTotal = 0, scTotal = 0, bbCount = 0, scCount = 0;
            let bbLow = 0, scLow = 0, bbOut = 0, scOut = 0;
            function renderCard(name, data, sport) {
                const sizes = Object.entries(data.sizes);
                const anyLow = sizes.some(([,qty]) => qty > 0 && qty < 10);
                const allZero = sizes.every(([,qty]) => qty === 0);
                const dots = sizes.map(([size, qty]) => {
                    let cls = 'size-dot';
                    if (qty === 0) cls += ' out';
                    else if (qty < 10) cls += ' low';
                    return `<span class="${cls}">${size} <span class="qty">${qty}</span></span>`;
                }).join('');
                const imgHtml = data.img 
                    ? `<img class="card-img" src="images/${data.img}" alt="${name}" loading="lazy">`
                    : `<div class="card-img-placeholder">👕</div>`;
                return `<div class="jersey-card ${allZero ? 'out' : ''}">
                    <span class="card-low-badge ${anyLow ? 'show' : ''}">Low</span>
                    ${imgHtml}
                    <div class="card-top">
                        <div class="jersey-name">${name}</div>
                        <div class="jersey-total">${data.total}</div>
                    </div>
                    <div class="card-sizes">${dots}</div>
                </div>`;
            }
            function countLow(sizes) {
                return Object.values(sizes).filter(q => q > 0 && q < 10).length;
            }
            function countOut(sizes) {
                return Object.values(sizes).filter(q => q === 0).length;
            }
            const bbGrid = document.getElementById('bb-table');
            bbGrid.innerHTML = Object.entries(INVENTORY.baseball).map(([name, data]) => {
                bbTotal += data.total;
                bbCount++;
                bbLow += countLow(data.sizes);
                bbOut += countOut(data.sizes);
                return renderCard(name, data, 'baseball');
            }).join('');
            document.getElementById('bb-count').textContent = `${bbCount} items · ${bbTotal} total`;
            const scGrid = document.getElementById('sc-table');
            scGrid.innerHTML = Object.entries(INVENTORY.soccer).map(([name, data]) => {
                scTotal += data.total;
                scCount++;
                scLow += countLow(data.sizes);
                scOut += countOut(data.sizes);
                return renderCard(name, data, 'soccer');
            }).join('');
            document.getElementById('sc-count').textContent = `${scCount} items · ${scTotal} total`;
            // Summary strip
            const strip = document.getElementById('inv-summary-strip');
            if (strip) {
                const grandTotal = bbTotal + scTotal;
                const grandLow = bbLow + scLow;
                strip.innerHTML = `
                    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
                        <div style="font-family:'Cinzel',serif;font-size:1.6em;color:var(--gold);font-weight:700;">${grandTotal}</div>
                        <div style="font-size:0.7em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Total Units</div>
                    </div>
                    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
                        <div style="font-family:'Cinzel',serif;font-size:1.6em;color:var(--white);font-weight:700;">${bbCount + scCount}</div>
                        <div style="font-size:0.7em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Items</div>
                    </div>
                    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
                        <div style="font-family:'Cinzel',serif;font-size:1.6em;color:var(--orange);font-weight:700;">${grandLow > 0 ? grandLow : '0'}</div>
                        <div style="font-size:0.7em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Low Stock</div>
                    </div>
                    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
                        <div style="font-family:'Cinzel',serif;font-size:1.6em;color:var(--red);font-weight:700;">${bbOut + scOut > 0 ? bbOut + scOut : '0'}</div>
                        <div style="font-size:0.7em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Out of Stock</div>
                    </div>
                `;
            }
        }
        // Export inventory to CSV or JSON
        function exportInventory(format) {
            const timestamp = new Date().toISOString().split('T')[0];
            
            if (format === 'csv') {
                let csv = 'Sport,Jersey,Total,Size,Quantity\n';
                Object.entries(INVENTORY.baseball).forEach(([name, data]) => {
                    Object.entries(data.sizes).forEach(([size, qty]) => {
                        csv += `Baseball,"${name}",${data.total},${size},${qty}\n`;
                    });
                });
                Object.entries(INVENTORY.soccer).forEach(([name, data]) => {
                    Object.entries(data.sizes).forEach(([size, qty]) => {
                        csv += `Soccer,"${name}",${data.total},${size},${qty}\n`;
                    });
                });
                downloadFile(csv, `fs-inventory-${timestamp}.csv`, 'text/csv');
            } else if (format === 'json') {
                const data = {
                    exported: new Date().toISOString(),
                    inventory: INVENTORY
                };
                downloadFile(JSON.stringify(data, null, 2), `fs-inventory-${timestamp}.json`, 'application/json');
            }
        }
        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        // Low stock alerts
        function checkLowStock() {
            const alerts = [];
            const threshold = 10;
            
            Object.entries(INVENTORY.baseball).forEach(([name, data]) => {
                Object.entries(data.sizes).forEach(([size, qty]) => {
                    if (qty < threshold) {
                        alerts.push({ sport: 'Baseball', name, size, qty });
                    }
                });
            });
            
            Object.entries(INVENTORY.soccer).forEach(([name, data]) => {
                Object.entries(data.sizes).forEach(([size, qty]) => {
                    if (qty < threshold) {
                        alerts.push({ sport: 'Soccer', name, size, qty });
                    }
                });
            });
            
            const container = document.getElementById('low-stock-alerts');
            if (alerts.length > 0) {
                container.innerHTML = `
                    <div style="background: rgba(239,83,80,0.1); border: 1px solid rgba(239,83,80,0.3); border-radius: 12px; padding: 16px;">
                        <div style="font-weight: 600; color: var(--red); margin-bottom: 8px;">⚠️ Low Stock Alert (${alerts.length} items below ${threshold} units)</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                            ${alerts.map(a => `
                                <span style="background: var(--black); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 0.85em;">
                                    ${a.sport === 'Baseball' ? '⚾' : '⚽'} ${a.name} ${a.size}: <strong style="color: var(--red);">${a.qty}</strong>
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        }
        // Init
        renderInventory();
        checkLowStock();
        // Auto-refresh inventory every 30 seconds
        if (window.FSUtils) {
            FSUtils.autoRefresh(() => {
                renderInventory();
                checkLowStock();
            }, 30000, 'inventory');
        }
    </script>
</body>
