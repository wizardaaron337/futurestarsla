<body>
    <div class="header">
        <a href="index.html" class="logo-link">
            <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">

        <div class="user-info">

    <div class="main">
        <div id="inv-summary-strip" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;"></div>
        <div class="export-bar" style="margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-secondary" onclick="exportInventory('csv')">📊 Export CSV</button>

    <script>
        // Auth check
        if(!sessionStorage.getItem("fs_auth") && !localStorage.getItem("fs_auth") ){
            window.location.href = "signin.html";
        }
        document.getElementById('user-name').textContent = sessionStorage.getItem('fs_name') || '';

        // Inventory Data
        const INVENTORY = {
            baseball: {
                "Acuna Jr. Braves": {total: 184, sizes: {YS: 42, YM: 16, YL: 49, AS: 11, YXL: 66}},
                "Alvarez Astros": {total: 36, sizes: {YL: 12, YXL: 11, YM: 5, AS: 2, YS: 6}},
                "Betts Dodgers": {total: 226, sizes: {YXL: 37, AS: 60, YL: 78, YM: 51}},
                "Crews Nationals": {total: 94, sizes: {YS: 11, YM: 12, YXL: 21, AS: 27, YL: 23}},
                "Crow Cubs": {total: 104, sizes: {YS: 23, YM: 25, YXL: 33, YL: 19, AS: 4}},
                "De LaCruz Reds": {total: 44, sizes: {YS: 10, YXL: 32, YL: 1, AS: 1}},
                "Freeman Dodgers": {total: 14, sizes: {YS: 1, YM: 2, YXL: 7, AS: 4}},
                "Guerrero JR": {total: 34, sizes: {YS: 3, YM: 7, YL: 7, YXL: 15, AS: 2}},
                "Harper Phillies": {total: 114, sizes: {YS: 17, YM: 23, YXL: 42, AS: 3, YL: 29}},
                "Henderson Oriols": {total: 54, sizes: {YS: 6, YM: 16, YXL: 12, AS: 6, YL: 14}},
                "Judge Yankees": {total: 157, sizes: {YM: 13, YXL: 46, AS: 25, YL: 58, YS: 15}},
                "Ohtani Dodgers": {total: 165, sizes: {YS: 28, YL: 35, YM: 31, AS: 35, YXL: 36}},
                "Raleigh Mariners": {total: 50, sizes: {YS: 6, AS: 9, YXL: 21, YM: 6, YL: 8}},
                "Skenes Pirates": {total: 194, sizes: {YS: 37, YXL: 42, YM: 31, YL: 64, AS: 20}},
                "Soto Mets": {total: 169, sizes: {YS: 10, YM: 52, YL: 35, YXL: 48, AS: 24}},
                "Tatis JR": {total: 174, sizes: {AS: 5, YL: 20, YS: 2, YXL: 128, YM: 19}},
                "Trout Angels": {total: 82, sizes: {YS: 10, YM: 3, YL: 30, AS: 18, YXL: 21}},
                "Turner Phillies": {total: 35, sizes: {YXL: 13, YL: 11, YS: 9, AS: 2}},
                "Whit Royals": {total: 76, sizes: {YS: 2, YM: 12, YL: 14, YXL: 17, AS: 31}},
            },
            soccer: {
                "Messi Pink": {total: 416, sizes: {20: 24, 22: 38, 24: 45, 26: 48, 28: 56, S: 35, M: 40, L: 42, XL: 38}},
                "Messi Argentina": {total: 402, sizes: {20: 22, 22: 35, 24: 42, 26: 45, 28: 52, S: 32, M: 38, L: 40, XL: 36}},
                "Messi Black": {total: 491, sizes: {20: 28, 22: 42, 24: 50, 26: 55, 28: 62, S: 40, M: 45, L: 48, XL: 42}},
                "Ronaldo Blue": {total: 445, sizes: {20: 25, 22: 38, 24: 45, 26: 50, 28: 55, S: 36, M: 42, L: 45, XL: 40}},
                "Ronaldo Red": {total: 348, sizes: {20: 20, 22: 30, 24: 35, 26: 40, 28: 42, S: 28, M: 32, L: 35, XL: 30}},
                "Neymar Tribute": {total: 526, sizes: {20: 28, 22: 45, 24: 52, 26: 58, 28: 62, S: 40, M: 46, L: 50, XL: 44}},
                "Yamal Flower": {total: 430, sizes: {20: 24, 22: 36, 24: 42, 26: 48, 28: 52, S: 34, M: 40, L: 44, XL: 38}},
                "Yamal Barca": {total: 328, sizes: {20: 18, 22: 28, 24: 32, 26: 36, 28: 40, S: 26, M: 30, L: 32, XL: 28}},
                "Mbappe France": {total: 74, sizes: {20: 5, 22: 8, 24: 10, 26: 10, 28: 12, S: 6, M: 8, L: 8, XL: 7}},
            }
        };

        // Render Inventory
        function renderInventory() {
            let bbTotal = 0, scTotal = 0, bbCount = 0, scCount = 0;
            let bbLow = 0, scLow = 0, bbOut = 0, scOut = 0;

            function renderCard(name, data, sport) {
                const sizes = Object.entries(data.sizes);
                const anyLow = sizes.some(([,qty]) => qty > 0 && qty < 10);
                const allZero = sizes.every(([,qty]) => qty === 0);
                const dots = sizes.map(([size, qty]) => {
                    let cls = 'size-dot';
                    if (qty === 0) cls += ' out';
                    else if (qty < 10) cls += ' low';
                    return `<span class="${cls}">${size} <span class="qty">${qty}</span></span>`;
                }).join('');
                return `<div class="jersey-card ${allZero ? 'out' : ''}">
                    <span class="card-low-badge ${anyLow ? 'show' : ''}">Low</span>
                    <div class="card-top">
                        <div class="jersey-name">${name}</div>
                        <div class="jersey-total">${data.total}</div>
                    </div>
                    <div class="card-sizes">${dots}</div>
                </div>`;
            }

            function countLow(sizes) {
                return Object.values(sizes).filter(q => q > 0 && q < 10).length;
            }
            function countOut(sizes) {
                return Object.values(sizes).filter(q => q === 0).length;
            }

            const bbGrid = document.getElementById('bb-table');
            bbGrid.innerHTML = Object.entries(INVENTORY.baseball).map(([name, data]) => {
                bbTotal += data.total;
                bbCount++;
                bbLow += countLow(data.sizes);
                bbOut += countOut(data.sizes);
                return renderCard(name, data, 'baseball');
            }).join('');
            document.getElementById('bb-count').textContent = `${bbCount} items · ${bbTotal} total`;

            const scGrid = document.getElementById('sc-table');
            scGrid.innerHTML = Object.entries(INVENTORY.soccer).map(([name, data]) => {
                scTotal += data.total;
                scCount++;
                scLow += countLow(data.sizes);
                scOut += countOut(data.sizes);
                return renderCard(name, data, 'soccer');
            }).join('');
            document.getElementById('sc-count').textContent = `${scCount} items · ${scTotal} total`;

            // Summary strip
            const strip = document.getElementById('inv-summary-strip');
            if (strip) {
                const grandTotal = bbTotal + scTotal;
                const grandLow = bbLow + scLow;
                strip.innerHTML = `
                    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
                        <div style="font-family:'Cinzel',serif;font-size:1.6em;color:var(--gold);font-weight:700;">${grandTotal}</div>
                        <div style="font-size:0.7em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Total Units</div>
                    </div>
                    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
                        <div style="font-family:'Cinzel',serif;font-size:1.6em;color:var(--white);font-weight:700;">${bbCount + scCount}</div>
                        <div style="font-size:0.7em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Items</div>
                    </div>
                    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
                        <div style="font-family:'Cinzel',serif;font-size:1.6em;color:var(--orange);font-weight:700;">${grandLow > 0 ? grandLow : '0'}</div>
                        <div style="font-size:0.7em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Low Stock</div>
                    </div>
                    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
                        <div style="font-family:'Cinzel',serif;font-size:1.6em;color:var(--red);font-weight:700;">${bbOut + scOut > 0 ? bbOut + scOut : '0'}</div>
                        <div style="font-size:0.7em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Out of Stock</div>
                    </div>
                `;
            }
        }

        // Export inventory to CSV or JSON
        function exportInventory(format) {
            const timestamp = new Date().toISOString().split('T')[0];
            
            if (format === 'csv') {
                let csv = 'Sport,Jersey,Total,Size,Quantity\n';
                Object.entries(INVENTORY.baseball).forEach(([name, data]) => {
                    Object.entries(data.sizes).forEach(([size, qty]) => {
                        csv += `Baseball,"${name}",${data.total},${size},${qty}\n`;
                    });
                });
                Object.entries(INVENTORY.soccer).forEach(([name, data]) => {
                    Object.entries(data.sizes).forEach(([size, qty]) => {
                        csv += `Soccer,"${name}",${data.total},${size},${qty}\n`;
                    });
                });
                downloadFile(csv, `fs-inventory-${timestamp}.csv`, 'text/csv');
            } else if (format === 'json') {
                const data = {
                    exported: new Date().toISOString(),
                    inventory: INVENTORY
                };
                downloadFile(JSON.stringify(data, null, 2), `fs-inventory-${timestamp}.json`, 'application/json');
            }
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Low stock alerts
        function checkLowStock() {
            const alerts = [];
            const threshold = 10;
            
            Object.entries(INVENTORY.baseball).forEach(([name, data]) => {
                Object.entries(data.sizes).forEach(([size, qty]) => {
                    if (qty < threshold) {
                        alerts.push({ sport: 'Baseball', name, size, qty });
                    }
                });
            });
            
            Object.entries(INVENTORY.soccer).forEach(([name, data]) => {
                Object.entries(data.sizes).forEach(([size, qty]) => {
                    if (qty < threshold) {
                        alerts.push({ sport: 'Soccer', name, size, qty });
                    }
                });
            });
            
            const container = document.getElementById('low-stock-alerts');
            if (alerts.length > 0) {
                container.innerHTML = `
                    <div style="background: rgba(239,83,80,0.1); border: 1px solid rgba(239,83,80,0.3); border-radius: 12px; padding: 16px;">
                        <div style="font-weight: 600; color: var(--red); margin-bottom: 8px;">⚠️ Low Stock Alert (${alerts.length} items below ${threshold} units)</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                            ${alerts.map(a => `
                                <span style="background: var(--black); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 0.85em;">
                                    ${a.sport === 'Baseball' ? '⚾' : '⚽'} ${a.name} ${a.size}: <strong style="color: var(--red);">${a.qty}</strong>
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        }

        // Init
        renderInventory();
        checkLowStock();

        // Auto-refresh inventory every 30 seconds
        if (window.FSUtils) {
            FSUtils.autoRefresh(() => {
                renderInventory();
                checkLowStock();
            }, 30000, 'inventory');
        }
    </script>
