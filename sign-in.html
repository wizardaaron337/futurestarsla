<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Stars — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-light: #F4D03F;
            --gold-dark: #B8960C;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --white: #FFFFFF;
            --gray: #888888;
            --gray-dark: #444444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 20% 50%, rgba(212,175,55,0.03) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(212,175,55,0.02) 0%, transparent 50%);
        }
        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
            padding: 40px;
        }
        .logo-mark {
            width: 80px;
            height: 80px;
            border: 2px solid var(--gold);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, rgba(212,175,55,0.1), transparent);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--gray);
            font-size: 1em;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .crew-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }
        .crew-grid button:last-child {
            grid-column: 1 / -1;
            width: 50%;
            justify-self: center;
        }
        .crew-btn {
            padding: 20px;
            font-size: 1em;
            cursor: pointer;
            background: var(--black-card);
            border: 1px solid var(--gray-dark);
            color: var(--white);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .crew-btn:hover {
            border-color: var(--gold);
            background: linear-gradient(135deg, rgba(212,175,55,0.08), var(--black-card));
            transform: translateY(-2px);
        }
        .crew-btn.selected {
            border-color: var(--gold);
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
            box-shadow: 0 0 30px rgba(212,175,55,0.1);
        }
        .crew-btn .role {
            font-size: 0.75em;
            color: var(--gray);
            display: block;
            margin-top: 4px;
        }
        .go-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            border: none;
            color: var(--black);
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }
        .go-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(212,175,55,0.3);
        }
        #msg { margin-top: 20px; font-size: 0.95em; }
        @media (max-width: 480px) {
            .crew-grid { grid-template-columns: 1fr; }
            .crew-grid button:last-child { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-mark">🏆</div>
        <h1>FUTURE STARS</h1>
        <div class="subtitle">Select Your Name</div>
        <div class="crew-grid">
            <button class="crew-btn" onclick="pick('jr', this)">
                <div>👑 JR<span class="role">Owner</span></div>
            </button>
            <button class="crew-btn" onclick="pick('lane', this)">
                <div>👑 Lane<span class="role">Owner</span></div>
            </button>
            <button class="crew-btn" onclick="pick('pj', this)">
                <div>🚐 PJ<span class="role">Logistics</span></div>
            </button>
            <button class="crew-btn" onclick="pick('caleb', this)">
                <div>📞 Caleb<span class="role">Tournament Lock</span></div>
            </button>
            <button class="crew-btn" onclick="pick('marlon', this)">
                <div>📦 Marlon<span class="role">Inventory</span></div>
            </button>
        </div>
        <button class="go-btn" onclick="go()">ENTER</button>
        <div id="msg"></div>
    </div>
    <script>
        const CREW = {
            'jr': { role: 'owner', name: 'JR' },
            'lane': { role: 'owner', name: 'Lane' },
            'pj': { role: 'logistics', name: 'PJ' },
            'caleb': { role: 'tournament', name: 'Caleb' },
            'marlon': { role: 'inventory', name: 'Marlon' }
        };
        let picked = null;

        function pick(who, btn) {
            picked = who;
            document.querySelectorAll('.crew-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('msg').textContent = '';
        }

        function go() {
            const msg = document.getElementById('msg');
            if (!picked) {
                msg.style.color = '#ff4444';
                msg.textContent = 'Select your name first';
                return;
            }
            msg.style.color = 'var(--gold)';
            msg.textContent = 'Loading...';
            sessionStorage.setItem('fs_auth', picked);
            sessionStorage.setItem('fs_role', CREW[picked].role);
            sessionStorage.setItem('fs_name', CREW[picked].name);
            setTimeout(() => window.location.href = 'pin.html', 400);
        }
    </script>
</body>
</html>
