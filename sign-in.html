<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css?v=2">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 20% 50%, rgba(201,162,39,0.04) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(201,162,39,0.03) 0%, transparent 50%);
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
            padding: 40px;
            position: relative;
            z-index: 1;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(201,162,39,0.2);
            margin: 0 auto 25px;
            display: block;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--gray);
            font-size: 1em;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .crew-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }
        .crew-grid button:last-child {
            grid-column: 1 / -1;
            width: 50%;
            justify-self: center;
        }
        .crew-btn {
            padding: 20px;
            font-size: 1em;
            cursor: pointer;
            background: var(--black-card);
            border: 1px solid var(--gray-dark);
            color: var(--white);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .crew-btn:hover {
            border-color: var(--gold);
            background: linear-gradient(135deg, rgba(201,162,39,0.08), var(--black-card));
            transform: translateY(-2px);
        }
        .crew-btn.selected {
            border-color: var(--gold);
            background: linear-gradient(135deg, rgba(201,162,39,0.15), rgba(201,162,39,0.05));
            box-shadow: 0 0 30px rgba(201,162,39,0.1);
        }
        .crew-btn .role {
            font-size: 0.75em;
            color: var(--gray);
            display: block;
            margin-top: 4px;
        }
        #msg { margin-top: 20px; font-size: 0.95em; }
        @media (max-width: 480px) {
            .crew-grid { grid-template-columns: 1fr; }
            .crew-grid button:last-child { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progress-bar"></div>
    <div class="particles" id="particles"></div>
    <div class="container">
        <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
        <h1>FUTURE STARS</h1>
        <div class="subtitle">Select Your Name</div>
        <div class="crew-grid">
            <button class="crew-btn" onclick="pick('jr', this)">
                <div>👑 JR<span class="role">Owner</span></div>
            </button>
            <button class="crew-btn" onclick="pick('lane', this)">
                <div>👑 Lane<span class="role">Owner</span></div>
            </button>
            <button class="crew-btn" onclick="pick('pj', this)">
                <div>🚐 PJ<span class="role">Logistics</span></div>
            </button>
            <button class="crew-btn" onclick="pick('caleb', this)">
                <div>📞 Caleb<span class="role">Tournament Lock</span></div>
            </button>
            <button class="crew-btn" onclick="pick('marlon', this)">
                <div>📦 Marlon<span class="role">Inventory</span></div>
            </button>
        </div>
        <button class="btn-3d" onclick="go()" style="width:100%;">ENTER</button>
        <div id="msg"></div>
    </div>
    <script>
        const CREW = {
            'jr': { role: 'owner', name: 'JR' },
            'lane': { role: 'owner', name: 'Lane' },
            'pj': { role: 'logistics', name: 'PJ' },
            'caleb': { role: 'tournament', name: 'Caleb' },
            'marlon': { role: 'inventory', name: 'Marlon' }
        };
        let picked = null;

        function pick(who, btn) {
            picked = who;
            document.querySelectorAll('.crew-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('msg').textContent = '';
        }

        function go() {
            const msg = document.getElementById('msg');
            if (!picked) {
                msg.style.color = '#EF5350';
                msg.textContent = 'Select your name first';
                return;
            }
            msg.style.color = 'var(--gold)';
            msg.textContent = 'Loading...';
            sessionStorage.setItem('fs_auth', picked);
            sessionStorage.setItem('fs_role', CREW[picked].role);
            sessionStorage.setItem('fs_name', CREW[picked].name);
            setTimeout(() => window.location.href = 'pin.html', 400);
        }

        // Particles & Progress Bar
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
        window.addEventListener("scroll", function(){
            const bar = document.getElementById("progress-bar");
            if (!bar) return;
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = scrollHeight > 0 ? (scrollTop/scrollHeight)*100 : 0;
            bar.style.width = pct+"%";
        });
    </script>
</body>
</html>
