<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortly Import — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css?v=2">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --green: #4CAF50;
            --red: #EF5350;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .logo-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .logo-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(201,162,39,0.2);
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.5em;
            color: var(--gold);
            letter-spacing: 3px;
        }
        .subtitle {
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: var(--gold);
            background: rgba(201,162,39,0.03);
        }
        .upload-icon {
            font-size: 3em;
            margin-bottom: 12px;
        }
        .upload-text {
            color: var(--gray);
            font-size: 0.9em;
        }
        .upload-text strong {
            color: var(--gold);
        }
        .nav-back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: var(--black-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .nav-back:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .logo-text { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progress-bar"></div>
    <div class="particles" id="particles"></div>
    <div class="container">
        <a href="dashboard.html" class="logo-link">
            <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
            <span class="logo-text">FUTURE STARS</span>
        </a>
        <p class="subtitle">Sortly Inventory Import</p>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <div class="upload-icon">📤</div>
            <div class="upload-text">
                <strong>Click to upload</strong> or drag and drop<br>
                Sortly export CSV or JSON
            </div>
        </div>
        <input type="file" id="file-input" style="display:none" accept=".csv,.json">
        <a href="dashboard.html" class="nav-back">← Back to Dashboard</a>
    </div>
    <script>
        // Particles & Progress Bar
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
        window.addEventListener("scroll", function(){
            const bar = document.getElementById("progress-bar");
            if (!bar) return;
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = scrollHeight > 0 ? (scrollTop/scrollHeight)*100 : 0;
            bar.style.width = pct+"%";
        });
    </script>
</body>
</html>
