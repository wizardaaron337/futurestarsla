<body>
    <script>if(!sessionStorage.getItem("fs_auth")||sessionStorage.getItem("fs_pin_verified")!=="true"){window.location.href="index.html";}</script>
    <div class="header">
        <a href="index.html" class="logo-link">
            <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
            <span class="logo-text">FUTURE STARS</span>
        </a>
        <div class="user-info">
            <span class="user-name" id="user-name"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="page-title">Tournament Schedules</div>
        <div class="page-subtitle">Search for a tournament, save its website, and scrape game times</div>

        <div class="search-bar">
            <input type="text" id="search" placeholder="Search tournament name..." oninput="filterTourneys()">
        </div>

        <div id="tourney-list"></div>
    </div>

    <script>
        const NAME = sessionStorage.getItem('fs_name') || 'User';
        document.getElementById('user-name').textContent = NAME.toUpperCase();

        // Load saved URLs and scraped data from localStorage
        const STORED_URLS_KEY = 'fs_tourney_urls';
        const STORED_TIMES_KEY = 'fs_tourney_times';

        function getSavedUrls() {
            return JSON.parse(localStorage.getItem(STORED_URLS_KEY) || '{}');
        }
        function saveUrl(tourneyName, url) {
            const urls = getSavedUrls();
            urls[tourneyName] = url;
            localStorage.setItem(STORED_URLS_KEY, JSON.stringify(urls));
        }
        function removeUrl(tourneyName) {
            const urls = getSavedUrls();
            delete urls[tourneyName];
            localStorage.setItem(STORED_URLS_KEY, JSON.stringify(urls));
            render();
        }

        function getTimes(tourneyName) {
            const all = JSON.parse(localStorage.getItem(STORED_TIMES_KEY) || '{}');
            return all[tourneyName] || null;
        }
        function saveTimes(tourneyName, data) {
            const all = JSON.parse(localStorage.getItem(STORED_TIMES_KEY) || '{}');
            all[tourneyName] = data;
            localStorage.setItem(STORED_TIMES_KEY, JSON.stringify(all));
        }

        function render() {
            const list = document.getElementById('tourney-list');
            const search = document.getElementById('search').value.toLowerCase();
            
            if (typeof TOURNEY_DATA === 'undefined' || !TOURNEY_DATA.length) {
                list.innerHTML = '<div class="empty-state"><div class="big">😕</div><h3>No tournament data loaded</h3></div>';
                return;
            }

            let filtered = TOURNEY_DATA;
            if (search) {
                filtered = TOURNEY_DATA.filter(t => 
                    (t.name || '').toLowerCase().includes(search) ||
                    (t.sport || '').toLowerCase().includes(search) ||
                    (t.state || '').toLowerCase().includes(search)
                );
            }

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="big">🔍</div><h3>No tournaments match</h3></div>';
                return;
            }

            // Remove duplicates by name
            const seen = new Set();
            filtered = filtered.filter(t => {
                const key = t.name.toLowerCase().trim();
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            const savedUrls = getSavedUrls();

            list.innerHTML = filtered.map(t => {
                const savedUrl = savedUrls[t.name] || '';
                const times = getTimes(t.name);
                return `
                    <div class="tourney-card">
                        <h3>${t.name}</h3>
                        <div class="meta">
                            ${t.sport ? t.sport + ' · ' : ''}${t.ageGroup ? t.ageGroup + ' · ' : ''}${t.size ? t.size + ' teams · ' : ''}${t.state || ''}
                            ${t.contact ? ' · <strong>Contact:</strong> ' + t.contact : ''}
                        </div>
                        <div class="url-row">
                            <input type="text" id="url-${t.name.replace(/[^a-zA-Z0-9]/g,'')}" placeholder="Paste tournament website URL..." value="${savedUrl}">
                            <button class="btn-sm btn-save" onclick="saveTourneyUrl('${t.name.replace(/'/g,"\\'")}', 'url-${t.name.replace(/[^a-zA-Z0-9]/g,'')}')">Save</button>
                            <button class="btn-sm btn-scrape" onclick="scrapePage('${t.name.replace(/'/g,"\\'")}')">Scrape</button>
                            ${savedUrl ? `<a href="${savedUrl}" target="_blank" class="btn-sm btn-open">Open ↗</a>` : ''}
                        </div>
                        <div id="results-${t.name.replace(/[^a-zA-Z0-9]/g,'')}">
                            ${times ? renderTimes(t.name, times) : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderTimes(tourneyName, data) {
            const results = data.results || [];
            if (results.length === 0) return '';
            
            return `<div class="results-panel">
                ${results.map(r => `<div class="result-item">
                    <span class="result-time">${r.time || '?'}</span>
                    <span class="result-detail">${r.detail || ''}</span>
                </div>`).join('')}
            </div>`;
        }

        function saveTourneyUrl(name, inputId) {
            const input = document.getElementById(inputId);
            const url = input.value.trim();
            if (!url) {
                removeUrl(name);
                return;
            }
            saveUrl(name, url);
            const status = document.createElement('div');
            status.className = 'scrape-status success';
            status.textContent = '✅ URL saved!';
            input.parentElement.appendChild(status);
            setTimeout(() => status.remove(), 2000);
            render();
        }

        function scrapePage(tourneyName) {
            const urls = getSavedUrls();
            const url = urls[tourneyName];
            if (!url) {
                alert('Save a URL first before scraping.');
                return;
            }

            const resultsDiv = document.getElementById('results-' + tourneyName.replace(/[^a-zA-Z0-9]/g,''));
            resultsDiv.innerHTML = '<div class="scrape-status loading">🔍 Fetching ' + url + ' ...</div>';

            // Use a CORS proxy to fetch the page
            const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
            
            fetch(proxyUrl)
                .then(res => {
                    if (!res.ok) throw new Error('Could not fetch page (status ' + res.status + ')');
                    return res.text();
                })
                .then(html => {
                    // Parse the HTML for tables and schedule-like content
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    // Look for tables
                    const tables = doc.querySelectorAll('table');
                    let results = [];

                    // Strategy 1: Look for any table with time-like content (HH:MM AM/PM)
                    tables.forEach(table => {
                        const rows = table.querySelectorAll('tr');
                        rows.forEach(row => {
                            const cells = row.querySelectorAll('td, th');
                            const text = Array.from(cells).map(c => c.textContent.trim()).filter(Boolean);
                            const rowText = text.join(' ');
                            
                            // Check if any cell looks like a time (e.g., 8:00 AM, 14:30, 09:00)
                            const timeMatch = rowText.match(/(\d{1,2}:\d{2}\s*(?:AM|PM|am|pm)?)/);
                            if (timeMatch && text.length >= 2) {
                                const time = timeMatch[1];
                                const detail = text.filter(t => t !== timeMatch[0]).join(' — ').substring(0, 200);
                                results.push({ time, detail });
                            }
                        });
                    });

                    // Strategy 2: If no tables, look for divs/paragraphs with time patterns
                    if (results.length === 0) {
                        const bodyText = doc.body ? doc.body.textContent : '';
                        const lines = bodyText.split('\n').map(l => l.trim()).filter(Boolean);
                        
                        lines.forEach(line => {
                            const timeMatch = line.match(/(\d{1,2}:\d{2}\s*(?:AM|PM|am|pm)?)/);
                            if (timeMatch && line.length > 10 && line.length < 300) {
                                const time = timeMatch[1];
                                const detail = line.replace(timeMatch[0], '').trim().substring(0, 200);
                                results.push({ time, detail });
                            }
                        });
                    }

                    // Deduplicate
                    const seen = new Set();
                    results = results.filter(r => {
                        const key = r.time + r.detail;
                        if (seen.has(key)) return false;
                        seen.add(key);
                        return true;
                    });

                    // Save results
                    const data = { url, scrapeDate: new Date().toISOString(), results };
                    saveTimes(tourneyName, data);
                    
                    if (results.length > 0) {
                        resultsDiv.innerHTML = `<div class="scrape-status success">✅ Found ${results.length} schedule entries!</div>${renderTimes(tourneyName, data)}`;
                    } else {
                        resultsDiv.innerHTML = `<div class="scrape-status error">No game times found. Try opening the site manually.</div>`;
                    }
                })
                .catch(err => {
                    resultsDiv.innerHTML = `<div class="scrape-status error">⚠️ ${err.message || 'Could not fetch page'}</div>`;
                });
        }

        function filterTourneys() {
            render();
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'signin.html';
        }

        render();
    </script>
</body>
