<!DOCTYPE html>
<html lang="en">
<head>
<!-- build: 1777090018-64c45191 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Future Stars Sports Co - Championship sports merchandise, tournament operations, and inventory management.">
    <meta name="keywords" content="sports, merchandise, tournament, soccer, baseball, jerseys">
    <meta name="author" content="Future Stars Sports Co">
    <meta name="theme-color" content="#C9A227">
    <meta property="og:title" content="Future Stars Sports Co">
    <meta property="og:description" content="Elite sports merchandise for the next generation of champions.">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --black-hover: #242424;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --green: #4CAF50;
            --red: #EF5350;
            --blue: #64B5F6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            font-size: 15px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold-dark);
            box-shadow: 0 0 20px rgba(201,162,39,0.2);
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
        }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-name {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.85em;
            letter-spacing: 2px;
        }
        .logout-btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid var(--gray-dark);
            color: var(--gray);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover { border-color: var(--gold); color: var(--gold); }
        .nav {
            display: flex;
            gap: 4px;
            padding: 12px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .nav a {
            padding: 10px 20px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .nav a:hover { color: var(--white); background: var(--black-hover); }
        .nav a.active { color: var(--gold); background: rgba(201,162,39,0.08); }
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
        }
        .welcome {
            font-family: 'Cinzel', serif;
            font-size: 2.2em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .subtitle { color: var(--gray); margin-bottom: 35px; font-size: 1em; }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(201,162,39,0.3); }
        .btn-secondary {
            background: var(--black-card);
            border: 1px solid var(--border);
            color: var(--white);
        }
        .btn-secondary:hover { border-color: var(--gold); }

        /* Plans Grid */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }
        .plan-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        .plan-card:hover {
            border-color: var(--gold-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }
        .plan-title {
            font-family: 'Cinzel', serif;
            font-size: 1em;
            color: var(--gold);
            letter-spacing: 1px;
        }
        .plan-date {
            font-size: 0.8em;
            color: var(--gray);
        }
        .plan-section {
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .plan-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .section-label {
            font-size: 0.75em;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .plan-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 0.9em;
        }
        .plan-row .label { color: var(--white); }
        .plan-row .value { color: var(--gray); }
        .plan-row .price {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-weight: 700;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            margin-top: 12px;
            border-top: 2px solid var(--gold);
        }
        .total-label {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.9em;
            letter-spacing: 2px;
        }
        .total-price {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.4em;
            font-weight: 700;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 20px;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--gray);
            font-size: 1.5em;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: var(--gray);
            font-size: 0.85em;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--black-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .cost-input {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cost-input span {
            color: var(--gray);
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; padding: 15px 20px; }
            .nav { padding: 10px 20px; }
            .main { padding: 30px 20px; }
            .plans-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progress-bar"></div>
    <div class="particles" id="particles"></div>
    <script>if(!sessionStorage.getItem("fs_auth")||sessionStorage.getItem("fs_pin_verified")!=="true"){window.location.href="index.html";}</script>
    <div class="header">
        <a href="index.html" class="logo-link">
            <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
            <span class="logo-text">FUTURE STARS</span>
        </a>
        <div class="user-info">
            <span class="user-name" id="user-name"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    <nav class="nav" id="main-nav"></nav>

    <div class="main">
        <div class="welcome">Trip Plans</div>
        <div class="subtitle" id="subtitle">Saved hotel & car bookings</div>

        <div class="controls">
            <button class="btn btn-primary" onclick="openModal()">+ New Trip Plan</button>
            <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
        </div>

        <div class="plans-grid" id="plans-grid"></div>
    </div>

    <!-- Add Plan Modal -->
    <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2>New Trip Plan</h2>
            <div class="form-group">
                <label>Trip Name</label>
                <input type="text" id="plan-name" placeholder="e.g., Lafayette Tournament">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="plan-location" placeholder="e.g., Lafayette, LA">
                </div>
                <div class="form-group">
                    <label>Dates</label>
                    <input type="text" id="plan-dates" placeholder="e.g., May 15-16">
                </div>
            </div>

            <h3 style="font-family:Cinzel,serif;color:var(--gold);margin:20px 0 12px;font-size:0.9em;">🏨 Hotel</h3>
            <div class="form-group">
                <label>Hotel Name</label>
                <input type="text" id="hotel-name" placeholder="e.g., Hampton Inn & Suites">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="hotel-address" placeholder="e.g., 6085 Industrial Pkwy">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Nights</label>
                    <input type="number" id="hotel-nights" placeholder="2" min="1">
                </div>
                <div class="form-group">
                    <label>Rate/Night ($)</label>
                    <input type="number" id="hotel-rate" placeholder="105" min="0">
                </div>
            </div>

            <h3 style="font-family:Cinzel,serif;color:var(--gold);margin:20px 0 12px;font-size:0.9em;">🚗 Car Rental</h3>
            <div class="form-group">
                <label>Company</label>
                <input type="text" id="car-company" placeholder="e.g., Hertz">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="car-address" placeholder="e.g., 1122 Aviation Rd">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Days</label>
                    <input type="number" id="car-days" placeholder="2" min="1">
                </div>
                <div class="form-group">
                    <label>Rate/Day ($)</label>
                    <input type="number" id="car-rate" placeholder="57" min="0">
                </div>
            </div>

            <div style="margin-top:24px; display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="savePlan()">Save Plan</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const NAME = sessionStorage.getItem('fs_name') || 'User';
        document.getElementById('user-name').textContent = NAME.toUpperCase();

        // Nav
        (function() {
            const role = sessionStorage.getItem('fs_role');
            const nav = document.getElementById('main-nav');
            if (!nav || !role) return;
            const links = { owner: ['dashboard','tournaments','inventory','trips','planner','team','tracker'], inventory: ['dashboard','inventory','team','tracker'], logistics: ['dashboard','trips','planner','team','tracker'], tournament: ['dashboard','tournaments','team'] };
            const labels = { dashboard:'Dashboard', tournaments:'Tournaments', inventory:'Inventory', trips:'Trips', planner:'Planner', team:'Team', tracker:'Tracker' };
            const current = 'trip-plans';
            nav.innerHTML = (links[role] || links.owner).map(p => {
                const cls = p === current ? 'active' : '';
                return `<a href="${p === 'planner' ? 'pj-planner' : p === 'tracker' ? 'trip-tracker' : p === 'trip-plans' ? 'trip-plans' : p}.html" class="${cls}">${labels[p]}</a>`;
            }).join('');
        })();

        const STORAGE_KEY = 'fs_trip_plans';

        function getPlans() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function savePlans(plans) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(plans));
            render();
        }

        function render() {
            const plans = getPlans();
            const grid = document.getElementById('plans-grid');
            document.getElementById('subtitle').textContent = `${plans.length} saved plan${plans.length !== 1 ? 's' : ''}`;

            if (plans.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray);">
                        <h3 style="font-family:Cinzel,serif;color:var(--gold);margin-bottom:10px;">No trip plans yet</h3>
                        <p>Click "New Trip Plan" to add hotel & car bookings</p>
                    </div>
                `;
                return;
            }

            // Sort by date added (newest first)
            plans.sort((a,b) => b.id - a.id);

            grid.innerHTML = plans.map(plan => {
                const hotelTotal = (plan.hotel.nights || 0) * (plan.hotel.rate || 0);
                const carTotal = (plan.car.days || 0) * (plan.car.rate || 0);
                const total = hotelTotal + carTotal;

                return `
                    <div class="plan-card">
                        <div class="plan-header">
                            <div>
                                <div class="plan-title">${plan.name}</div>
                                <div class="plan-date">${plan.location} • ${plan.dates}</div>
                            </div>
                            <button onclick="deletePlan(${plan.id})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:1.2em;">&times;</button>
                        </div>

                        <div class="plan-section">
                            <div class="section-label">🏨 Hotel</div>
                            <div class="plan-row">
                                <span class="label">${plan.hotel.name}</span>
                                <span class="price">$${hotelTotal}</span>
                            </div>
                            <div class="plan-row">
                                <span class="value">${plan.hotel.address}</span>
                            </div>
                            <div class="plan-row">
                                <span class="value">$${plan.hotel.rate}/night × ${plan.hotel.nights} nights</span>
                            </div>
                        </div>

                        <div class="plan-section">
                            <div class="section-label">🚗 Car Rental</div>
                            <div class="plan-row">
                                <span class="label">${plan.car.company}</span>
                                <span class="price">$${carTotal}</span>
                            </div>
                            <div class="plan-row">
                                <span class="value">${plan.car.address}</span>
                            </div>
                            <div class="plan-row">
                                <span class="value">$${plan.car.rate}/day × ${plan.car.days} days</span>
                            </div>
                        </div>

                        <div class="total-row">
                            <span class="total-label">TOTAL</span>
                            <span class="total-price">$${total}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal() {
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            // Clear inputs
            document.querySelectorAll('#modal input').forEach(i => i.value = '');
        }

        function savePlan() {
            const plan = {
                id: Date.now(),
                name: document.getElementById('plan-name').value || 'Untitled Trip',
                location: document.getElementById('plan-location').value || '',
                dates: document.getElementById('plan-dates').value || '',
                hotel: {
                    name: document.getElementById('hotel-name').value || '',
                    address: document.getElementById('hotel-address').value || '',
                    nights: parseInt(document.getElementById('hotel-nights').value) || 0,
                    rate: parseFloat(document.getElementById('hotel-rate').value) || 0
                },
                car: {
                    company: document.getElementById('car-company').value || '',
                    address: document.getElementById('car-address').value || '',
                    days: parseInt(document.getElementById('car-days').value) || 0,
                    rate: parseFloat(document.getElementById('car-rate').value) || 0
                }
            };

            const plans = getPlans();
            plans.push(plan);
            savePlans(plans);
            closeModal();
        }

        function deletePlan(id) {
            if (!confirm('Delete this trip plan?')) return;
            const plans = getPlans().filter(p => p.id !== id);
            savePlans(plans);
        }

        function clearAll() {
            if (!confirm('Delete ALL trip plans? This cannot be undone.')) return;
            localStorage.removeItem(STORAGE_KEY);
            render();
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'signin.html';
        }

        // Add sample plan if none exist
        function addSamplePlan() {
            const plans = getPlans();
            if (plans.length === 0) {
                plans.push({
                    id: Date.now(),
                    name: 'Lafayette Tournament',
                    location: 'Lafayette, LA',
                    dates: 'Next Weekend',
                    hotel: {
                        name: 'Hampton Inn & Suites',
                        address: '6085 Industrial Pkwy, Lafayette',
                        nights: 2,
                        rate: 105
                    },
                    car: {
                        company: 'Hertz',
                        address: '1122 Aviation Rd, Lafayette',
                        days: 2,
                        rate: 57
                    }
                });
                savePlans(plans);
            }
        }

        // Init
        addSamplePlan();
        render();
    </script>
    <script>
        // Particles & Progress Bar
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
        window.addEventListener("scroll", function(){
            const bar = document.getElementById("progress-bar");
            if (!bar) return;
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = scrollHeight > 0 ? (scrollTop/scrollHeight)*100 : 0;
            bar.style.width = pct+"%";
        });
    </script>
</body>
</html>
