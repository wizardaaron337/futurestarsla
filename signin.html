<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-dark: #B8941F;
            --gold-light: #E8C84B;
            --black: #0A0A0A;
            --dark-gray: #1A1A1A;
            --card-bg: #141414;
            --cream: #F8F6F0;
            --muted: #A8A498;
            --red: #EF5350;
            --green: #4CAF50;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(201,162,39,0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(201,162,39,0.03) 0%, transparent 50%);
        }
        .box {
            background: var(--card-bg);
            border: 1px solid rgba(201,162,39,0.15);
            border-radius: 20px;
            padding: 50px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(201,162,39,0.2), 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.6em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 6px;
        }
        .logo-script {
            font-family: 'Great Vibes', cursive;
            font-size: 1.4em;
            color: var(--gold-light);
            margin-bottom: 8px;
        }
        .tagline {
            color: var(--muted);
            margin-bottom: 40px;
            font-size: 1.1em;
            letter-spacing: 1px;
        }
        .names {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        .names > :nth-child(5) { grid-column: 1 / -1; justify-self: center; width: 50%; }
        .name-btn {
            padding: 16px;
            background: var(--dark-gray);
            border: 1px solid rgba(201,162,39,0.15);
            border-radius: 14px;
            color: var(--cream);
            font-family: 'Inter', sans-serif;
            font-size: 1.05em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .name-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201,162,39,0.08);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201,162,39,0.1);
        }
        .name-btn.selected {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201,162,39,0.12);
            box-shadow: 0 0 25px rgba(201,162,39,0.15);
        }
        .go-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            border: none;
            color: var(--black);
            border-radius: 14px;
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 3px;
        }
        .go-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(201,162,39,0.3);
        }
        .msg { margin-top: 20px; font-size: 1.05em; }
        .msg.error { color: var(--red); }
        .msg.success { color: var(--green); }
        @media (max-width: 480px) {
            .box { padding: 30px 20px; }
            .names { grid-template-columns: 1fr; }
            .names > :nth-child(5) { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
        <div class="logo-script">FutureStars</div>
        <div class="logo-text">SPORTS CO</div>
        <p class="tagline">Who are you?</p>
        <div class="names">
            <button class="name-btn" onclick="pick('jr')">👑 JR</button>
            <button class="name-btn" onclick="pick('lane')">👑 Lane</button>
            <button class="name-btn" onclick="pick('pj')">🚐 PJ</button>
            <button class="name-btn" onclick="pick('caleb')">📞 Caleb</button>
            <button class="name-btn" onclick="pick('marlon')">📦 Marlon</button>
        </div>
        <button class="go-btn" onclick="go()">GO</button>
        <div class="msg" id="msg"></div>
    </div>
    <script>
        const CREW = {
            'jr': { role: 'owner', name: 'JR' },
            'lane': { role: 'owner', name: 'Lane' },
            'pj': { role: 'logistics', name: 'PJ' },
            'caleb': { role: 'tournament', name: 'Caleb' },
            'marlon': { role: 'inventory', name: 'Marlon' }
        };
        let picked = null;
        const msg = document.getElementById('msg');

        function pick(who) {
            picked = who;
            document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
            msg.textContent = '';
        }

        function go() {
            if (!picked) {
                msg.className = 'msg error';
                msg.textContent = 'Click your name first!';
                return;
            }
            msg.className = 'msg success';
            msg.textContent = 'Logging in...';
            sessionStorage.setItem('fs_auth', picked);
            sessionStorage.setItem('fs_role', CREW[picked].role);
            sessionStorage.setItem('fs_name', CREW[picked].name);
            setTimeout(() => window.location.href = 'pin.html', 500);
        }
    </script>
</body>
</html>
