    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-dark: #B8941F;
            --gold-light: #E8C84B;
            --black: #0A0A0A;
            --black-card: #1A1A1A;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --red: #EF5350;
            --green: #4CAF50;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            margin-bottom: 15px;
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 6px;
        }
        .tagline {
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 1em;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 0.8em;
            color: var(--gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--black);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            transition: all 0.2s;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201,162,39,0.1);
        }
        .input-group input::placeholder {
            color: var(--gray-dark);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            border: none;
            border-bottom: 4px solid var(--gold-dark);
            border-radius: 12px;
            color: var(--black);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201,162,39,0.4);
        }
        .login-btn:active {
            transform: translateY(2px);
            border-bottom: 2px solid var(--gold-dark);
        }

        .msg {
            margin-top: 20px;
            font-size: 1em;
            min-height: 24px;
        }
        .msg.error { color: var(--red); }
        .msg.success { color: var(--green); }

        @media (max-width: 480px) {
            .box { padding: 30px 20px; }
        }

<body>
    <div class="box">
        <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
        <div class="logo-text">FUTURE STARS</div>
        <p class="tagline">Sign in to your account</p>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="login-btn" onclick="login()">SIGN IN</button>

        <div class="msg" id="msg"></div>

    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const msg = document.getElementById('msg');

        // Auto-focus username
        usernameInput.focus();

        // Submit on Enter
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
        usernameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });

        function login() {
            const username = usernameInput.value.trim().toLowerCase();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                msg.className = 'msg error';
                msg.textContent = 'Enter both username and password';
                return;
            }

            const user = AUTH_CONFIG.getUser(username);
            if (!user) {
                msg.className = 'msg error';
                msg.textContent = 'User not found';
                return;
            }

            if (AUTH_CONFIG.verifyPassword(username, password)) {
                msg.className = 'msg success';
                msg.textContent = 'Welcome, ' + user.name + '!';
                // Save to both storages so auth survives build ID reloads
                ['fs_auth', 'fs_role', 'fs_name'].forEach(k => sessionStorage.removeItem(k));
                ['fs_auth', 'fs_role', 'fs_name'].forEach(k => localStorage.removeItem(k));
                sessionStorage.setItem('fs_auth', username);
                sessionStorage.setItem('fs_role', user.role);
                sessionStorage.setItem('fs_name', user.name);
                localStorage.setItem('fs_auth', username);
                localStorage.setItem('fs_role', user.role);
                localStorage.setItem('fs_name', user.name);
                setTimeout(() => window.location.href = 'index.html' + (location.hostname.includes('pages.dev') ? '?r=' + Date.now() : ''), 500);
            } else {
                msg.className = 'msg error';
                msg.textContent = 'Wrong password';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }
    </script>
</body>
</html>
