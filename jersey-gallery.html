<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jersey Gallery — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #ffd700; --blue: #00d4ff; --green: #00ff88; --red: #ff4444; --bg: #050810; --card: rgba(255,255,255,0.02); }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; font-size: 14px; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: rgba(5,8,16,0.95); border-bottom: 1px solid rgba(0,212,255,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron'; font-size: 1.4em; font-weight: 700; background: linear-gradient(135deg, var(--gold), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav { display: flex; gap: 8px; }
        .nav a { padding: 6px 14px; border: 1px solid rgba(0,212,255,0.2); color: var(--blue); text-decoration: none; border-radius: 6px; font-size: 0.85em; font-family: 'Orbitron'; letter-spacing: 1px; }
        .nav a:hover, .nav a.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.05); }
        .main { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .section { margin-bottom: 20px; }
        .section-title { font-family: 'Orbitron'; font-size: 0.95em; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; letter-spacing: 2px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .jersey { background: var(--card); border: 1px solid rgba(0,212,255,0.06); border-radius: 10px; padding: 16px; text-align: center; transition: all 0.2s; }
        .jersey:hover { border-color: rgba(0,212,255,0.15); transform: translateY(-2px); }
        .jersey-img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: rgba(0,0,0,0.3); }
        .jersey-img.error { display: flex; align-items: center; justify-content: center; font-size: 3em; }
        .jersey-name { font-family: 'Orbitron'; font-size: 0.85em; color: var(--blue); margin-bottom: 6px; }
        .jersey-status { padding: 4px 10px; border-radius: 4px; font-size: 0.75em; font-family: 'Orbitron'; display: inline-block; }
        .jersey-status.approved { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
        .jersey-status.pending { background: rgba(255,215,0,0.1); color: var(--gold); border: 1px solid rgba(255,215,0,0.2); }
        .jersey-status.rejected { background: rgba(255,68,68,0.1); color: var(--red); border: 1px solid rgba(255,68,68,0.2); }
        .jersey-actions { display: flex; gap: 6px; margin-top: 10px; justify-content: center; }
        .btn { padding: 4px 12px; border-radius: 4px; font-size: 0.75em; font-family: 'Orbitron'; cursor: pointer; border: none; }
        .btn-approve { background: rgba(0,255,136,0.15); color: var(--green); }
        .btn-reject { background: rgba(255,68,68,0.15); color: var(--red); }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 10px; } .gallery { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <script>if(!sessionStorage.getItem("fs_auth")){window.location.href="login.html";}</script>
    <div class="header">
        <div class="logo">🏆 FUTURE STARS</div>
        <nav class="nav">
            <a href="index.html">Dashboard</a>
            <a href="inventory.html">Inventory</a>
            <a href="trips.html">Trips</a>
            <a href="team.html">Team</a>
            <a href="jersey-gallery.html" class="active">Jerseys</a>
        </nav>
    </div>
    <div class="main">
        <div class="section">
            <div class="section-title">Pending Review</div>
            <div class="gallery" id="pending-gallery"></div>
        </div>
        <div class="section">
            <div class="section-title">Approved</div>
            <div class="gallery" id="approved-gallery"></div>
        </div>
    </div>
    <script>
        const jerseys = [
            { name: 'Ronaldo Red', image: 'images/image0.png', status: 'approved' },
            { name: 'Ronaldo Blue', image: 'images/image1.png', status: 'approved' },
            { name: 'Messi Argentina', image: 'images/image2.jpeg', status: 'approved' },
            { name: 'Yamal Flower', image: 'images/image3.png', status: 'pending' },
            { name: 'Mbappe France', image: 'images/image4.png', status: 'pending' },
            { name: 'Neymar Tribute', image: 'images/image5.png', status: 'pending' },
            { name: 'Saka Arsenal', image: 'images/image6.png', status: 'pending' },
            { name: 'Vini Jr Real', image: 'images/image7.jpeg', status: 'pending' },
            { name: 'Pulisic USA', image: 'images/image8.png', status: 'approved' },
            { name: 'Gimenez Mexico', image: 'images/image9.png', status: 'approved' },
        ];
        
        function render() {
            const pending = document.getElementById('pending-gallery');
            const approved = document.getElementById('approved-gallery');
            pending.innerHTML = '';
            approved.innerHTML = '';
            
            jerseys.forEach(j => {
                const imgHtml = `<img src="${j.image}" alt="${j.name}" class="jersey-img" onerror="this.classList.add('error'); this.outerHTML='<div class=\\'jersey-img error\\'>👕</div>';">`;
                
                const html = `
                    <div class="jersey">
                        ${imgHtml}
                        <div class="jersey-name">${j.name}</div>
                        <span class="jersey-status ${j.status}">${j.status.toUpperCase()}</span>
                        ${j.status === 'pending' ? `
                        <div class="jersey-actions">
                            <button class="btn btn-approve" onclick="approve('${j.name}')">✓ Approve</button>
                            <button class="btn btn-reject" onclick="reject('${j.name}')">✗ Reject</button>
                        </div>` : ''}
                    </div>
                `;
                
                if (j.status === 'pending') pending.innerHTML += html;
                else if (j.status === 'approved') approved.innerHTML += html;
            });
        }
        
        function approve(name) {
            const j = jerseys.find(x => x.name === name);
            if (j) { j.status = 'approved'; render(); }
        }
        
        function reject(name) {
            const j = jerseys.find(x => x.name === name);
            if (j) { j.status = 'rejected'; render(); }
        }
        
        render();
    </script>
</body>
</html>
