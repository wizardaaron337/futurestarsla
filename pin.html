<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter PIN — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css?v=2">
    <script src="auth-config.js?v=4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-card: #1A1A1A;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --green: #4CAF50;
            --red: #EF5350;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(201,162,39,0.2);
            margin-bottom: 15px;
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 6px;
        }
        .tagline {
            color: var(--gray);
            margin-bottom: 20px;
            font-size: 1em;
        }
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(201,162,39,0.08);
            border: 1px solid rgba(201,162,39,0.2);
            border-radius: 30px;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.9em;
            margin-bottom: 25px;
        }

        .pin-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--black);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 1.5em;
            font-weight: 700;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 20px;
            transition: all 0.2s;
            outline: none;
        }
        .pin-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201,162,39,0.15);
        }
        .pin-input::placeholder {
            color: var(--gray-dark);
            font-size: 0.7em;
            letter-spacing: 2px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }
        .btn-back {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--gray-dark);
            color: var(--gray);
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-back:hover {
            border-color: var(--gray);
            color: var(--white);
        }
        .btn-3d {
            flex: 2;
            padding: 14px;
            background: linear-gradient(145deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 10px;
            color: var(--black);
            font-family: 'Cinzel', serif;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(201,162,39,0.3);
        }
        .btn-3d:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201,162,39,0.4);
        }
        .btn-3d:active {
            transform: translateY(0);
        }

        .msg {
            margin-top: 15px;
            font-size: 1em;
            min-height: 24px;
        }
        .msg.error { color: var(--red); }
        .msg.success { color: var(--green); }

        @media (max-width: 420px) {
            .box { padding: 30px 20px; }
            .logo-text { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
        <div class="logo-text">FUTURE STARS</div>
        <p class="tagline">Enter your PIN</p>
        <div class="user-badge" id="user-badge">👤 <span id="user-name">User</span></div>

        <input type="text" class="pin-input" id="pin-input" placeholder="Type your PIN" autocomplete="off">

        <div class="actions">
            <button class="btn-back" onclick="goBack()">← Back</button>
            <button class="btn-3d" onclick="submit()">ENTER</button>
        </div>

        <div class="msg" id="msg"></div>
    </div>

    <script>
        const username = sessionStorage.getItem('fs_auth');
        const user = AUTH_CONFIG.getUser(username);
        const name = user ? user.name : (sessionStorage.getItem('fs_name') || 'User');
        document.getElementById('user-name').textContent = name;

        const pinInput = document.getElementById('pin-input');
        const msg = document.getElementById('msg');

        // Auto-focus the input
        pinInput.focus();

        // Submit on Enter key
        pinInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submit();
            if (e.key === 'Escape') goBack();
        });

        function goBack() {
            sessionStorage.clear();
            window.location.href = 'signin.html';
        }

        function submit() {
            const pin = pinInput.value.trim();
            
            if (!pin) {
                msg.className = 'msg error';
                msg.textContent = 'Enter your PIN';
                pinInput.focus();
                return;
            }

            if (AUTH_CONFIG.verifyPin(username, pin)) {
                msg.className = 'msg success';
                msg.textContent = 'Access granted!';
                sessionStorage.setItem('fs_pin_verified', 'true');
                setTimeout(() => window.location.href = 'dashboard.html', 400);
            } else {
                msg.className = 'msg error';
                msg.textContent = 'Wrong PIN — try again';
                pinInput.value = '';
                pinInput.focus();
            }
        }
    </script>
</body>
</html>
