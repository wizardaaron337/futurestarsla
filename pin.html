<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="Future Stars Sports Co - Championship sports merchandise, tournament operations, and inventory management.">
    <meta name="keywords" content="sports, merchandise, tournament, soccer, baseball, jerseys">
    <meta name="author" content="Future Stars Sports Co">
    <meta name="theme-color" content="#C9A227">
    <meta property="og:title" content="Future Stars Sports Co">
    <meta property="og:description" content="Elite sports merchandise for the next generation of champions.">
    <meta property="og:type" content="website">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Code — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css?v=2">
    <script src="auth-config.js?v=3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-card: #1A1A1A;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --green: #4CAF50;
            --red: #EF5350;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(201,162,39,0.2);
            margin-bottom: 15px;
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 6px;
        }
        .tagline {
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 1em;
        }
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(201,162,39,0.08);
            border: 1px solid rgba(201,162,39,0.2);
            border-radius: 30px;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.9em;
            margin-bottom: 25px;
        }

        /* PIN Dots */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(201,162,39,0.3);
            background: transparent;
            transition: all 0.2s;
        }
        .dot.filled {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(201,162,39,0.4);
        }
        .dot.error {
            border-color: var(--red);
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* Keypad */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .key {
            padding: 20px;
            background: rgba(201,162,39,0.06);
            border: 1px solid rgba(201,162,39,0.15);
            border-radius: 14px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .key:hover {
            background: rgba(201,162,39,0.12);
            border-color: var(--gold);
            transform: translateY(-2px);
        }
        .key:active {
            transform: translateY(0) scale(0.95);
        }
        .key.clear {
            color: var(--red);
            border-color: rgba(239,83,80,0.2);
            background: rgba(239,83,80,0.06);
        }
        .key.clear:hover {
            background: rgba(239,83,80,0.12);
            border-color: var(--red);
        }
        .key.back {
            color: var(--gray);
            border-color: rgba(168,164,152,0.2);
            background: rgba(168,164,152,0.06);
        }
        .key.back:hover {
            background: rgba(168,164,152,0.12);
            border-color: var(--gray);
        }

        .actions {
            display: flex;
            gap: 10px;
        }
        .btn-back {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--gray-dark);
            color: var(--gray);
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-back:hover {
            border-color: var(--gray);
            color: var(--white);
        }

        .msg {
            margin-top: 15px;
            font-size: 1em;
            min-height: 24px;
        }
        .msg.error { color: var(--red); }
        .msg.success { color: var(--green); }

        @media (max-width: 420px) {
            .box { padding: 30px 20px; }
            .key { padding: 16px; font-size: 1.2em; }
            .logo-text { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progress-bar"></div>
    <div class="particles" id="particles"></div>
    <div class="box">
        <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
        <div class="logo-text">FUTURE STARS</div>
        <p class="tagline">Enter your access code</p>
        <div class="user-badge" id="user-badge">👤 <span id="user-name">User</span></div>

        <div class="pin-display" id="pin-display">
            <div class="dot" id="dot-0"></div>
            <div class="dot" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
        </div>

        <div class="keypad">
            <button class="key" onclick="press('1')">1</button>
            <button class="key" onclick="press('2')">2</button>
            <button class="key" onclick="press('3')">3</button>
            <button class="key" onclick="press('4')">4</button>
            <button class="key" onclick="press('5')">5</button>
            <button class="key" onclick="press('6')">6</button>
            <button class="key" onclick="press('7')">7</button>
            <button class="key" onclick="press('8')">8</button>
            <button class="key" onclick="press('9')">9</button>
            <button class="key clear" onclick="clearAll()">C</button>
            <button class="key" onclick="press('0')">0</button>
            <button class="key back" onclick="backspace()">⌫</button>
        </div>

        <div class="actions">
            <button class="btn-back" onclick="goBack()">← Back</button>
            <button class="btn-3d" onclick="submit()">ENTER</button>
        </div>

        <div class="msg" id="msg"></div>
    </div>

    <script>
        const username = sessionStorage.getItem('fs_auth');
        const user = AUTH_CONFIG.getUser(username);
        const name = user ? user.name : (sessionStorage.getItem('fs_name') || 'User');
        document.getElementById('user-name').textContent = name;

        let pin = '';
        const msg = document.getElementById('msg');

        function updateDots() {
            for (let i = 0; i < 4; i++) {
                document.getElementById('dot-' + i).classList.toggle('filled', i < pin.length);
                document.getElementById('dot-' + i).classList.remove('error');
            }
        }
        function press(digit) {
            if (pin.length >= 4) return;
            msg.textContent = '';
            pin += digit;
            updateDots();
            if (pin.length === 4) setTimeout(submit, 200);
        }
        function backspace() {
            pin = pin.slice(0, -1);
            msg.textContent = '';
            updateDots();
        }
        function clearAll() {
            pin = '';
            msg.textContent = '';
            updateDots();
        }
        function goBack() {
            sessionStorage.clear();
            window.location.href = 'signin.html';
        }
        function submit() {
            if (pin.length < 4) {
                msg.className = 'msg error';
                msg.textContent = 'Enter all 4 digits';
                return;
            }
            if (AUTH_CONFIG.verifyPin(username, pin)) {
                msg.className = 'msg success';
                msg.textContent = 'Access granted!';
                sessionStorage.setItem('fs_pin_verified', 'true');
                setTimeout(() => window.location.href = 'dashboard.html', 400);
            } else {
                msg.className = 'msg error';
                msg.textContent = 'Wrong code — try again';
                for (let i = 0; i < 4; i++) document.getElementById('dot-' + i).classList.add('error');
                setTimeout(() => { pin = ''; updateDots(); msg.textContent = ''; }, 1200);
            }
        }
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') press(e.key);
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Enter') submit();
            else if (e.key === 'Escape') goBack();
        });

        // Particles & Progress Bar
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
        window.addEventListener("scroll", function(){
            const bar = document.getElementById("progress-bar");
            if (!bar) return;
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = scrollHeight > 0 ? (scrollTop/scrollHeight)*100 : 0;
            bar.style.width = pct+"%";
        });
    </script>
<script src="footer-component.js?v=2"></script>
</body>
</html>
