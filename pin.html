<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Code — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;500;700&display=swap&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #C9A227; --gold-light: #E8C84B; --green: #4CAF50; --red: #EF5350; --black: #0A0A0A; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(0,212,255,0.2);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-family: 'Orbitron';
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .tagline {
            color: #8892b0;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(255,215,0,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 30px;
            font-family: 'Orbitron';
            color: var(--gold);
            font-size: 0.9em;
            margin-bottom: 25px;
        }

        /* PIN Dots */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.3);
            background: transparent;
            transition: all 0.2s;
        }
        .dot.filled {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(255,215,0,0.4);
        }
        .dot.error {
            border-color: var(--red);
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* Keypad */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .key {
            padding: 20px;
            background: rgba(0,212,255,0.06);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 14px;
            color: var(--blue);
            font-family: 'Orbitron';
            font-size: 1.4em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .key:hover {
            background: rgba(0,212,255,0.12);
            border-color: var(--blue);
            transform: translateY(-2px);
        }
        .key:active {
            transform: translateY(0) scale(0.95);
        }
        .key.wide {
            grid-column: span 1;
        }
        .key.clear {
            color: var(--red);
            border-color: rgba(255,68,68,0.2);
            background: rgba(255,68,68,0.06);
        }
        .key.clear:hover {
            background: rgba(255,68,68,0.12);
            border-color: var(--red);
        }
        .key.back {
            color: #8892b0;
            border-color: rgba(136,146,176,0.2);
            background: rgba(136,146,176,0.06);
        }
        .key.back:hover {
            background: rgba(136,146,176,0.12);
            border-color: #8892b0;
        }

        .actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Orbitron';
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-back {
            background: transparent;
            border: 1px solid rgba(136,146,176,0.3);
            color: #8892b0;
        }
        .btn-back:hover {
            border-color: #8892b0;
            color: #fff;
        }
        .btn-enter {
            background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(184,41,221,0.2));
            border: 2px solid var(--blue);
            color: var(--blue);
        }
        .btn-enter:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,212,255,0.2);
        }

        .msg {
            margin-top: 15px;
            font-size: 1em;
            min-height: 24px;
        }
        .msg.error { color: var(--red); }
        .msg.success { color: var(--green); }

        @media (max-width: 420px) {
            .box { padding: 30px 20px; }
            .key { padding: 16px; font-size: 1.2em; }
            .logo { font-size: 1.6em; }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">🏆 FUTURE STARS</div>
        <p class="tagline">Enter your access code</p>
        <div class="user-badge" id="user-badge">👤 <span id="user-name">User</span></div>

        <div class="pin-display" id="pin-display">
            <div class="dot" id="dot-0"></div>
            <div class="dot" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
        </div>

        <div class="keypad">
            <button class="key" onclick="press('1')">1</button>
            <button class="key" onclick="press('2')">2</button>
            <button class="key" onclick="press('3')">3</button>
            <button class="key" onclick="press('4')">4</button>
            <button class="key" onclick="press('5')">5</button>
            <button class="key" onclick="press('6')">6</button>
            <button class="key" onclick="press('7')">7</button>
            <button class="key" onclick="press('8')">8</button>
            <button class="key" onclick="press('9')">9</button>
            <button class="key clear" onclick="clearAll()">C</button>
            <button class="key" onclick="press('0')">0</button>
            <button class="key back" onclick="backspace()">⌫</button>
        </div>

        <div class="actions">
            <button class="btn btn-back" onclick="goBack()">← Back</button>
            <button class="btn btn-enter" onclick="submit()">ENTER</button>
        </div>

        <div class="msg" id="msg"></div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // CHANGE THE ACCESS CODE BELOW
        // ═══════════════════════════════════════
        const ACCESS_PIN = '2026';  // ← Change this to your desired 4-digit code
        // ═══════════════════════════════════════

        const name = sessionStorage.getItem('fs_name') || 'User';
        document.getElementById('user-name').textContent = name;

        let pin = '';
        const msg = document.getElementById('msg');

        function updateDots() {
            for (let i = 0; i < 4; i++) {
                document.getElementById('dot-' + i).classList.toggle('filled', i < pin.length);
                document.getElementById('dot-' + i).classList.remove('error');
            }
        }

        function press(digit) {
            if (pin.length >= 4) return;
            msg.textContent = '';
            pin += digit;
            updateDots();
            if (pin.length === 4) {
                setTimeout(submit, 200);
            }
        }

        function backspace() {
            pin = pin.slice(0, -1);
            msg.textContent = '';
            updateDots();
        }

        function clearAll() {
            pin = '';
            msg.textContent = '';
            updateDots();
        }

        function goBack() {
            sessionStorage.removeItem('fs_auth');
            sessionStorage.removeItem('fs_role');
            sessionStorage.removeItem('fs_name');
            window.location.href = 'signin.html';
        }

        function submit() {
            if (pin.length < 4) {
                msg.className = 'msg error';
                msg.textContent = 'Enter all 4 digits';
                return;
            }
            if (pin === ACCESS_PIN) {
                msg.className = 'msg success';
                msg.textContent = 'Access granted!';
                sessionStorage.setItem('fs_pin_verified', 'true');
                setTimeout(() => window.location.href = 'dashboard.html', 400);
            } else {
                msg.className = 'msg error';
                msg.textContent = 'Wrong code — try again';
                for (let i = 0; i < 4; i++) {
                    document.getElementById('dot-' + i).classList.add('error');
                }
                setTimeout(() => {
                    pin = '';
                    updateDots();
                    msg.textContent = '';
                }, 1200);
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') press(e.key);
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Enter') submit();
            else if (e.key === 'Escape') goBack();
        });
    </script>
</body>
</html>
