<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket — Future Stars</title>
    <script src="auth-config.js?v=1777085641"></script>
    <script src="nav-dropdown.js?v=1777085641" defer></script>
    <link rel="stylesheet" href="fs-utils.css?v=1">
    <script src="fs-utils.js?v=1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --black-hover: #242424;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --green: #4CAF50;
            --red: #EF5350;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            font-size: 14px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold-dark);
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
        }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-name {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .welcome {
            font-family: 'Cinzel', serif;
            font-size: 1.6em;
            color: var(--gold);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .subtitle {
            color: var(--gray);
            margin-bottom: 24px;
        }

        .bracket-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .bracket-controls input, .bracket-controls select {
            padding: 10px 16px;
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
        }
        .bracket-controls input:focus, .bracket-controls select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .btn {
            padding: 10px 20px;
            background: var(--gold);
            color: var(--black);
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: var(--gold-light);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--gray);
        }
        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .bracket-container {
            display: flex;
            gap: 40px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 200px;
        }
        .round-title {
            text-align: center;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.9em;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .match {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            position: relative;
        }
        .match::after {
            content: '';
            position: absolute;
            right: -40px;
            top: 50%;
            width: 40px;
            height: 2px;
            background: var(--border);
        }
        .round:last-child .match::after {
            display: none;
        }
        .team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .team:hover {
            background: rgba(201,162,39,0.1);
        }
        .team.winner {
            background: rgba(76,175,80,0.15);
            border: 1px solid rgba(76,175,80,0.3);
        }
        .team-name {
            font-weight: 600;
        }
        .team-score {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-weight: 700;
        }
        .vs {
            text-align: center;
            color: var(--gray);
            font-size: 0.8em;
            padding: 4px;
        }

        .champion {
            text-align: center;
            padding: 40px;
            background: linear-gradient(180deg, rgba(201,162,39,0.1) 0%, transparent 100%);
            border: 2px solid var(--gold);
            border-radius: 16px;
            margin-top: 20px;
        }
        .champion-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.2em;
            margin-bottom: 12px;
        }
        .champion-name {
            font-size: 1.5em;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .bracket-container {
                flex-direction: column;
                gap: 20px;
            }
            .round {
                min-width: auto;
            }
            .match::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo-link">
            <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
            <span class="logo-text">FUTURE STARS</span>
        </a>
        <div class="user-info">
            <span id="dark-mode-toggle"></span>
            <span class="user-name" id="user-name"></span>
        </div>
    </div>
    <nav class="nav" id="main-nav"></nav>

    <div class="main">
        <div class="welcome">Tournament Bracket</div>
        <div class="subtitle">Create and manage tournament brackets</div>

        <div class="bracket-controls">
            <input type="text" id="bracket-name" placeholder="Tournament name..." value="Future Stars Championship">
            <select id="bracket-size">
                <option value="4">4 Teams</option>
                <option value="8" selected>8 Teams</option>
                <option value="16">16 Teams</option>
            </select>
            <button class="btn" onclick="generateBracket()">Generate Bracket</button>
            <button class="btn btn-secondary" onclick="resetBracket()">Reset</button>
            <button class="btn btn-secondary" onclick="saveBracket()">💾 Save</button>
            <button class="btn btn-secondary" onclick="loadBracket()">📂 Load</button>
        </div>

        <div id="bracket-display"></div>
    </div>

    <script>
        // Auth check
        const AUTH = sessionStorage.getItem('fs_auth');
        const ROLE = sessionStorage.getItem('fs_role');
        if (!AUTH || !AUTH_CONFIG.canAccess(ROLE, 'tournaments')) {
            window.location.href = 'signin.html';
        }
        document.getElementById('user-name').textContent = sessionStorage.getItem('fs_name') || '';

        let currentBracket = null;

        function generateBracket() {
            const name = document.getElementById('bracket-name').value || 'Tournament';
            const size = parseInt(document.getElementById('bracket-size').value);
            
            // Generate placeholder teams
            const teams = [];
            for (let i = 1; i <= size; i++) {
                teams.push(`Team ${i}`);
            }
            
            currentBracket = {
                name,
                size,
                teams,
                rounds: createRounds(teams),
                created: new Date().toISOString()
            };
            
            renderBracket();
        }

        function createRounds(teams) {
            const rounds = [];
            let currentTeams = [...teams];
            
            while (currentTeams.length > 1) {
                const round = {
                    matches: []
                };
                
                for (let i = 0; i < currentTeams.length; i += 2) {
                    round.matches.push({
                        team1: currentTeams[i],
                        team2: currentTeams[i + 1] || 'BYE',
                        score1: null,
                        score2: null,
                        winner: null
                    });
                }
                
                rounds.push(round);
                currentTeams = round.matches.map(() => 'TBD');
            }
            
            return rounds;
        }

        function renderBracket() {
            if (!currentBracket) return;
            
            const container = document.getElementById('bracket-display');
            let html = '<div class="bracket-container">';
            
            currentBracket.rounds.forEach((round, roundIndex) => {
                const roundNames = ['Quarter Finals', 'Semi Finals', 'Finals', 'Champion'];
                const roundName = roundNames[roundIndex] || `Round ${roundIndex + 1}`;
                
                html += `<div class="round">`;
                html += `<div class="round-title">${roundName}</div>`;
                
                round.matches.forEach((match, matchIndex) => {
                    const team1Class = match.winner === 1 ? 'winner' : '';
                    const team2Class = match.winner === 2 ? 'winner' : '';
                    
                    html += `
                        <div class="match">
                            <div class="team ${team1Class}" onclick="setWinner(${roundIndex}, ${matchIndex}, 1)">
                                <span class="team-name">${match.team1}</span>
                                <span class="team-score">${match.score1 !== null ? match.score1 : '-'}</span>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team ${team2Class}" onclick="setWinner(${roundIndex}, ${matchIndex}, 2)">
                                <span class="team-name">${match.team2}</span>
                                <span class="team-score">${match.score2 !== null ? match.score2 : '-'}</span>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            });
            
            html += '</div>';
            
            // Show champion if finals have a winner
            const finalRound = currentBracket.rounds[currentBracket.rounds.length - 1];
            if (finalRound && finalRound.matches[0].winner) {
                const champion = finalRound.matches[0].winner === 1 ? finalRound.matches[0].team1 : finalRound.matches[0].team2;
                html += `
                    <div class="champion">
                        <div class="champion-title">🏆 Champion</div>
                        <div class="champion-name">${champion}</div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }

        function setWinner(roundIndex, matchIndex, winner) {
            if (!currentBracket) return;
            
            const match = currentBracket.rounds[roundIndex].matches[matchIndex];
            match.winner = winner;
            match.score1 = winner === 1 ? 1 : 0;
            match.score2 = winner === 2 ? 1 : 0;
            
            // Advance winner to next round
            if (roundIndex < currentBracket.rounds.length - 1) {
                const nextRoundMatchIndex = Math.floor(matchIndex / 2);
                const isFirstTeam = matchIndex % 2 === 0;
                const winnerName = winner === 1 ? match.team1 : match.team2;
                
                if (isFirstTeam) {
                    currentBracket.rounds[roundIndex + 1].matches[nextRoundMatchIndex].team1 = winnerName;
                } else {
                    currentBracket.rounds[roundIndex + 1].matches[nextRoundMatchIndex].team2 = winnerName;
                }
            }
            
            renderBracket();
            saveToStorage();
        }

        function resetBracket() {
            if (currentBracket) {
                currentBracket.rounds = createRounds(currentBracket.teams);
                renderBracket();
                saveToStorage();
            }
        }

        function saveBracket() {
            if (!currentBracket) {
                alert('No bracket to save. Generate one first.');
                return;
            }
            
            const data = JSON.stringify(currentBracket, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bracket-${currentBracket.name.replace(/\s+/g, '-').toLowerCase()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function loadBracket() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        currentBracket = JSON.parse(event.target.result);
                        document.getElementById('bracket-name').value = currentBracket.name || 'Tournament';
                        document.getElementById('bracket-size').value = currentBracket.size || 8;
                        renderBracket();
                        saveToStorage();
                    } catch (err) {
                        alert('Error loading bracket: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function saveToStorage() {
            if (currentBracket) {
                localStorage.setItem('fs_current_bracket', JSON.stringify(currentBracket));
            }
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('fs_current_bracket');
            if (saved) {
                try {
                    currentBracket = JSON.parse(saved);
                    document.getElementById('bracket-name').value = currentBracket.name || 'Tournament';
                    document.getElementById('bracket-size').value = currentBracket.size || 8;
                    renderBracket();
                } catch (err) {
                    console.error('Error loading saved bracket:', err);
                }
            }
        }

        // Load saved bracket on page load
        loadFromStorage();
        
        // Generate default bracket if none exists
        if (!currentBracket) {
            generateBracket();
        }
    </script>
</body>
</html>
