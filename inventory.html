<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Stars — Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-light: #F4D03F;
            --gold-dark: #B8960C;
            --black: #0A0A0A;
            --black-light: #111111;
            --black-card: #161616;
            --black-hover: #1E1E1E;
            --white: #FFFFFF;
            --gray: #999999;
            --gray-dark: #555555;
            --border: #2A2A2A;
            --green: #4CAF50;
            --red: #EF5350;
            --orange: #FF9800;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            font-size: 15px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
            text-decoration: none;
        }
        .logo span { color: var(--white); font-weight: 300; }
        .nav {
            display: flex;
            gap: 4px;
            padding: 12px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .nav a {
            padding: 10px 20px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .nav a:hover { color: var(--white); background: var(--black-hover); }
        .nav a.active { color: var(--gold); background: rgba(212,175,55,0.08); }
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s;
        }
        .stat:hover {
            border-color: var(--gold-dark);
            transform: translateY(-3px);
        }
        .stat-value {
            font-family: 'Orbitron';
            font-size: 2em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 6px;
        }
        .stat-label {
            color: var(--gray);
            font-size: 0.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cat-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .cat-tab {
            padding: 12px 24px;
            background: var(--black-card);
            border: 1px solid var(--border);
            color: var(--gray);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter';
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .cat-tab:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        .cat-tab.active {
            background: rgba(212,175,55,0.1);
            border-color: var(--gold);
            color: var(--white);
        }

        .jersey-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .jersey-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        .jersey-card:hover {
            border-color: var(--gold-dark);
            transform: translateY(-2px);
        }
        .jersey-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .jersey-name {
            font-family: 'Orbitron';
            font-size: 0.95em;
            color: var(--gold);
            letter-spacing: 1px;
        }
        .jersey-total {
            font-family: 'Orbitron';
            font-size: 1.5em;
            color: var(--white);
        }
        .jersey-total span {
            font-size: 0.55em;
            color: var(--gray);
        }
        .size-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
        }
        .size-box {
            background: var(--black);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            transition: all 0.2s;
        }
        .size-box.low { border-color: rgba(239,83,80,0.3); }
        .size-box.medium { border-color: rgba(255,152,0,0.3); }
        .size-label {
            font-family: 'Orbitron';
            font-size: 0.75em;
            color: var(--gray);
            margin-bottom: 4px;
        }
        .size-qty {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--white);
        }
        .size-box.low .size-qty { color: var(--red); }
        .size-box.medium .size-qty { color: var(--orange); }

        .section-title {
            font-family: 'Orbitron';
            font-size: 1.1em;
            color: var(--gold);
            margin: 30px 0 20px;
            letter-spacing: 2px;
        }

        /* Trip dropdown */
        .trip-dropdown-wrapper {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .trip-label {
            display: block;
            font-family: 'Orbitron';
            font-size: 0.8em;
            color: var(--gold);
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        .trip-select {
            width: 100%;
            padding: 16px;
            background: var(--black);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter';
            font-size: 1.1em;
            outline: none;
            cursor: pointer;
        }
        .trip-select:focus { border-color: var(--gold); }
        .trip-summary {
            font-family: 'Orbitron';
            font-size: 1em;
            color: var(--gold);
            margin-bottom: 20px;
            padding: 16px;
            background: var(--black);
            border-radius: 10px;
            border-left: 3px solid var(--gold);
        }
        .tournament-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .tournament-name {
            font-family: 'Orbitron';
            font-size: 0.9em;
            color: var(--white);
            margin-bottom: 12px;
        }
        .tournament-name span {
            color: var(--gray);
            font-size: 0.85em;
        }
        .tournament-items {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tournament-item {
            padding: 5px 12px;
            background: var(--black);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85em;
            color: var(--gray);
        }
        .tournament-item .qty {
            color: var(--gold);
            font-weight: 700;
        }

        .last-update {
            text-align: right;
            color: var(--gray);
            font-size: 0.85em;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; }
            .nav { padding: 10px 20px; }
            .main { padding: 20px; }
            .jersey-grid { grid-template-columns: 1fr; }
            .cat-tabs { overflow-x: auto; flex-wrap: nowrap; }
        }
    </style>
</head>
<body>
    <script>if(!sessionStorage.getItem("fs_auth")||sessionStorage.getItem("fs_pin_verified")!=="true"){window.location.href="signin.html";}</script>
    <div class="header">
        <a href="dashboard.html" class="logo">FUTURE <span>STARS</span></a>
    </div>
    <nav class="nav" id="main-nav"></nav>
    <script>
        (function() {
            const role = sessionStorage.getItem('fs_role');
            const nav = document.getElementById('main-nav');
            if (!nav || !role) return;
            const links = { owner: ['dashboard','departments','inventory','trips','planner','team'], inventory: ['dashboard','inventory','team'], logistics: ['dashboard','trips','planner','team'], tournament: ['dashboard','trips','team'] };
            const labels = { dashboard:'Dashboard', departments:'Departments', inventory:'Inventory', trips:'Trips', planner:'Planner', team:'Team' };
            const current = window.location.pathname.split('/').pop().replace('.html','') || 'dashboard';
            nav.innerHTML = (links[role] || links.owner).map(p => {
                const cls = p === current ? 'active' : '';
                return `<a href="${p}.html" class="${cls}">${labels[p]}</a>`;
            }).join('');
        })();
    </script>

                }
            }
        };

        const CATEGORIES = [
            { key: 'all', label: 'All Inventory', icon: '📦' },
            { key: 'baseball', label: 'Baseball', icon: '⚾' },
            { key: 'messi', label: 'Messi', icon: '🔟' },
            { key: 'ronaldo', label: 'Ronaldo', icon: '⚽' },
            { key: 'neymar', label: 'Neymar', icon: '🇧🇷' },
            { key: 'yamal', label: 'Yamal', icon: '🔥' },
            { key: 'mbappe', label: 'Mbappe', icon: '🇫🇷' },
            { key: 'pulisic', label: 'Pulisic', icon: '🇺🇸' },
            { key: 'saka', label: 'Saka', icon: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
            { key: 'vini', label: 'Vini Jr', icon: '🇧🇷' },
            { key: 'gimenez', label: 'Gimenez', icon: '🇲🇽' },
            { key: 'trips', label: 'Out on Trips', icon: '🚐' }
        ];

        let activeCat = 'all';

        function init() {
            renderTabs();
            renderInventory();
            updateStats();
            document.getElementById('last-update').textContent = 'Updated: ' + new Date().toLocaleString();
        }

        function renderTabs() {
            const container = document.getElementById('cat-tabs');
            container.innerHTML = CATEGORIES.map(cat => `
                <button class="cat-tab ${cat.key === activeCat ? 'active' : ''}" onclick="setCat('${cat.key}')">
                    ${cat.icon} ${cat.label}
                </button>
            `).join('');
        }

        function setCat(key) {
            activeCat = key;
            renderTabs();
            renderInventory();
        }

        function renderInventory() {
            const container = document.getElementById('inventory-content');
            if (activeCat === 'trips') {
                renderTripsView(container);
                return;
            }
            const items = getItemsForCat(activeCat);
            if (items.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray);">No items found</div>';
                return;
            }
            if (activeCat === 'all') {
                const groups = {};
                items.forEach(item => {
                    const group = item.category || 'Other';
                    if (!groups[group]) groups[group] = [];
                    groups[group].push(item);
                });
                container.innerHTML = Object.entries(groups).map(([groupName, groupItems]) => `
                    <div class="section-title">${getGroupIcon(groupName)} ${groupName}</div>
                    <div class="jersey-grid">
                        ${groupItems.map(item => renderJerseyCard(item)).join('')}
                    </div>
                `).join('');
            } else {
                container.innerHTML = `
                    <div class="jersey-grid">
                        ${items.map(item => renderJerseyCard(item)).join('')}
                    </div>
                `;
            }
        }

        function getGroupIcon(name) {
            const icons = {'Baseball':'⚾','Messi':'🔟','Ronaldo':'⚽','Neymar':'🇧🇷','Yamal':'🔥','Mbappe':'🇫🇷','Pulisic':'🇺🇸','SAKA':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Vini Jr':'🇧🇷','Gimenez':'🇲🇽'};
            return icons[name] || '📦';
        }

        function getItemsForCat(cat) {
            const items = [];
            if (cat === 'trips') return [];
            if (cat === 'all' || cat === 'baseball') {
                Object.entries(INVENTORY.baseball).forEach(([name, info]) => {
                    items.push({ name, ...info, category: 'Baseball' });
                });
            }
            const soccerMap = { messi: 'Messi', ronaldo: 'Ronaldo', neymar: 'Neymar', yamal: 'Yamal', mbappe: 'Mbappe', pulisic: 'Pulisic', saka: 'SAKA', vini: 'Vini Jr', gimenez: 'Gimenez' };
            for (const [key, player] of Object.entries(soccerMap)) {
                if (cat === 'all' || cat === key) {
                    (INVENTORY.soccer[player] || []).forEach(item => {
                        items.push({ ...item, category: player });
                    });
                }
            }
            return items;
        }

        function renderJerseyCard(item) {
            const sizes = Object.entries(item.sizes || {})
                .filter(([size, qty]) => qty > 0)
                .sort((a, b) => {
                    const order = ['18','20','22','24','26','28','YS','YM','YL','YXL','S','M','L','XL','AXL'];
                    const ai = order.indexOf(a[0]);
                    const bi = order.indexOf(b[0]);
                    if (ai >= 0 && bi >= 0) return ai - bi;
                    if (ai >= 0) return -1;
                    if (bi >= 0) return 1;
                    return a[0].localeCompare(b[0]);
                });
            return `
                <div class="jersey-card">
                    <div class="jersey-header">
                        <div class="jersey-name">${item.name}</div>
                        <div class="jersey-total">${Math.round(item.total)} <span>units</span></div>
                    </div>
                    <div class="size-grid">
                        ${sizes.map(([size, qty]) => {
                            const qtyClass = qty < 10 ? 'low' : qty < 30 ? 'medium' : '';
                            return `
                                <div class="size-box ${qtyClass}">
                                    <div class="size-label">${size}</div>
                                    <div class="size-qty">${Math.round(qty)}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderTripsView(container) {
            const dates = INVENTORY.tournaments;
            if (!dates || Object.keys(dates).length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray);">No tournament data</div>';
                return;
            }
            const dateKeys = Object.keys(dates).sort();
            container.innerHTML = `
                <div class="trip-dropdown-wrapper">
                    <label class="trip-label">SELECT TOURNAMENT DATE</label>
                    <select class="trip-select" id="trip-date-select" onchange="renderTripDetails()">
                        <option value="">Choose a date...</option>
                        ${dateKeys.map(d => `<option value="${d}">${d}</option>`).join('')}
                    </select>
                </div>
                <div id="trip-details"></div>
            `;
        }

        function renderTripDetails() {
            const select = document.getElementById('trip-date-select');
            const date = select.value;
            const container = document.getElementById('trip-details');
            if (!date) { container.innerHTML = ''; return; }
            const tournaments = INVENTORY.tournaments[date];
            if (!tournaments) { container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray);">No data</div>'; return; }
            let html = '';
            let totalItems = 0;
            for (const [name, items] of Object.entries(tournaments)) {
                const tCount = items.reduce((s, i) => s + i.qty, 0);
                totalItems += tCount;
                html += `
                    <div class="tournament-card">
                        <div class="tournament-name">${name} <span>(${tCount} items)</span></div>
                        <div class="tournament-items">
                            ${items.map(item => `
                                <div class="tournament-item">
                                    <span class="qty">${Math.round(item.qty)}</span> ${item.name} (${item.size})
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            html = `<div class="trip-summary">📦 ${totalItems} total items out on trips for ${date}</div>` + html;
            container.innerHTML = html;
        }

        function updateStats() {
            let total = 0, baseball = 0, soccer = 0, skus = 0;
            Object.values(INVENTORY.baseball).forEach(item => { total += item.total; baseball += item.total; skus++; });
            Object.values(INVENTORY.soccer).forEach(playerItems => {
                playerItems.forEach(item => { total += item.total; soccer += item.total; skus++; });
            });
            document.getElementById('st-total').textContent = total >= 1000 ? (total/1000).toFixed(1) + 'K' : total;
            document.getElementById('st-baseball').textContent = baseball >= 1000 ? (baseball/1000).toFixed(1) + 'K' : baseball;
            document.getElementById('st-soccer').textContent = soccer >= 1000 ? (soccer/1000).toFixed(1) + 'K' : soccer;
            document.getElementById('st-skus').textContent = skus;
        }

        init();
    </script>
