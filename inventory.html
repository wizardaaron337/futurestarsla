<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Stars — Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #ffd700;
            --blue: #00d4ff;
            --purple: #b829dd;
            --green: #00ff88;
            --red: #ff4444;
            --bg: #050810;
            --card: rgba(255,255,255,0.02);
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            font-size: 14px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(5,8,16,0.95);
            border-bottom: 1px solid rgba(0,212,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .nav { display: flex; gap: 8px; }
        .nav a {
            padding: 6px 14px;
            border: 1px solid rgba(0,212,255,0.2);
            color: var(--blue);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85em;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .nav a:hover, .nav a.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(255,215,0,0.05);
        }
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat {
            background: var(--card);
            border: 1px solid rgba(0,212,255,0.08);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            color: #8892b0;
            font-size: 0.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1em;
            color: var(--gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 2px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: var(--card);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95em;
        }
        .search-box input:focus { outline: none; border-color: var(--blue); }
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9em;
            opacity: 0.5;
        }
        .filter-btn {
            padding: 8px 16px;
            background: var(--card);
            border: 1px solid rgba(0,212,255,0.15);
            color: var(--blue);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: rgba(0,212,255,0.1);
            border-color: var(--blue);
        }
        .inventory-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .inventory-table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75em;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0,212,255,0.15);
            cursor: pointer;
            user-select: none;
        }
        .inventory-table th:hover { color: var(--gold); }
        .inventory-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .inventory-table tr:hover td {
            background: rgba(255,255,255,0.02);
        }
        .item-name { font-weight: 600; color: #fff; }
        .item-category {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        .cat-baseball { background: rgba(255,68,68,0.1); color: var(--red); border: 1px solid rgba(255,68,68,0.2); }
        .cat-soccer { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
        .cat-tournament { background: rgba(0,212,255,0.1); color: var(--blue); border: 1px solid rgba(0,212,255,0.2); }
        .cat-other { background: rgba(184,41,221,0.1); color: var(--purple); border: 1px solid rgba(184,41,221,0.2); }
        .qty-bar {
            width: 60px;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        .qty-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--blue), var(--green));
        }
        .size-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .size-tag {
            padding: 2px 6px;
            background: rgba(0,212,255,0.06);
            border: 1px solid rgba(0,212,255,0.1);
            border-radius: 4px;
            font-size: 0.75em;
            color: #8892b0;
            font-family: 'Orbitron', sans-serif;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--blue);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
        }
        .last-update {
            text-align: right;
            color: var(--green);
            font-size: 0.8em;
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; padding: 10px; }
            .nav { flex-wrap: wrap; justify-content: center; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .inventory-table { font-size: 0.8em; }
            .inventory-table th, .inventory-table td { padding: 8px 6px; }
            .size-tags { display: none; }
        }
    </style>
</head>
<body>
    <script>if(!sessionStorage.getItem("fs_auth")){window.location.href="signin.html";}</script>
    <div class="header">
        <div class="logo">🏆 FUTURE STARS</div>
        <nav class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="departments.html">Departments</a>
            <a href="inventory.html" class="active">Inventory</a>
            <a href="trips.html">Trips</a>
            <a href="trip-planner.html">Planner</a>
            <a href="team.html">Team</a>
            <a href="jersey-gallery.html">Jerseys</a>
        </nav>
    </div>
    
    <div class="main">
        <div class="last-update" id="last-update">Loading Sortly data...</div>
        
        <div class="stats" id="stats">
            <div class="stat">
                <div class="stat-value" id="s-products">--</div>
                <div class="stat-label">Products</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="s-units">--</div>
                <div class="stat-label">Total Units</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="s-baseball">--</div>
                <div class="stat-label">Baseball</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="s-soccer">--</div>
                <div class="stat-label">Soccer</div>
            </div>
        </div>
        
        <div class="section-title">📦 Inventory</div>
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search products..." onkeyup="renderTable()">
            </div>
            <button class="filter-btn active" onclick="setFilter('all')" data-filter="all">All</button>
            <button class="filter-btn" onclick="setFilter('baseball')" data-filter="baseball">⚾ Baseball</button>
            <button class="filter-btn" onclick="setFilter('soccer')" data-filter="soccer">⚽ Soccer</button>
            <button class="filter-btn" onclick="setFilter('tournament')" data-filter="tournament">🏆 Tournaments</button>
        </div>
        
        <div id="table-container">
            <div class="loading">LOADING...</div>
        </div>
    </div>
    
    <script>
        let inventoryData = [];
        let currentFilter = 'all';
        let sortCol = 'name';
        let sortDir = 1;
        
        async function loadData() {
            try {
                const res = await fetch('sortly-data.json');
                const data = await res.json();
                inventoryData = flattenData(data);
                updateStats();
                renderTable();
                document.getElementById('last-update').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('last-update').textContent = 'Error loading data';
                console.error(e);
            }
        }
        
        function flattenData(data) {
            const items = [];
            const categories = {
                baseball: 'baseball',
                soccer: 'soccer',
                tournament: 'tournament',
                tournaments: 'tournament'
            };
            
            for (const [catKey, catData] of Object.entries(data)) {
                const category = categories[catKey] || 'other';
                if (Array.isArray(catData)) {
                    // Raw items array
                    const grouped = {};
                    catData.forEach(item => {
                        const key = item.name || item.sku || 'Unknown';
                        if (!grouped[key]) grouped[key] = { name: key, category, total: 0, sizes: {} };
                        grouped[key].total += item.qty || 0;
                        if (item.size) {
                            grouped[key].sizes[item.size] = (grouped[key].sizes[item.size] || 0) + item.qty;
                        }
                    });
                    items.push(...Object.values(grouped));
                } else if (typeof catData === 'object') {
                    // Grouped by product name
                    for (const [name, info] of Object.entries(catData)) {
                        if (info && typeof info === 'object') {
                            items.push({
                                name,
                                category,
                                total: info.total || 0,
                                sizes: info.sizes || {}
                            });
                        }
                    }
                }
            }
            return items;
        }
        
        function updateStats() {
            const totalProducts = inventoryData.length;
            const totalUnits = inventoryData.reduce((s, i) => s + i.total, 0);
            const baseball = inventoryData.filter(i => i.category === 'baseball').reduce((s, i) => s + i.total, 0);
            const soccer = inventoryData.filter(i => i.category === 'soccer').reduce((s, i) => s + i.total, 0);
            
            document.getElementById('s-products').textContent = totalProducts;
            document.getElementById('s-units').textContent = totalUnits >= 1000 ? (totalUnits/1000).toFixed(1) + 'K' : totalUnits;
            document.getElementById('s-baseball').textContent = baseball >= 1000 ? (baseball/1000).toFixed(1) + 'K' : baseball;
            document.getElementById('s-soccer').textContent = soccer >= 1000 ? (soccer/1000).toFixed(1) + 'K' : soccer;
        }
        
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
            renderTable();
        }
        
        function setSort(col) {
            if (sortCol === col) sortDir *= -1;
            else { sortCol = col; sortDir = 1; }
            renderTable();
        }
        
        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = inventoryData;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(i => i.category === currentFilter);
            }
            if (search) {
                filtered = filtered.filter(i => i.name.toLowerCase().includes(search));
            }
            
            filtered.sort((a, b) => {
                let av = a[sortCol], bv = b[sortCol];
                if (typeof av === 'string') av = av.toLowerCase();
                if (typeof bv === 'string') bv = bv.toLowerCase();
                if (av < bv) return -1 * sortDir;
                if (av > bv) return 1 * sortDir;
                return 0;
            });
            
            const maxQty = Math.max(...inventoryData.map(i => i.total), 1);
            
            const html = `
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th onclick="setSort('name')">Product ${sortCol === 'name' ? (sortDir > 0 ? '▲' : '▼') : ''}</th>
                            <th onclick="setSort('category')">Category ${sortCol === 'category' ? (sortDir > 0 ? '▲' : '▼') : ''}</th>
                            <th onclick="setSort('total')">Qty ${sortCol === 'total' ? (sortDir > 0 ? '▲' : '▼') : ''}</th>
                            <th>Sizes</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map(item => {
                            const pct = (item.total / maxQty * 100).toFixed(0);
                            const sizeList = Object.entries(item.sizes || {})
                                .sort((a, b) => b[1] - a[1])
                                .slice(0, 6)
                                .map(([s, q]) => `<span class="size-tag">${s}:${Math.round(q)}</span>`)
                                .join('');
                            return `
                                <tr>
                                    <td class="item-name">${item.name}</td>
                                    <td><span class="item-category cat-${item.category}">${item.category}</span></td>
                                    <td>
                                        <div class="qty-bar"><div class="qty-fill" style="width: ${pct}%"></div></div>
                                        ${Math.round(item.total).toLocaleString()}
                                    </td>
                                    <td><div class="size-tags">${sizeList}</div></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('table-container').innerHTML = html;
        }
        
        loadData();
    </script>
</body>
</html>
