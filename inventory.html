<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #ffd700; --blue: #00d4ff; --green: #00ff88; --red: #ff4444; --bg: #050810; --card: rgba(255,255,255,0.02); }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; font-size: 14px; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: rgba(5,8,16,0.95); border-bottom: 1px solid rgba(0,212,255,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron'; font-size: 1.4em; font-weight: 700; background: linear-gradient(135deg, var(--gold), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav { display: flex; gap: 8px; }
        .nav a { padding: 6px 14px; border: 1px solid rgba(0,212,255,0.2); color: var(--blue); text-decoration: none; border-radius: 6px; font-size: 0.85em; font-family: 'Orbitron'; letter-spacing: 1px; }
        .nav a:hover, .nav a.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.05); }
        
        .main { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat { background: var(--card); border: 1px solid rgba(0,212,255,0.08); border-radius: 10px; padding: 14px; text-align: center; }
        .stat-value { font-family: 'Orbitron'; font-size: 1.6em; font-weight: 900; color: var(--gold); }
        .stat-label { color: #8892b0; font-size: 0.75em; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
        
        .section { margin-bottom: 20px; }
        .section-title { font-family: 'Orbitron'; font-size: 0.95em; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; letter-spacing: 2px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }
        
        .items { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .item { background: var(--card); border: 1px solid rgba(0,212,255,0.06); border-radius: 10px; padding: 14px; transition: all 0.2s; }
        .item:hover { border-color: rgba(0,212,255,0.15); background: rgba(255,255,255,0.03); }
        .item-name { font-family: 'Orbitron'; font-size: 0.85em; color: var(--blue); margin-bottom: 8px; }
        .item-total { font-size: 1.3em; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
        .sizes { display: flex; flex-wrap: wrap; gap: 4px; }
        .size { padding: 2px 8px; background: rgba(0,212,255,0.08); border-radius: 4px; font-size: 0.8em; color: #8892b0; }
        .size.low { background: rgba(255,68,68,0.15); color: var(--red); }
        
        .filter { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.15); color: var(--blue); border-radius: 6px; font-family: 'Orbitron'; font-size: 0.8em; cursor: pointer; }
        .filter-btn.active { background: rgba(255,215,0,0.1); border-color: var(--gold); color: var(--gold); }
        
        @media (max-width: 768px) { .header { flex-direction: column; gap: 10px; } .items { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🏆 FUTURE STARS</div>
        <nav class="nav">
            <a href="index.html">Dashboard</a>
            <a href="inventory.html" class="active">Inventory</a>
            <a href="trips.html">Trips</a>
            <a href="team.html">Team</a>
            <a href="jersey-gallery.html">Jerseys</a>
        </nav>
    </div>
    
    <div class="main">
        <div class="stats">
            <div class="stat"><div class="stat-value" id="total-items">--</div><div class="stat-label">Items</div></div>
            <div class="stat"><div class="stat-value" id="total-units">--</div><div class="stat-label">Units</div></div>
            <div class="stat"><div class="stat-value" id="baseball-total">--</div><div class="stat-label">Baseball</div></div>
            <div class="stat"><div class="stat-value" id="soccer-total">--</div><div class="stat-label">Soccer</div></div>
            <div class="stat"><div class="stat-value" id="low-stock">--</div><div class="stat-label">Low Stock</div></div>
        </div>
        
        <div class="filter">
            <button class="filter-btn active" onclick="filter('all')">All</button>
            <button class="filter-btn" onclick="filter('baseball')">Baseball</button>
            <button class="filter-btn" onclick="filter('soccer')">Soccer</button>
        </div>
        
        <div class="section">
            <div class="section-title">Baseball Jerseys</div>
            <div class="items" id="baseball-grid"></div>
        </div>
        
        <div class="section">
            <div class="section-title">Soccer Jerseys</div>
            <div class="items" id="soccer-grid"></div>
        </div>
    </div>
    
    <script>
        let inventoryData = null;
        
        async function load() {
            try {
                const res = await fetch('sortly-data.json');
                inventoryData = await res.json();
                render();
            } catch (e) {
                console.error('Failed to load inventory:', e);
                document.getElementById('baseball-grid').innerHTML = '<p style="color: #ff4444">Failed to load inventory data</p>';
            }
        }
        
        function render() {
            if (!inventoryData) return;
            
            let totalItems = 0, totalUnits = 0, lowStock = 0;
            let baseballUnits = 0, soccerUnits = 0;
            
            // Baseball
            const baseballGrid = document.getElementById('baseball-grid');
            baseballGrid.innerHTML = '';
            Object.entries(inventoryData.baseball).forEach(([name, data]) => {
                totalItems++;
                totalUnits += data.total;
                baseballUnits += data.total;
                if (data.total < 10) lowStock++;
                
                const sizesHtml = Object.entries(data.sizes).map(([size, qty]) => 
                    `<span class="size ${qty < 5 ? 'low' : ''}">${size}: ${qty}</span>`
                ).join('');
                
                baseballGrid.innerHTML += `
                    <div class="item" data-category="baseball">
                        <div class="item-name">${name}</div>
                        <div class="item-total">${data.total} units</div>
                        <div class="sizes">${sizesHtml}</div>
                    </div>
                `;
            });
            
            // Soccer
            const soccerGrid = document.getElementById('soccer-grid');
            soccerGrid.innerHTML = '';
            Object.entries(inventoryData.soccer).forEach(([name, data]) => {
                totalItems++;
                totalUnits += data.total;
                soccerUnits += data.total;
                if (data.total < 10) lowStock++;
                
                const sizesHtml = Object.entries(data.sizes).map(([size, qty]) => 
                    `<span class="size ${qty < 5 ? 'low' : ''}">${size}: ${qty}</span>`
                ).join('');
                
                soccerGrid.innerHTML += `
                    <div class="item" data-category="soccer">
                        <div class="item-name">${name}</div>
                        <div class="item-total">${data.total} units</div>
                        <div class="sizes">${sizesHtml}</div>
                    </div>
                `;
            });
            
            // Update stats
            document.getElementById('total-items').textContent = totalItems;
            document.getElementById('total-units').textContent = totalUnits.toLocaleString();
            document.getElementById('baseball-total').textContent = baseballUnits.toLocaleString();
            document.getElementById('soccer-total').textContent = soccerUnits.toLocaleString();
            document.getElementById('low-stock').textContent = lowStock;
            document.getElementById('low-stock').style.color = lowStock > 0 ? 'var(--red)' : 'var(--green)';
        }
        
        function filter(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.item').forEach(item => {
                if (cat === 'all' || item.dataset.category === cat) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
        
        load();
    </script>
</body>
</html>
