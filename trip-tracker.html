<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Future Stars Sports Co - Championship sports merchandise, tournament operations, and inventory management.">
    <meta name="keywords" content="sports, merchandise, tournament, soccer, baseball, jerseys">
    <meta name="author" content="Future Stars Sports Co">
    <meta name="theme-color" content="#C9A227">
    <meta property="og:title" content="Future Stars Sports Co">
    <meta property="og:description" content="Elite sports merchandise for the next generation of champions.">
    <meta property="og:type" content="website">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Tracker — Future Stars</title>
    <script src="auth-config.js?v=1777085641"></script>
    <script src="nav-dropdown.js?v=1"></script>
    <link rel="stylesheet" href="fs-utils.css?v=1">
    <script src="fs-utils.js?v=1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-light: #E8C84B;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-card: #1A1A1A;
            --black-hover: #242424;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
            --green: #4CAF50;
            --red: #EF5350;
            --orange: #FF9800;
            --blue: #64B5F6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            font-size: 15px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold-dark);
            box-shadow: 0 0 20px rgba(201,162,39,0.2);
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
        }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-name {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.85em;
            letter-spacing: 2px;
        }
        .logout-btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid var(--gray-dark);
            color: var(--gray);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover { border-color: var(--gold); color: var(--gold); }
        .nav {
            display: flex;
            gap: 4px;
            padding: 12px 30px;
            background: var(--black-light);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .nav a {
            padding: 10px 20px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .nav a:hover { color: var(--white); background: var(--black-hover); }
        .nav a.active { color: var(--gold); background: rgba(201,162,39,0.08); }
        .main {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 30px;
        }
        .welcome {
            font-family: 'Cinzel', serif;
            font-size: 2.2em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .subtitle { color: var(--gray); margin-bottom: 35px; font-size: 1em; }
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0;
        }
        .tab {
            padding: 14px 28px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--gray);
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        .tab:hover { color: var(--white); }
        .tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }
        .tab .badge {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 8px;
            background: var(--gold-dark);
            color: var(--black);
            border-radius: 10px;
            font-size: 0.75em;
            font-family: 'Inter', sans-serif;
        }
        /* Trip Cards */
        .trips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 16px;
        }
        .trip-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        .trip-card:hover {
            border-color: var(--gold-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .trip-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            gap: 12px;
        }
        .trip-name {
            font-family: 'Cinzel', serif;
            font-size: 0.95em;
            color: var(--white);
            letter-spacing: 1px;
            line-height: 1.4;
            flex: 1;
        }
        .trip-status {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7em;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .status-upcoming { background: rgba(100,181,246,0.1); color: var(--blue); border: 1px solid rgba(100,181,246,0.2); }
        .status-out { background: rgba(255,152,0,0.1); color: var(--orange); border: 1px solid rgba(255,152,0,0.2); }
        .status-completed { background: rgba(76,175,80,0.1); color: var(--green); border: 1px solid rgba(76,175,80,0.2); }
        .trip-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }
        .meta-tag {
            padding: 4px 10px;
            background: rgba(201,162,39,0.06);
            border: 1px solid rgba(201,162,39,0.12);
            border-radius: 6px;
            font-size: 0.8em;
            color: var(--gray);
        }
        .meta-tag.sport { color: var(--gold); border-color: rgba(201,162,39,0.2); }
        /* Jersey Section */
        .jersey-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .jersey-section h4 {
            font-family: 'Cinzel', serif;
            font-size: 0.85em;
            color: var(--gold);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .jersey-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }
        .jersey-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--black-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85em;
        }
        .jersey-name { color: var(--white); }
        .jersey-qty {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-weight: 700;
        }
        /* Actions */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(201,162,39,0.3); }
        .btn-secondary {
            background: var(--black-light);
            border: 1px solid var(--border);
            color: var(--white);
        }
        .btn-secondary:hover { border-color: var(--gold); }
        .btn-success {
            background: linear-gradient(135deg, var(--green), #388E3C);
            color: var(--white);
        }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(76,175,80,0.3); }
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--gray);
            font-size: 1.5em;
            cursor: pointer;
        }
        .modal-close:hover { color: var(--white); }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: var(--gray);
            font-size: 0.85em;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--black-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .jersey-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }
        .jersey-input-row input[type="number"] {
            width: 80px;
            text-align: center;
        }
        .jersey-input-row .jersey-label {
            flex: 1;
            color: var(--white);
            font-size: 0.9em;
        }
        /* Return Report */
        .return-report {
            background: rgba(76,175,80,0.05);
            border: 1px solid rgba(76,175,80,0.15);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
        }
        .return-report h5 {
            font-family: 'Cinzel', serif;
            color: var(--green);
            margin-bottom: 10px;
            font-size: 0.85em;
        }
        .return-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(76,175,80,0.1);
            font-size: 0.85em;
        }
        .return-item:last-child { border-bottom: none; }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; padding: 15px 20px; }
            .nav { padding: 10px 20px; }
            .main { padding: 30px 20px; width: 100%; }
            .trips-grid { grid-template-columns: 1fr; }
            .tabs { overflow-x: auto; }
            table { font-size: 0.85em; overflow-x: auto; display: block; }
            input, select, button, textarea { font-size: 16px !important; }
            h1 { font-size: 1.4em; }
            h2 { font-size: 1.15em; }
            .welcome { font-size: 1.4em; }
        }
    </style>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js?v="+Date.now());}</script>
</head>
<body>
    <div class="progress-bar" id="progress-bar"></div>
    <div class="particles" id="particles"></div>
    <script>if(!sessionStorage.getItem("fs_auth") && !localStorage.getItem("fs_auth")){window.location.href="index.html";}</script>
    <div class="main">
        <div class="welcome">Trip Tracker</div>
        <div class="subtitle" id="subtitle">Manage trips, track jerseys, report returns</div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('upcoming')" id="tab-upcoming">
                Upcoming <span class="badge" id="count-upcoming">0</span>
            </button>
            <button class="tab" onclick="switchTab('out')" id="tab-out">
                Out Now <span class="badge" id="count-out">0</span>
            </button>
            <button class="tab" onclick="switchTab('completed')" id="tab-completed">
                Completed <span class="badge" id="count-completed">0</span>
            </button>
        </div>
        <div id="content-upcoming" class="tab-content"></div>
        <div id="content-out" class="tab-content" style="display:none;"></div>
        <div id="content-completed" class="tab-content" style="display:none;"></div>
    </div>
    <script>
        const NAME = sessionStorage.getItem('fs_name') || 'User';
        
        // Use unified status system from other pages
        function getTournaments() {
            var t = JSON.parse(localStorage.getItem('fs_tourney_schedule') || '[]');
            if (t.length === 0) {
                t = [
                    { id: 1700000001, name: 'Easter Classic', sport: 'Soccer', start: '2026-04-18', end: '2026-04-20', location: 'Lafayette, LA', teams: 85, times: 'Sat 8:00 AM — Field 3' },
                    { id: 1700000002, name: 'Gulf Coast Showcase', sport: 'Baseball', start: '2026-05-02', end: '2026-05-05', location: 'Biloxi, MS', teams: 48, times: 'Sat 9:00 AM — Field 1' },
                    { id: 1700000003, name: 'Spring Championship', sport: 'Soccer', start: '2026-03-10', end: '2026-03-13', location: 'Dallas, TX', teams: 110, times: 'Sat 8:00 AM — Field 3' },
                    { id: 1700000004, name: 'Memorial Day Classic', sport: 'Baseball', start: '2026-05-25', end: '2026-05-28', location: 'New Orleans, LA', teams: 72, times: 'Mon 7:00 AM — Field 5' }
                ];
                localStorage.setItem('fs_tourney_schedule', JSON.stringify(t));
            }
            return t;
        }
        function getStatuses() {
            try { return JSON.parse(localStorage.getItem('fs_trip_statuses')) || {}; } catch(e) { return {}; }
        }
        function saveStatuses(s) { localStorage.setItem('fs_trip_statuses', JSON.stringify(s)); }
        function setStatus(id, s) {
            var all = getStatuses();
            all[id] = s;
            saveStatuses(all);
            render();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById('content-' + tab).style.display = 'block';
            render();
        }
        function render() {
            var list = getTournaments();
            var statuses = getStatuses();
            var activeTab = document.querySelector('.tab.active').id.replace('tab-', '');
            var upcoming = [];
            var out = [];
            var completed = [];
            list.forEach(function(t) {
                var s = statuses[t.id] || 'need-pack';
                if (s === 'need-pack' || s === 'upcoming') upcoming.push(t);
                else if (s === 'out') out.push(t);
                else if (s === 'returned' || s === 'completed') completed.push(t);
            });
            document.getElementById('count-upcoming').textContent = upcoming.length;
            document.getElementById('count-out').textContent = out.length;
            document.getElementById('count-completed').textContent = completed.length;
            if (activeTab === 'upcoming') renderCards(upcoming, 'upcoming');
            else if (activeTab === 'out') renderCards(out, 'out');
            else if (activeTab === 'completed') renderCards(completed, 'completed');
        }
        function renderCards(trips, type) {
            var container = document.getElementById('content-' + type);
            if (trips.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--gray);"><h3 style="font-family:Cinzel,serif;color:var(--gold);margin-bottom:10px;">No ' + type + ' trips</h3></div>';
                return;
            }
            var html = '<div class="trips-grid">';
            trips.forEach(function(trip) {
                var sportIcon = trip.sport === 'Soccer' ? '⚽' : trip.sport === 'Baseball' ? '⚾' : '🏟️';
                var dateStr = (trip.start || '') + (trip.end ? ' — ' + trip.end : '');
                var loc = trip.location || '—';
                var teams = trip.teams || '—';
                var typeLabel = type === 'upcoming' ? 'NEEDS PACKING' : type === 'out' ? 'OUT NOW' : 'COMPLETED';
                var statusClass = type === 'upcoming' ? 'status-upcoming' : type === 'out' ? 'status-out' : 'status-completed';
                var actionsHtml = '';
                if (type === 'upcoming') {
                    actionsHtml = '<div class="actions"><button class="btn btn-primary" onclick="location.href=\'pack-manager.html?tournament=' + encodeURIComponent(trip.name) + '\'">📦 Pack</button><button class="btn btn-success" onclick="setStatus(' + trip.id + ',\'out\')">🚐 Mark Out</button></div>';
                } else if (type === 'out') {
                    actionsHtml = '<div class="actions"><a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(loc) + '" target="_blank" class="btn btn-primary">📍 Track</a><button class="btn btn-secondary" onclick="setStatus(' + trip.id + ',\'returned\')">✅ Mark Complete</button></div>';
                }
                html += '<div class="trip-card"><div class="trip-header"><div class="trip-name">' + sportIcon + ' ' + trip.name + '</div><div class="trip-status ' + statusClass + '">' + typeLabel + '</div></div>' +
                    '<div class="trip-meta"><span class="meta-tag sport">' + (trip.sport || '—') + '</span><span class="meta-tag">' + loc + '</span><span class="meta-tag">👥 ' + teams + ' teams</span></div>' +
                    '<div style="color:var(--gray);font-size:0.88em;line-height:1.7;">' +
                        (dateStr ? '<div>📅 ' + dateStr + '</div>' : '') +
                    '</div>' +
                    actionsHtml +
                '</div>';
            });
            html += '</div>';
            container.innerHTML = html;
        }
        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'signin.html';
        }
        // Init
        render();
        window.addEventListener('storage', function(e) {
            if (e.key === 'fs_tourney_schedule' || e.key === 'fs_trip_statuses') render();
        });
        setInterval(function() {
            var h = JSON.stringify(localStorage.getItem('fs_tourney_schedule') + '|' + localStorage.getItem('fs_trip_statuses'));
            if (h !== window._ttLast) { window._ttLast = h; render(); }
        }, 3000);
    </script>
    <script>
        // Particles & Progress Bar
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
        window.addEventListener("scroll", function(){
            const bar = document.getElementById("progress-bar");
            if (!bar) return;
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = scrollHeight > 0 ? (scrollTop/scrollHeight)*100 : 0;
            bar.style.width = pct+"%";
        });
    </script>
</body>
</html>
