    <div class="modal-overlay" id="checkin-modal">

            <h2>Check In Returned Jerseys</h2>
            <div id="checkin-form"></div>
            <div style="margin-top:20px; display:flex; gap:10px;">

                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>

    <script>
        const NAME = sessionStorage.getItem('fs_name') || 'User';
        document.getElementById('user-name').textContent = NAME.toUpperCase();

        // Nav
        (function() {
            const role = sessionStorage.getItem('fs_role');
            const nav = document.getElementById('main-nav');
            if (!nav || !role) return;
            const links = { owner: ['dashboard','tournaments','inventory','trips','planner','team','tracker'], inventory: ['dashboard','inventory','team','tracker'], logistics: ['dashboard','trips','planner','team','tracker'], tournament: ['dashboard','tournaments','team'] };
            const labels = { dashboard:'Dashboard', tournaments:'Tournaments', inventory:'Inventory', trips:'Trips', planner:'Planner', team:'Team', tracker:'Tracker', 'trip-plans':'Plans' };
            const current = 'tracker';
            nav.innerHTML = (links[role] || links.owner).map(p => {
                const cls = p === current ? 'active' : '';
                return `<a href="${p === 'tracker' ? 'trip-tracker' : p}.html" class="${cls}">${labels[p]}</a>`;
            }).join('');
        })();

        // Trip status storage
        const STORAGE_KEY = 'fs_trip_status';
        const PACKING_KEY = 'fs_trip_packing';
        const RETURNS_KEY = 'fs_trip_returns';

        function getTripData() {
            const status = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            const packing = JSON.parse(localStorage.getItem(PACKING_KEY) || '{}');
            const returns = JSON.parse(localStorage.getItem(RETURNS_KEY) || '{}');
            return { status, packing, returns };
        }

        function setTripStatus(tripId, status) {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            data[tripId] = status;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            render();
        }

        function setTripPacking(tripId, jerseys) {
            const data = JSON.parse(localStorage.getItem(PACKING_KEY) || '{}');
            data[tripId] = jerseys;
            localStorage.setItem(PACKING_KEY, JSON.stringify(data));
        }

        function setTripReturns(tripId, jerseys) {
            const data = JSON.parse(localStorage.getItem(RETURNS_KEY) || '{}');
            data[tripId] = jerseys;
            localStorage.setItem(RETURNS_KEY, JSON.stringify(data));
        }

        let currentTripId = null;
        let currentModal = null;

        // Jersey catalog
        const JERSEY_CATALOG = {
            'Soccer': ['Ronaldo Blue','Ronaldo Red','Ronaldo White','Ronaldo Special','Ronaldo WC',
                       'Messi Special','Messi PSG','Messi Tribute',
                       'Yamal Special','Yamal Black','Yamal Barca','Yamal Kobe','Yamal Pink','Yamal Flower','Yamal Snake',
                       'Neymar Yellow','Neymar Tribute',
                       'France Mbappe','Pulisic AC Milan','Gimenez'],
            'Baseball': ['Ohtahni Dodgers','Harper Phillies','Judge Yankees','Acuna Jr Braves',
                        'Betts Dodgers','Tatis Jr','Turner Phillies','Whit Royals','Soto Mets',
                        'De LaCruz Reds','Crews Nationals','Skenes Pirates','Holliday Orioles',
                        'Trout Angels','Crow','Mariners','Freeman','Alverez','Henderson','Guerrero']
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById('content-' + tab).style.display = 'block';
            render();
        }

        function getTripStatus(trip) {
            const { status } = getTripData();
            return status[trip.id] || 'upcoming';
        }

        function render() {
            const { status, packing, returns } = getTripData();
            const activeTab = document.querySelector('.tab.active').id.replace('tab-', '');

            // Categorize trips
            const upcoming = [];
            const out = [];
            const completed = [];

            CREW_TRIPS.forEach(trip => {
                const s = status[trip.id] || 'upcoming';
                if (s === 'upcoming') upcoming.push(trip);
                else if (s === 'out') out.push(trip);
                else if (s === 'completed') completed.push(trip);
            });

            document.getElementById('count-upcoming').textContent = upcoming.length;
            document.getElementById('count-out').textContent = out.length;
            document.getElementById('count-completed').textContent = completed.length;

            // Render active tab
            if (activeTab === 'upcoming') renderTrips(upcoming, 'upcoming');
            else if (activeTab === 'out') renderTrips(out, 'out');
            else if (activeTab === 'completed') renderTrips(completed, 'completed');
        }

        function renderTrips(trips, type) {
            const container = document.getElementById('content-' + type);
            if (trips.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:60px 20px; color:var(--gray);"><h3 style="font-family:Cinzel,serif; color:var(--gold); margin-bottom:10px;">No ${type} trips</h3></div>`;
                return;
            }

            container.innerHTML = '<div class="trips-grid">' + trips.map(trip => {
                const { packing: packingData, returns: returnsData } = getTripData();
                const tripPacking = packingData[trip.id] || {};
                const tripReturns = returnsData[trip.id] || {};
                const sportType = trip.sport.toLowerCase().includes('baseball') || trip.sport === 'BB' ? 'Baseball' : 'Soccer';

                let jerseyHtml = '';
                let returnHtml = '';

                if (Object.keys(tripPacking).length > 0) {
                    jerseyHtml = `
                        <div class="jersey-section">
                            <h4>📦 Packed Jerseys</h4>
                            <div class="jersey-grid">
                                ${Object.entries(tripPacking).map(([name, qty]) => `
                                    <div class="jersey-item">
                                        <span class="jersey-name">${name}</span>
                                        <span class="jersey-qty">${qty}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                if (Object.keys(tripReturns).length > 0) {
                    returnHtml = `
                        <div class="return-report">
                            <h5>✅ Returned Jerseys</h5>
                            ${Object.entries(tripReturns).map(([name, qty]) => `
                                <div class="return-item">
                                    <span>${name}</span>
                                    <span style="color:var(--green); font-weight:600;">${qty}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                let actionsHtml = '';
                if (type === 'upcoming') {
                    actionsHtml = `
                        <div class="actions">
                            <button class="btn btn-primary" onclick="openPackModal('${trip.id}')">📦 Pack Jerseys</button>
                            <button class="btn btn-success" onclick="markOut('${trip.id}')">🚐 Mark Out</button>
                        </div>
                    `;
                } else if (type === 'out') {
                    actionsHtml = `
                        <div class="actions">
                            <button class="btn btn-success" onclick="openCheckInModal('${trip.id}')">📥 Check In</button>
                            <button class="btn btn-secondary" onclick="markCompleted('${trip.id}')">✅ Complete</button>
                        </div>
                    `;
                }

                return `
                    <div class="trip-card">
                        <div class="trip-header">
                            <div class="trip-name">${trip.name}</div>
                            <div class="trip-status status-${type}">${type.toUpperCase()}</div>
                        </div>
                        <div class="trip-meta">
                            <span class="meta-tag sport">${sportType}</span>
                            <span class="meta-tag">${trip.state || '—'}</span>
                            <span class="meta-tag">${trip.month || '—'}</span>
                            ${trip.crew ? `<span class="meta-tag">${trip.crew}</span>` : ''}
                        </div>
                        <div style="color:var(--gray); font-size:0.88em; line-height:1.7;">
                            ${trip.startDate ? `<div>📅 ${trip.startDate}${trip.endDate ? ' — ' + trip.endDate : ''}</div>` : ''}
                        </div>
                        ${jerseyHtml}
                        ${returnHtml}
                        ${actionsHtml}
                    </div>
                `;
            }).join('') + '</div>';
        }

        function markOut(tripId) {
            setTripStatus(tripId, 'out');
        }

        function markCompleted(tripId) {
            setTripStatus(tripId, 'completed');
        }

        function openPackModal(tripId) {
            currentTripId = tripId;
            currentModal = 'pack';
            const trip = CREW_TRIPS.find(t => t.id === tripId);
            const sportType = trip.sport.toLowerCase().includes('baseball') || trip.sport === 'BB' ? 'Baseball' : 'Soccer';
            const jerseys = JERSEY_CATALOG[sportType] || JERSEY_CATALOG['Soccer'];

            document.getElementById('pack-form').innerHTML = `
                <p style="color:var(--gray); margin-bottom:16px;">Packing for: <strong style="color:var(--gold);">${trip.name}</strong></p>
                ${jerseys.map(j => `
                    <div class="jersey-input-row">
                        <span class="jersey-label">${j}</span>
                        <input type="number" id="pack-${j.replace(/\s+/g,'-')}" min="0" value="0" placeholder="0">
                    </div>
                `).join('')}
            `;
            document.getElementById('pack-modal').classList.add('active');
        }

        function savePack() {
            const trip = CREW_TRIPS.find(t => t.id === currentTripId);
            const sportType = trip.sport.toLowerCase().includes('baseball') || trip.sport === 'BB' ? 'Baseball' : 'Soccer';
            const jerseys = JERSEY_CATALOG[sportType] || JERSEY_CATALOG['Soccer'];
            const packed = {};

            jerseys.forEach(j => {
                const val = document.getElementById('pack-' + j.replace(/\s+/g,'-')).value;
                if (val && parseInt(val) > 0) {
                    packed[j] = parseInt(val);
                }
            });

            setTripPacking(currentTripId, packed);
            closeModal();
            render();
        }

        function openCheckInModal(tripId) {
            currentTripId = tripId;
            currentModal = 'checkin';
            const { packing: packingData } = getTripData();
            const tripPacking = packingData[tripId] || {};

            if (Object.keys(tripPacking).length === 0) {
                alert('No packing list found for this trip');
                return;
            }

            document.getElementById('checkin-form').innerHTML = `
                <p style="color:var(--gray); margin-bottom:16px;">Report returned jerseys:</p>
                ${Object.entries(tripPacking).map(([name, packedQty]) => `
                    <div class="jersey-input-row">
                        <span class="jersey-label">${name} <small style="color:var(--gray);">(packed: ${packedQty})</small></span>
                        <input type="number" id="return-${name.replace(/\s+/g,'-')}" min="0" max="${packedQty}" value="${packedQty}" placeholder="0">
                    </div>
                `).join('')}
            `;
            document.getElementById('checkin-modal').classList.add('active');
        }

        function saveCheckIn() {
            const { packing: packingData } = getTripData();
            const tripPacking = packingData[currentTripId] || {};
            const returned = {};

            Object.keys(tripPacking).forEach(name => {
                const val = document.getElementById('return-' + name.replace(/\s+/g,'-')).value;
                if (val && parseInt(val) > 0) {
                    returned[name] = parseInt(val);
                }
            });

            setTripReturns(currentTripId, returned);
            closeModal();
            render();
        }

        function closeModal() {
            document.getElementById('pack-modal').classList.remove('active');
            document.getElementById('checkin-modal').classList.remove('active');
            currentTripId = null;
            currentModal = null;
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'signin.html';
        }

        // Init
        render();
    </script>
    <script>
        // Particles & Progress Bar
        (function(){
            const container = document.getElementById("particles");
            if (!container) return;
            for(let i=0;i<25;i++){
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random()*100+"vw";
                p.style.animationDelay = Math.random()*15+"s";
                p.style.animationDuration = (10+Math.random()*10)+"s";
                p.style.width = (2+Math.random()*3)+"px";
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        })();
        window.addEventListener("scroll", function(){
            const bar = document.getElementById("progress-bar");
            if (!bar) return;
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = scrollHeight > 0 ? (scrollTop/scrollHeight)*100 : 0;
            bar.style.width = pct+"%";
        });
    </script>
</body>
</html>
