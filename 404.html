<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Future Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C9A227;
            --gold-dark: #B8941F;
            --black: #0A0A0A;
            --black-card: #1A1A1A;
            --white: #F8F6F0;
            --gray: #A8A498;
            --gray-dark: #6B665C;
            --border: #2A2824;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--gold-dark);
            margin-bottom: 24px;
        }
        .code {
            font-family: 'Cinzel', serif;
            font-size: 6em;
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 10px;
            opacity: 0.7;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            color: var(--white);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        p {
            color: var(--gray);
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95em;
            letter-spacing: 1px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(201,162,39,0.3);
        }
        .links {
            margin-top: 30px;
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: var(--gray-dark);
            text-decoration: none;
            font-size: 0.8em;
            transition: color 0.15s;
        }
        .links a:hover {
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/fs.jpeg" alt="Future Stars" class="logo">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>This page might have moved, been removed, or the link might be wrong.<br>Let's get you back on track.</p>
        <a href="index.html" class="btn">🏠 Back to Home</a>
        <div class="links">
            <a href="tournaments.html">Tournaments</a>
            <a href="inventory-v2.html">Inventory</a>
            <a href="trips.html">Trips</a>
            <a href="pack-manager.html">Pack Manager</a>
        </div>
    </div>
</body>
</html>
