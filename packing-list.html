<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="auth-config.js?v=1777085641"></script>
  <script src="nav-dropdown.js?v=1777085641" defer></script>
  <link rel="stylesheet" href="fs-utils.css?v=1">
  <script src="fs-utils.js?v=1"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --gold:#C9A227;--gold-light:#E8C84B;--gold-dark:#B8941F;--gold-10:rgba(201,162,39,0.1);--gold-20:rgba(201,162,39,0.2);
      --black:#0A0A0A;--black-light:#141414;--black-card:#1A1A1A;--black-hover:#242424;
      --white:#F8F6F0;--gray:#A8A498;--gray-dark:#6B665C;--border:#2A2824;
      --green:#4CAF50;--red:#EF5350;--blue:#64B5F6;--orange:#FF9800;
    }
    body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);min-height:100vh;font-size:15px;}

    .header{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;background:var(--black-light);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
    .logo-link{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .logo-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--gold-dark);}
    .logo-text{font-family:'Cinzel',serif;font-size:1.3em;font-weight:700;color:var(--gold);letter-spacing:3px;}
    .user-info{display:flex;align-items:center;gap:20px;}
    .user-name{font-family:'Cinzel',serif;color:var(--gold);font-size:.85em;letter-spacing:2px;}

    .main{max-width:1200px;margin:0 auto;padding:30px;}
    .welcome{font-family:'Cinzel',serif;font-size:2em;color:var(--gold);margin-bottom:8px;}
    .subtitle{color:var(--gray);margin-bottom:30px;}

    /* Wizard Steps */
    .wizard{display:flex;gap:8px;margin-bottom:30px;}
    .step{flex:1;padding:16px;background:var(--black-card);border:1px solid var(--border);border-radius:12px;text-align:center;opacity:0.5;transition:all .3s;}
    .step.active{opacity:1;border-color:var(--gold);background:var(--gold-10);}
    .step-num{width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--black);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.85em;margin-bottom:8px;}
    .step-title{font-size:.85em;font-weight:600;}

    /* Form Cards */
    .form-card{background:var(--black-card);border:1px solid var(--border);border-radius:16px;padding:30px;margin-bottom:24px;}
    .form-card h3{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:20px;font-size:1.1em;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;color:var(--gray);font-size:.85em;margin-bottom:6px;font-weight:500;}
    .form-group input,.form-group select{width:100%;padding:14px;background:var(--black-light);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'Inter',sans-serif;font-size:.95em;outline:none;transition:all .2s;}
    .form-group input:focus,.form-group select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.1);}

    /* Quick Select Buttons */
    .quick-select{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
    .quick-btn{padding:10px 20px;background:var(--black-light);border:1px solid var(--border);border-radius:10px;color:var(--gray);cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;font-size:.9em;}
    .quick-btn:hover{border-color:var(--gold);color:var(--gold);}
    .quick-btn.active{background:var(--gold-10);border-color:var(--gold);color:var(--gold);}

    /* Generate Button */
    .generate-btn{width:100%;padding:20px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--black);border:none;border-radius:12px;font-family:'Cinzel',serif;font-size:1.2em;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:2px;text-transform:uppercase;}
    .generate-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,162,39,.4);}
    .generate-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

    /* Results */
    .results{display:none;}
    .results.show{display:block;animation:fadeIn .5s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    .packing-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px;}
    .packing-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.3em;}
    .packing-actions{display:flex;gap:10px;}

    .jersey-section{background:var(--black-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;}
    .jersey-section h4{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
    .jersey-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
    .jersey-item{background:var(--black-light);border:1px solid var(--border);border-radius:10px;padding:14px;}
    .jersey-item-name{font-weight:600;margin-bottom:8px;}
    .jersey-item-details{display:flex;flex-wrap:wrap;gap:6px;}
    .size-tag{padding:4px 10px;background:var(--black);border:1px solid var(--border);border-radius:6px;font-size:.8em;}
    .size-tag .qty{color:var(--gold);font-weight:700;}

    .summary-bar{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
    .summary-stat{background:var(--black-card);border:1px solid var(--border);border-radius:12px;padding:16px 24px;text-align:center;flex:1;min-width:140px;}
    .summary-stat-value{font-family:'Cinzel',serif;font-size:1.8em;color:var(--gold);font-weight:700;}
    .summary-stat-label{font-size:.75em;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

    .checklist{background:var(--black-card);border:1px solid var(--border);border-radius:16px;padding:24px;}
    .checklist h4{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:16px;}
    .checklist-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
    .checklist-item:last-child{border-bottom:none;}
    .checklist-item input[type="checkbox"]{width:20px;height:20px;accent-color:var(--gold);}
    .checklist-item label{flex:1;cursor:pointer;}
    .checklist-item.checked label{text-decoration:line-through;color:var(--gray-dark);}

    .btn{padding:10px 20px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.9em;font-weight:600;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:8px;}
    .btn-secondary{background:var(--black-card);border:1px solid var(--border);color:var(--white);}
    .btn-secondary:hover{border-color:var(--gold);}

    /* Editable quantity inputs */
    .qty-input{background:transparent;border:1px solid transparent;border-radius:4px;color:var(--gold);font-weight:700;text-align:center;padding:2px 4px;transition:all .2s;}
    .qty-input:hover{border-color:var(--border);}
    .qty-input:focus{outline:none;border-color:var(--gold);background:rgba(201,162,39,0.1);}
    .unit{color:var(--gray);font-size:.85em;}

    /* Gear items */
    .gear-item{background:linear-gradient(135deg,var(--black-light),var(--black-card));}
    .gear-item .jersey-item-name{font-size:.9em;}

    /* Print styles */
    @media print{
      .header,.wizard,.form-card,.packing-actions{display:none!important;}
      .results{display:block!important;}
      .qty-input{border:none!important;color:var(--black)!important;}
      body{background:white!important;color:black!important;}
      .jersey-item,.checklist{background:white!important;border:1px solid #ccc!important;}
      .jersey-item-name,.checklist h4{color:black!important;}
    }

    @media(max-width:768px){
      .form-row{grid-template-columns:1fr;}
      .wizard{flex-direction:column;}
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="logo-link">
      <img src="images/fs.jpeg" alt="Future Stars" class="logo-img">
      <span class="logo-text">FUTURE STARS</span>
    </a>
    <div class="user-info">
      <span id="dark-mode-toggle"></span>
      <span class="user-name" id="user-name"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <nav class="nav" id="main-nav"></nav>

  <div class="main">
    <div class="welcome">Packing List Generator</div>
    <div class="subtitle">One-click jersey packing for tournaments</div>

    <div class="wizard">
      <div class="step active" id="step1">
        <div class="step-num">1</div>
        <div class="step-title">Tournament Info</div>
      </div>
      <div class="step" id="step2">
        <div class="step-num">2</div>
        <div class="step-title">Team Details</div>
      </div>
      <div class="step" id="step3">
        <div class="step-num">3</div>
        <div class="step-title">Review & Pack</div>
      </div>
    </div>

    <!-- Step 1: Tournament Info -->
    <div class="form-card" id="card-step1">
      <h3>🏆 Tournament Information</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Tournament Name</label>
          <input type="text" id="tourney-name" placeholder="e.g. Texas Labor Day Cup">
        </div>
        <div class="form-group">
          <label>Sport</label>
          <select id="sport">
            <option value="">Select sport...</option>
            <option value="baseball">⚾ Baseball</option>
            <option value="soccer">⚽ Soccer</option>
            <option value="both">⚾⚽ Both</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tournament Type</label>
          <select id="tourney-type">
            <option value="">Select type...</option>
            <option value="weekend">Weekend (2-3 days)</option>
            <option value="weeklong">Week-long (5-7 days)</option>
            <option value="showcase">Showcase (1 day)</option>
            <option value="series">Series (multiple weekends)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="tourney-date">
        </div>
      </div>
      <button class="btn btn-secondary" onclick="nextStep(2)">Next →</button>
    </div>

    <!-- Step 2: Team Details -->
    <div class="form-card" id="card-step2" style="display:none;">
      <h3>👥 Team Details</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Age Group</label>
          <div class="quick-select" id="age-group-btns">
            <button class="quick-btn" data-value="u8">U8</button>
            <button class="quick-btn" data-value="u10">U10</button>
            <button class="quick-btn" data-value="u12">U12</button>
            <button class="quick-btn" data-value="u14">U14</button>
            <button class="quick-btn" data-value="u16">U16</button>
            <button class="quick-btn" data-value="u18">U18</button>
          </div>
          <input type="hidden" id="age-group">
        </div>
        <div class="form-group">
          <label>Team Size (players)</label>
          <div class="quick-select" id="team-size-btns">
            <button class="quick-btn" data-value="8">8</button>
            <button class="quick-btn" data-value="10">10</button>
            <button class="quick-btn" data-value="12">12</button>
            <button class="quick-btn" data-value="14">14</button>
            <button class="quick-btn" data-value="16">16</button>
            <button class="quick-btn" data-value="18">18</button>
            <button class="quick-btn" data-value="20">20</button>
          </div>
          <input type="hidden" id="team-size">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Number of Teams</label>
          <select id="team-count">
            <option value="1">1 Team</option>
            <option value="2">2 Teams</option>
            <option value="3">3 Teams</option>
            <option value="4">4 Teams</option>
            <option value="5">5+ Teams</option>
          </select>
        </div>
        <div class="form-group">
          <label>Backup Jerseys (% extra)</label>
          <select id="backup-pct">
            <option value="0">No extras</option>
            <option value="10" selected>10% extra</option>
            <option value="20">20% extra</option>
            <option value="30">30% extra</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-secondary" onclick="prevStep(1)">← Back</button>
        <button class="btn btn-secondary" onclick="nextStep(3)">Next →</button>
      </div>
    </div>

    <!-- Step 3: Generate -->
    <div class="form-card" id="card-step3" style="display:none;">
      <h3>📦 Generate Packing List</h3>
      <p style="color:var(--gray);margin-bottom:20px;">Review your selections and click generate to create the packing list.</p>
      <div id="review-summary" style="background:var(--black-light);border-radius:12px;padding:20px;margin-bottom:20px;"></div>
      <button class="generate-btn" onclick="generatePackingList()">⚡ GENERATE PACKING LIST</button>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <div class="packing-header">
        <div class="packing-title" id="results-title">Packing List</div>
        <div class="packing-actions">
          <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
          <button class="btn btn-secondary" onclick="exportPackingList()">📋 Export</button>
          <button class="btn btn-secondary" onclick="savePackingList()">💾 Save</button>
        </div>
      </div>

      <div class="summary-bar" id="summary-bar"></div>

      <div id="jersey-sections"></div>

      <div id="gear-sections"></div>

      <div class="checklist" style="margin-top:24px;">
        <h4>✅ Packing Checklist</h4>
        <div id="checklist-items"></div>
      </div>
    </div>
  </div>

  <script>
    // Auth
    const AUTH = sessionStorage.getItem('fs_auth');
    const ROLE = sessionStorage.getItem('fs_role');
    if (!AUTH || !AUTH_CONFIG.canAccess(ROLE, 'inventory')) {
      window.location.href = 'signin.html';
    }
    document.getElementById('user-name').textContent = sessionStorage.getItem('fs_name') || '';

    function logout() {
      sessionStorage.clear();
      window.location.href = 'signin.html';
    }

    // Quick select buttons
    document.querySelectorAll('.quick-select').forEach(container => {
      container.addEventListener('click', e => {
        if (e.target.classList.contains('quick-btn')) {
          container.querySelectorAll('.quick-btn').forEach(btn => btn.classList.remove('active'));
          e.target.classList.add('active');
          const input = container.nextElementSibling;
          if (input && input.tagName === 'INPUT') {
            input.value = e.target.dataset.value;
          }
        }
      });
    });

    function nextStep(step) {
      document.querySelectorAll('.step').forEach((s, i) => {
        s.classList.toggle('active', i < step);
      });
      document.querySelectorAll('[id^="card-step"]').forEach(c => c.style.display = 'none');
      document.getElementById(`card-step${step}`).style.display = 'block';
      
      if (step === 3) {
        updateReview();
      }
    }

    function prevStep(step) {
      nextStep(step);
    }

    function updateReview() {
      const name = document.getElementById('tourney-name').value || 'Tournament';
      const sport = document.getElementById('sport').value;
      const type = document.getElementById('tourney-type').value;
      const age = document.getElementById('age-group').value;
      const size = document.getElementById('team-size').value;
      const count = document.getElementById('team-count').value;
      const backup = document.getElementById('backup-pct').value;

      const sportLabels = { baseball: '⚾ Baseball', soccer: '⚽ Soccer', both: '⚾⚽ Both' };
      const typeLabels = { weekend: 'Weekend (2-3 days)', weeklong: 'Week-long', showcase: 'Showcase', series: 'Series' };

      document.getElementById('review-summary').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:.9em;">
          <div><strong style="color:var(--gold);">Tournament:</strong> ${name}</div>
          <div><strong style="color:var(--gold);">Sport:</strong> ${sportLabels[sport] || 'Not selected'}</div>
          <div><strong style="color:var(--gold);">Type:</strong> ${typeLabels[type] || 'Not selected'}</div>
          <div><strong style="color:var(--gold);">Age Group:</strong> ${age ? age.toUpperCase() : 'Not selected'}</div>
          <div><strong style="color:var(--gold);">Team Size:</strong> ${size || 'Not selected'} players</div>
          <div><strong style="color:var(--gold);">Teams:</strong> ${count} team${count > 1 ? 's' : ''}</div>
          <div><strong style="color:var(--gold);">Backup:</strong> ${backup}% extra</div>
        </div>
      `;
    }

    // Size distribution by age group
    const SIZE_DIST = {
      u8:  { YS: 0.3, YM: 0.4, YL: 0.2, YXL: 0.1 },
      u10: { YS: 0.2, YM: 0.3, YL: 0.3, YXL: 0.2 },
      u12: { YS: 0.1, YM: 0.2, YL: 0.3, YXL: 0.3, AS: 0.1 },
      u14: { YM: 0.1, YL: 0.2, YXL: 0.4, AS: 0.2, AM: 0.1 },
      u16: { YL: 0.1, YXL: 0.3, AS: 0.3, AM: 0.2, AL: 0.1 },
      u18: { YXL: 0.2, AS: 0.3, AM: 0.3, AL: 0.15, AXL: 0.05 }
    };

    const SOCCER_SIZE_DIST = {
      u8:  { '20': 0.2, '22': 0.3, '24': 0.3, '26': 0.2 },
      u10: { '22': 0.2, '24': 0.3, '26': 0.3, '28': 0.2 },
      u12: { '24': 0.2, '26': 0.3, '28': 0.3, 'S': 0.2 },
      u14: { '26': 0.1, '28': 0.2, 'S': 0.3, 'M': 0.3, 'L': 0.1 },
      u16: { 'S': 0.1, 'M': 0.3, 'L': 0.4, 'XL': 0.2 },
      u18: { 'M': 0.2, 'L': 0.4, 'XL': 0.3, 'XXL': 0.1 }
    };

    // Popular jerseys by sport
    const POPULAR_JERSEYS = {
      baseball: ['Ohtani Dodgers', 'Judge Yankees', 'Betts Dodgers', 'Soto Mets', 'Acuna Jr. Braves', 'Harper Phillies'],
      soccer: ['Messi Black', 'Ronaldo Blue', 'Neymar Tribute', 'Yamal Flower', 'Messi Pink', 'Messi Argentina']
    };

    // Gear items by sport
    const GEAR_ITEMS = {
      baseball: [
        { name: 'Baseballs', icon: '⚾', defaultQty: 12, unit: 'dozen' },
        { name: 'Batting Helmets', icon: '⛑️', defaultQty: 2, unit: 'each' },
        { name: 'Bats', icon: '🏏', defaultQty: 4, unit: 'each' },
        { name: 'Sliding Mitts', icon: '🧤', defaultQty: 6, unit: 'pairs' },
        { name: 'Sunglasses', icon: '🕶️', defaultQty: 10, unit: 'each' },
        { name: 'Necklaces', icon: '📿', defaultQty: 15, unit: 'each' },
        { name: 'Shorts', icon: '🩳', defaultQty: 20, unit: 'pairs' },
        { name: 'Socks', icon: '🧦', defaultQty: 30, unit: 'pairs' },
        { name: 'Water Bottles', icon: '💧', defaultQty: 15, unit: 'each' },
        { name: 'First Aid Kit', icon: '🏥', defaultQty: 1, unit: 'kit' }
      ],
      soccer: [
        { name: 'Soccer Balls', icon: '⚽', defaultQty: 12, unit: 'each' },
        { name: 'Shin Guards', icon: '🦵', defaultQty: 15, unit: 'pairs' },
        { name: 'Goalie Gloves', icon: '🧤', defaultQty: 4, unit: 'pairs' },
        { name: 'Cones', icon: '🔺', defaultQty: 20, unit: 'each' },
        { name: 'Sunglasses', icon: '🕶️', defaultQty: 10, unit: 'each' },
        { name: 'Necklaces', icon: '📿', defaultQty: 15, unit: 'each' },
        { name: 'Shorts', icon: '🩳', defaultQty: 20, unit: 'pairs' },
        { name: 'Socks', icon: '🧦', defaultQty: 30, unit: 'pairs' },
        { name: 'Water Bottles', icon: '💧', defaultQty: 15, unit: 'each' },
        { name: 'First Aid Kit', icon: '🏥', defaultQty: 1, unit: 'kit' }
      ]
    };

    // Store current packing data for editing
    let currentPackingData = null;

    function generatePackingList() {
      const sport = document.getElementById('sport').value;
      const age = document.getElementById('age-group').value;
      const teamSize = parseInt(document.getElementById('team-size').value) || 12;
      const teamCount = parseInt(document.getElementById('team-count').value) || 1;
      const backupPct = parseInt(document.getElementById('backup-pct').value) || 10;
      const tourneyName = document.getElementById('tourney-name').value || 'Tournament';

      if (!sport || !age) {
        alert('Please select sport and age group');
        return;
      }

      const multiplier = 1 + (backupPct / 100);
      const totalPlayers = teamSize * teamCount;
      const jerseysNeeded = Math.ceil(totalPlayers * multiplier);

      let jerseyHtml = '';
      let gearHtml = '';
      let totalJerseys = 0;
      let totalGear = 0;

      // Baseball jerseys
      if (sport === 'baseball' || sport === 'both') {
        const dist = SIZE_DIST[age] || SIZE_DIST.u12;
        const baseballJerseys = POPULAR_JERSEYS.baseball.slice(0, Math.min(teamCount + 1, 6));
        
        let baseballHtml = '<div class="jersey-section"><h4>⚾ Baseball Jerseys <span style="font-size:.7em;color:var(--gray);font-weight:400;">(click numbers to edit)</span></h4><div class="jersey-grid">';
        baseballJerseys.forEach((jersey, idx) => {
          const qty = Math.ceil(jerseysNeeded / baseballJerseys.length);
          totalJerseys += qty;
          
          let sizeHtml = '';
          Object.entries(dist).forEach(([size, pct]) => {
            const sizeQty = Math.ceil(qty * pct);
            if (sizeQty > 0) {
              sizeHtml += `<span class="size-tag">${size}: <input type="number" class="qty-input" value="${sizeQty}" data-jersey="bb-${idx}" data-size="${size}" style="width:40px;background:transparent;border:none;color:var(--gold);font-weight:700;text-align:center;" onchange="updateJerseyTotal('bb-${idx}')"> <span class="unit">ea</span></span>`;
            }
          });
          
          baseballHtml += `
            <div class="jersey-item" data-jersey-id="bb-${idx}">
              <div class="jersey-item-name">${jersey}</div>
              <div class="jersey-item-details">${sizeHtml}</div>
              <div style="margin-top:8px;font-size:.85em;color:var(--gray);">Total: <strong style="color:var(--gold);" class="jersey-total" id="bb-${idx}-total">${qty}</strong></div>
            </div>
          `;
        });
        baseballHtml += '</div></div>';
        jerseyHtml += baseballHtml;
      }

      // Soccer jerseys
      if (sport === 'soccer' || sport === 'both') {
        const dist = SOCCER_SIZE_DIST[age] || SOCCER_SIZE_DIST.u12;
        const soccerJerseys = POPULAR_JERSEYS.soccer.slice(0, Math.min(teamCount + 1, 6));
        let soccerTotal = 0;
        
        let soccerHtml = '<div class="jersey-section"><h4>⚽ Soccer Jerseys <span style="font-size:.7em;color:var(--gray);font-weight:400;">(click numbers to edit)</span></h4><div class="jersey-grid">';
        soccerJerseys.forEach((jersey, idx) => {
          const qty = Math.ceil(jerseysNeeded / soccerJerseys.length);
          soccerTotal += qty;
          
          let sizeHtml = '';
          Object.entries(dist).forEach(([size, pct]) => {
            const sizeQty = Math.ceil(qty * pct);
            if (sizeQty > 0) {
              sizeHtml += `<span class="size-tag">${size}: <input type="number" class="qty-input" value="${sizeQty}" data-jersey="sc-${idx}" data-size="${size}" style="width:40px;background:transparent;border:none;color:var(--gold);font-weight:700;text-align:center;" onchange="updateJerseyTotal('sc-${idx}')"> <span class="unit">ea</span></span>`;
            }
          });
          
          soccerHtml += `
            <div class="jersey-item" data-jersey-id="sc-${idx}">
              <div class="jersey-item-name">${jersey}</div>
              <div class="jersey-item-details">${sizeHtml}</div>
              <div style="margin-top:8px;font-size:.85em;color:var(--gray);">Total: <strong style="color:var(--gold);" class="jersey-total" id="sc-${idx}-total">${qty}</strong></div>
            </div>
          `;
        });
        soccerHtml += '</div></div>';
        jerseyHtml += soccerHtml;
        totalJerseys += soccerTotal;
      }

      // Gear items
      const sports = sport === 'both' ? ['baseball', 'soccer'] : [sport];
      let allGear = [];
      
      sports.forEach(s => {
        if (GEAR_ITEMS[s]) {
          allGear = allGear.concat(GEAR_ITEMS[s].map(g => ({...g, sport: s})));
        }
      });

      // Remove duplicates
      const seen = new Set();
      allGear = allGear.filter(g => {
        if (seen.has(g.name)) return false;
        seen.add(g.name);
        return true;
      });

      if (allGear.length > 0) {
        gearHtml = '<div class="jersey-section"><h4>🎒 Gear & Equipment <span style="font-size:.7em;color:var(--gray);font-weight:400;">(click numbers to edit)</span></h4><div class="jersey-grid">';
        
        allGear.forEach((item, idx) => {
          const qty = Math.ceil(item.defaultQty * (teamCount > 1 ? teamCount * 0.7 : 1));
          totalGear += qty;
          
          gearHtml += `
            <div class="jersey-item gear-item" data-gear-id="gear-${idx}">
              <div class="jersey-item-name">${item.icon} ${item.name}</div>
              <div class="jersey-item-details">
                <span class="size-tag">
                  Qty: <input type="number" class="qty-input" value="${qty}" data-gear="gear-${idx}" style="width:50px;background:transparent;border:none;color:var(--gold);font-weight:700;text-align:center;"> <span class="unit">${item.unit}</span>
                </span>
              </div>
              <div style="margin-top:8px;font-size:.8em;color:var(--gray);">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                  <input type="checkbox" checked style="accent-color:var(--gold);"> Pack this item
                </label>
              </div>
            </div>
          `;
        });
        
        gearHtml += '</div></div>';
      }

      // Summary bar
      const summaryHtml = `
        <div class="summary-stat">
          <div class="summary-stat-value">${totalPlayers}</div>
          <div class="summary-stat-label">Players</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${teamCount}</div>
          <div class="summary-stat-label">Teams</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${totalJerseys}</div>
          <div class="summary-stat-label">Jerseys</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${totalGear}</div>
          <div class="summary-stat-label">Gear Items</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${backupPct}%</div>
          <div class="summary-stat-label">Backup</div>
        </div>
      `;

      // Checklist
      const checklistItems = [
        'Count all jerseys before packing',
        'Verify sizes match age group',
        'Pack extra jerseys in separate bag',
        'Label bags with team name',
        'Include inventory sheet',
        'Bring zip ties for organization',
        'Pack marker pens for labeling',
        'Check jersey condition (no stains/tears)',
        'Count all gear items',
        'Pack first aid kit',
        'Verify water bottle count',
        'Double-check sunglasses & accessories'
      ];

      const checklistHtml = checklistItems.map((item, i) => `
        <div class="checklist-item">
          <input type="checkbox" id="check-${i}" onchange="this.parentElement.classList.toggle('checked', this.checked)">
          <label for="check-${i}">${item}</label>
        </div>
      `).join('');

      // Update DOM
      document.getElementById('results-title').textContent = `📦 ${tourneyName} — Packing List`;
      document.getElementById('summary-bar').innerHTML = summaryHtml;
      document.getElementById('jersey-sections').innerHTML = jerseyHtml;
      document.getElementById('gear-sections').innerHTML = gearHtml;
      document.getElementById('checklist-items').innerHTML = checklistHtml;
      document.getElementById('results').classList.add('show');

      // Store data
      currentPackingData = {
        name: tourneyName,
        sport, age, teamSize, teamCount, backupPct,
        totalJerseys, totalGear, totalPlayers,
        created: new Date().toISOString()
      };

      // Save to localStorage
      saveToHistory(currentPackingData);

      // Scroll to results
      document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    }

    function updateJerseyTotal(jerseyId) {
      const item = document.querySelector(`[data-jersey-id="${jerseyId}"]`);
      if (!item) return;
      
      const inputs = item.querySelectorAll('.qty-input');
      let total = 0;
      inputs.forEach(input => {
        total += parseInt(input.value) || 0;
      });
      
      const totalEl = document.getElementById(`${jerseyId}-total`);
      if (totalEl) totalEl.textContent = total;
      
      // Update summary
      updateSummary();
    }

    function updateSummary() {
      let totalJerseys = 0;
      document.querySelectorAll('.jersey-total').forEach(el => {
        totalJerseys += parseInt(el.textContent) || 0;
      });
      
      let totalGear = 0;
      document.querySelectorAll('.gear-item .qty-input').forEach(input => {
        totalGear += parseInt(input.value) || 0;
      });
      
      const stats = document.querySelectorAll('.summary-stat-value');
      if (stats[2]) stats[2].textContent = totalJerseys;
      if (stats[3]) stats[3].textContent = totalGear;
    }

    function saveToHistory(packingList) {
      let history = JSON.parse(localStorage.getItem('fs_packing_history') || '[]');
      history.unshift(packingList);
      if (history.length > 20) history = history.slice(0, 20);
      localStorage.setItem('fs_packing_history', JSON.stringify(history));
    }

    function exportPackingList() {
      const title = document.getElementById('results-title').textContent;
      const sections = document.getElementById('jersey-sections').innerText;
      const checklist = document.getElementById('checklist-items').innerText;
      
      const content = `${title}\n\n${sections}\n\nCHECKLIST:\n${checklist}`;
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `packing-list-${new Date().toISOString().split('T')[0]}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function savePackingList() {
      const data = {
        title: document.getElementById('results-title').textContent,
        html: document.getElementById('results').innerHTML,
        saved: new Date().toISOString()
      };
      localStorage.setItem('fs_last_packing_list', JSON.stringify(data));
      alert('Packing list saved!');
    }

    // Load saved packing list if exists
    function loadSavedPackingList() {
      const saved = localStorage.getItem('fs_last_packing_list');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          // Could restore here if needed
        } catch (e) {}
      }
    }

    // Set today's date as default
    document.getElementById('tourney-date').valueAsDate = new Date();
  </script>
</body>
</html>
